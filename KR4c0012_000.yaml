body:
  text: 李太白文集别集類一唐提要臣等謹案李太白文集三十卷唐李白撰舊唐書白傳稱山東人新唐書則作隴西成紀人考杜甫作崔端薛復筵醉歌有近來海內為長句汝與山東李白好句楊慎丹鉛録據魏皓李翰林集序有世號為李東山之文謂杜集傳寫誤倒其字似乎有理然元稹作杜甫墓志亦稱與山東人李白其文鑿然如倒之作東山人則語不成文又不得以魏序為解檢白集寄東魯二子詩有我家寄東魯句皓序亦稱合於魯一婦人生子曰頗黎蓋居山東頗久故人亦以是稱之實則非其本籍劉昫等誤也至於隴西成紀乃唐時李氏以郡望通稱故劉知幾史通因習篇自注曰近代史為王氏傳曰琅邪臨沂人為李氏傳曰隴西成紀人非惟王李二族久離本郡亦自當時無此郡縣皆是魏晉以前舊名今勘驗唐書地理志果如所説則陽冰局於習俗宋祁等又襲舊文亦不足據惟李陽冰為白族人魏皓為白好友陽冰序稱涼武昭王皓之後謫居條支神龍之始逃歸於蜀復指李樹而生伯陽驚薑之夕長庚入夢云云皓序稱白本隴西後家於綿身既生蜀云云則白為蜀人具有確證二史所書皆非其實也陽冰草堂集序不言卷數新唐書藝文志則曰草堂集二十卷李陽冰編按宋敏求後序曰唐李陽冰序李白草堂集十卷咸平中樂史别得白歌詩十卷合為李翰林集二十卷史又纂雜著為别集十卷然則草堂集原本十卷唐志以陽冰所編為二十卷者殊失之不考今草堂集不傳樂史所編亦罕見此本乃宋敏求得王溥及唐魏皓本又裒集唐類詩諸編洎石刻所傳輯為一集曽鞏又考其先後而次第之為三十卷首卷惟載諸序碑記二卷以下乃為歌詩二十三卷雜著六卷其本流傳頗少國朝康熙中吳縣繆曰芑始重刋之後有曰芑跋云得臨川晏氏宋本重加校正較坊本頗為近古然陳氏書録解題朝氏讀書志馬氏經籍考並題李翰林集而此乃曰太白全集未審為宋本所改曰芑所改是則稍稍可疑耳今仍以歌詩為首而以諸序碑記等録於末卷以符全書體例焉乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
