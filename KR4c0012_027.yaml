body:
  text: 李太白文集卷二十七唐李白撰讚當塗李宰君畫讚天垂元精嶽降粹靈應期命世大賢乃生吐奇獻策敷聞王庭帝用休之揚光泰清濫觴百里涵量八溟縉雲飛聲當塗政成雅頌一變江山再榮舉邑抃舞式圖丹青眉秀華蓋目朗明星鶴矯閬風麟騰玉京若揭日月昭然運行窮神闡化永世作程金陵名僧頵公粉圖慈親讚神妙不死惜生此身託體明淑而稱厥親粉為造化筆寫天真貌古松雪心空世塵文伯之母可以為鄰李居士讚至人之心如鏡中影揮斥萬變動不離靜彼質我斤揮風是騁了物無二皆為匠郢吾族賢老名喧寫真貌圖粉繪生為垢塵從白得衰與天為鄰默然不滅長存此身安吉崔少府翰畫讚齊表巨海吳嗟大風崔為令族出自太公克生奇才骨秀神聰炳若秋月騫然雲鴻爰圖伊人奪妙真宰卓立欲語謂行而在清晨一觀爽氣十倍張之座隅仰止光彩宣城吳録事畫讚大名之家昭彰日月生此髦士風霜秀骨圖真像賢傳容寫髮束帶嶽立如朝天闕巖巖兮謂四方之削成淡淡兮申五湖之澄明武庫肅穆辭峯崢嶸大辨若訥大音希聲默然不語終為國禎壁畫蒼鷹讚譏主人突兀枯樹傍無寸枝上有蒼鷹獨立若愁胡之攢眉凝金天之殺氣凛粉壁之雄姿觜銛劍㦸爪握刀錐羣賔失席以􅌓眙未悟丹青之所為吾嘗恐出户牖以飛去何意終年而在斯方城張少公㕔畫師猛讚張公之堂華壁照雪師猛在圖雄姿奮發森竦一作踈眉目颯灑毛骨鋸牙銜霜鉤爪抱一作把月掣蹲胡以震怒謂有夏之嶤杌永觀厥容神駭不歇羽林范將軍畫讚羽林列衛壁壘南垣四十五星光輝至尊范公拜將遙承主恩位寵虎臣封傳鴈門瞻天蹈舞踊躍精魂逐逐鶚視昂昂鴻騫心豪祖逖氣爽劉琨名震大國威揚列藩麟閣之階粉圖華軒胡兵百萬橫行縱吞爪牙帝室功業長存金銀泥畫西方淨土變相讚我聞金天之西日沒之所去中華十萬億剎有極樂世界焉彼國之佛身長六十萬億恆沙由旬眉間白毫向右宛轉如五須彌山目光清白若四大海水端坐說法湛然常存沼明金沙岸列珍樹欄楯彌覆羅網周張車渠琉璃為樓殿之飾頗黎碼瑙耀階砌之榮皆諸佛所證無虛言者金銀泥畫西方淨土變相蓋馮翊郡秦夫人奉為亡夫湖州刺史韋公之所建也夫人藴氷玉之清敷聖善之訓以伉儷大義希拯拔於幽塗父子恩深用重修於景福誓捨珍物搆求名工圖金創端繪銀設像八法功德波動青蓮之池七寶香花光映黃金之地清風所拂如生五音百千妙樂咸疑動作若巳發願未及發願若已當生未及當生精念七日必生其國功德罔極酌而難名讚曰向西日沒處遙瞻大悲顔目淨碧海水身光紫金山勤念必往生是故稱極樂珠網珍寶樹天花散香閣圖畫了在眼願託彼道場以此功德海冥祐為舟梁八十一劫罪如風掃輕霜諦觀無量壽長放玉毫光江寧楊利物畫讚太華髙嶽三峯倚天洪波經海百代生賢為夔為龍廓土濟川趙城開國玉樹凌煙筆鼓元化形分自然明珠獨轉秋月孤懸作宰作程摧剛挫堅德合窈冥聲播蘭荃鴻漸麟閣英圖可傳金鄉薛少府㕔畫鶴讚髙堂間軒兮雖聽訟而不擾圖蓬山之奇禽想瀛海之縹眇紫頂煙赩丹眸星皎昂昂欲飛一作眝眙霍若驚矯形留座隅勢出天表謂長唳於風霄終寂立於露曉凝玩益古俯察逾妍舞疑傾市聽似聞絃儻感至精以神變可弄影而浮煙志公畫讚水中之月了不可取虛空其心一作身寥廓無主錦幪鳥瓜獨行一作遊絶侣刀齊尺量扇迷陳語丹青聖容何住一作往何所琴讚嶧陽孤桐石聳天骨根老冰泉葉苦霜月斫為緑綺徽聲粲發秋風入松萬古奇絶朱虛侯讚嬴氏穢德金精摧傷秦鹿克獲漢風飛揚赤龍登天白日升光隂虹賊虐諸吕擾攘朱虛來歸㑹酌髙堂雄劍奮擊太后震惶爰鋤産祿大運乃昌功冠帝室于今不亡觀佽飛斬蛟龍圖讚佽飛斬長蛟遺圖畫中見登舟既虎嘯激水方龍戰驚波動連山拔劍曳雷電鱗摧白刃下血染滄江變感此壯古人千秋一作載若對面地藏菩薩讚大雄掩照日月崩落惟佛智慧大而光生死雪賴假普慈力能救無邊苦獨出曠劫導開橫流則地藏菩薩為當仁矣弟子扶風竇滔少以英氣爽邁結交王侯清風豪俠極樂生疾乃得惠劍於真宰湛本心於虛空願圖聖容以祈景福庶冥力慿助而厥苦有瘳爰命小才式讚其事讚曰本心若虛空清淨無一物焚蕩淫怒癡圓寂了見佛五綵圖聖像悟真非妄傳掃雪萬病盡爽然清凉天讚此功德海永為曠代宣魯郡葉和尚讚海英嶽靈誕彼開士了身皆空觀月在水如薪傳火朗徹生死如雲開天廓然萬里寂滅為樂江海而間逆旅形內虛舟世間邈彼崑閬誰云可攀李太白文集卷二十七
