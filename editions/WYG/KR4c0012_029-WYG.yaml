body:
  text: 李太白文集巻二十九唐李白撰碑文比干碑太宗文皇帝既一海内明君臣之義貞觀十九年征島夷師次殷墟乃詔贈少師比干為太師謚曰忠烈公遣大臣持節弔祭申命郡縣封墓葺祠置守冢以少牢時享著於甲令刻於金石故比干之忠益彰臣子得述其志昔商王受毒痡於四海徳悖于三正肆厥淫虐下罔敢諍於是微子去之箕子囚之而公獨死之非夫捐生之難處死之難故不可死而死是輕其生非孝也可死而不死是重其死非忠也王曰叔父親其至焉國之元臣位莫崇焉親不可以觀其危昵不可以忘其祖則成湯之業將墜于泉商王之命將絶于天整扶其顛遂諫而死剖心非痛亡殷為痛公之忠烈其若是焉故能獨立危邦横抗興運周武以三分之業有諸侯之師實其十亂之謀總其一心之衆當公之存也乃戢彼西土及公之喪也乃觀乎孟津公存而殷存公喪而殷喪興亡兩繫豈不重歟且聖人立教懲惡勸善而已矣人倫大統父子君臣而巳矣少師存則垂其統殁則垂其教奮乎千古之上行乎百王之末俾夫淫者懼佞者慙義者思忠者勸其為戒也不亦大哉而夫子稱殷有三仁是豈無微㫖嘗敢頥之曰存其身存其宗亦仁矣存其名存其祀亦仁矣亡其身圖其國亦仁矣若進死者退生者狂狷之士將奔走之襃生者貶死者宴安之人將寘力焉故同歸諸仁各順其志殊塗而一揆異行而齊致俾後人優柔而自得焉蓋春秋微婉之義必將建皇極立彞倫闢在三之門垂不二之訓以明知于世則夫人臣者既移孝於親而致之於君焉有聞親失而不諍親危而不救從容安地而自得甚哉不然矣夫孝於其親人之親皆欲其子忠於其主人之主皆欲其臣故厯代帝王皆欲精顯周武下車而封其墓魏武南遷而創其祠我太宗有天下禋百神盛其禮追贈太師謚曰忠烈申命郡縣封墳葺祠置守冢五家以少牢時享著于甲令刻于金石於戲哀傷列辟主君封徳正與神明秩視郡王身滅而榮益大世絶而祀愈長然後知忠烈之道激天感人深矣天寶十祀余尉于衛拜首祠堂魄感精動而廟在鄰邑官非式閭斵石銘表以誌丕烈銘曰縻軀非仁蹈難非智死於其死然後為義忠無二軀烈有餘氣正直聰明至今猛視咨爾來代為臣不易天長節使鄂州刺史韋公德政碑太虛既張惟天之長所以白帝真人當髙秋八月五日降西方之金精採天長為名將傳之無窮紀聖誕之節也我髙祖創業太宗成之三后繼統王猷如一大盗間起開元中興力倍造化功包天地不然何能遏犧農之頽波返淳朴於太古雖軒后至道由聞蚩尤之師今網漏吞舟而胡夷起於轂下先天文武孝感皇帝越在明兩總戎扶風正帝車於北斗拯横流於鯨口迴日轡於西山拂蒙塵於帝顔呼吸而收兩京烜爀而安六合厯列辟而罕匹顧將來而無儔太陽重輪合耀並出宇宙翕變草木増榮一麾而靜妖氛成功不處五讓而傳劍璽德冠樂推於戲昔堯及舜禹皆無聖子審厯數去巳終大寶假人飾讓以成千載之美未若以文明鴻業授之元良與天同休相統億祀則我唐至公而無私越三聖而殊軌騰萬人之喜氣爛八極之祥雲上皇思汾陽而髙蹈解負重於吾君能事斯畢與人更始乃展祀郊廟望秩山川方掩骼於河洛弔人於幽燕但誅元凶不問小罪噫大塊之氣歌炎漢之風雲滂洋雨汪濊澡渥澤除瑕纇削平國步改號乾元至矣哉其雄圖景命有如此者我邦伯韋公大彭之洪𦙍扶陽之貴族雄略邁古髙文變風運當一賢才堪三事厯職剖劇能聲旁流衣繡而白筆横冠分符而彤襜入境曩者永王以天人授鉞東廵無名利劍承喉以脅從壯心堅守而不動房陵之俗安於太山休弈列郡去若始至帝召岐下深嘉直誠移鎮夏口救時艱也慎厥職康乃人減兵歸農除害息暴大水滅郭洪霖注川人見憂於魚鼈岸不辨於牛馬公乃抗辭正色言于城隍曰若一日雨不歇吾當伐喬木焚清祠精心感動其應如響無何中使銜命常祈名山廣徴牲牢驟欲致祭公又盱衡而稱曰今主上明聖懷於百靈此淫昏之鬼不載祀典若煩國禮是荒巫風其秉心達識皆此類也物不知化如登春臺有若江夏縣令薛公揖四豪之風當百里之寄幹蠱有立含章可貞遵之典禮恤疲於和樂政其成也臻於小康中京重覩於漢儀列郡還聞於舜樂選鄂之勝帳于東門乃登豳歌擊土鼓祀蓐收迎田祖招揺廻而大火乃落閶闔啓而凉風始歸笙竽和籥之音象星辰而迭奏吳楚巴渝之曲各土風而備陳禮容有穆簪笏列序羅衣蛾眉立乎玳筵之上班劍虎士森乎翠幕之前千變百戲分曹賈勇藺子跳劍迭躍流星之輝都盧尋橦倒挂浮雲之影百川繞郡落天鏡於江城四山入牖照霜空之海色獻觴醉於晩景舞袖紛於廣庭鶴髮之􅅱鴈序而進曰恭聞天子無戲言恐轉公以大用老父不畏死願留公以上聞悦坐棠而飡風庶刻石以寘美白觀樂入楚聞韶在齊採諸行謡遂作頌曰爽朗太白雄光下射崢嶸金天華嶽旁連降精騰氣赫矣昭然誕聖五日垂休萬年孽胡挻災大人有作雷霆發揚欃槍乃落九服交泰五雲縈薄掃雪屯蒙洗清寥廓軒后訪道來登峨嵋上皇西去異代同時六龍轉駕兩曜迴規重遭唐主更覩漢儀肅肅韋公大邦之翰秀骨嶽立英謀電斷宣風樹聲逺威逆亂不長不極樂奏爭觀丸劍揮霍魚龍屈盤東廻舞袖西笑長安頌聲載路豐碑是刋溧陽瀨水貞義女碑銘皇唐葉有六聖再造八極鏡照萬方幽明咸熈天秩有禮自太古及今君君臣臣烈士貞女采其名節尤彰可激清頽俗者皆掃地而祠之蘭蒸椒漿嵗祀罔缺而兹邑貞義女光靈翳然埋冥古逺琬琰不刻豈前修愽達者為邦之意乎貞義女者溧陽黄山里史氏之女也以家溧陽史闕書之歳三十弗移天于人清英㓗白事母純孝手柔荑而不龜身擊漂以自業當楚平王時平王虐忠助讒苛虐厥政芟於尚斬於奢血流于朝赤族伍氏怨毒於人何其深哉子胥始東奔勾吳月涉星遁或七日不火傷弓于飛逼迫於昭關匍匐於瀨渚捨車而徒告窮此女目色以臆授之壺漿全人自沉形與口滅卓絶千古聲凌浮雲激節必報之讎雪誠無疑之地難乎哉借如曹娥潜波理貫於孝道聶姊殞肆槩動於天倫魯姑棄子以却三軍之衆漂母進飯没受千金之恩方之於此彼或易爾卒使伍君開張闔閭傾蕩鄢郢吳師鞭屍於楚國申胥泣血於秦庭我亡爾存亦各壯志張英風於古今雪大憤於天地微此女之力雖云為之士焉能咆哮烜爀施於後世也望其溺所愴然低廻而不能去每風號吳天月苦荆水響像如在精魂可悲惜其投金有泉而刻石無主哀哉邑宰滎陽鄭公名晏家康成之學世子産之才琴清心閑百里大化有若主簿扶風竇嘉賔縣尉廣平宋陟丹陽李濟南朝陳然清河張昭皆有卿才霸略同事相協緬紀英淑勒銘道周雖陵頽海竭文或不死其辭曰粲粲貞女孤生寒門上無所天下報母恩春風三十花落無言乃如之人激漂清源碧流素手縈彼潺湲求思不可秉節而存伍胥東奔乞食於此女分壺漿滅口而死聲動列國義形壯士入郢鞭屍還吳雪恥投金瀨沚報徳稱美明明千秋如月在水武昌宰韓君去思頌碑仲尼大聖也宰中都而四方取則子賤大賢也宰單父人到于今而思之乃知德之休明不在位之髙下其或繼之者得非韓君乎君名仲卿南陽人也昔延陵知晉國之政必分於韓獻子雖不能遏屠岸之誅存孤嗣趙太史公稱天下陰德也其賢才羅生列侯十世不亦宜哉七代祖茂後魏尚書令安定王五代祖鈞金部尚書曽祖晙銀青光禄大夫雅州刺史祖泰曹州司馬考睿素朝散大夫桂州都督府長史分茅納言剖符佐郡弈葉明德休有烈光君乃長史之元子也妣有吳錢氏及長史即世夫人早孀𢎞聖善之規成名四子文伯孟軻二母之儔歟少卿當塗縣丞感槩重諾死節於義雲卿文章冠世拜監察御史朝廷呼為子房紳卿尉髙郵才名振耀幼負美譽君自潞州銅鞮尉調補武昌令未下車人懼之既下車人悦之惠如春風三月大化姦吏束手豪宗側目有㸑玉者三江之巨横白額旦去清琴髙張兼操刀永興二邑同化時鑿齒磨牙而兩京宋城易子而炊骨吳楚轉輸蒼生熬然而此邦晏如襁負雲集居未二載户口三倍其初銅鐵曽青未擇地而出大冶鼓鑄如天降神既烹且爍數盈萬億公私其頼之官絶請託之求吏無絲毫之犯本道採訪大使皇甫公侁聞而賢之擢佐輶軒多所𢎞益尚書右丞崔公禹稱之於朝相國崔公渙特奏授鄱陽令兼攝數縣所謂投刃而皆虛為其政而則理成去若始至人多懷恩新宰王公名庭璘巖然太華浼然洪河含章可貞幹蠱有立接武比德絃歌連聲服美前政聞諸耆老與邑中賢者胡思泰一十五人及諸寮吏式歌且舞願揚韓公之遺美白採謡刻石而作頌曰峨峨楚山浩浩漢水黄金之車大吳天子武昌鼎據實為帝里時囏世訛薄俗如燬韓君作宰撫兹遺人滂注王澤猶鴻得春和風潛暢惠化如神刻石萬古永思清塵虞城縣令李公去思頌碑王者立國君人聚散六合咸土以百里雷其威聲華其俗而風之漁其人而涵之其猶衆鮮洋洋樂化在水波而動之則憂赬尾之刺作焉徐而清之則安頒首之頌興焉茍非大賢孰可育物而能光昭絃歌卓立振古則有虞城宰公焉公名錫字元勲隴西成紀人也髙祖揩隋上大將軍緜益原三州刺史封汝陽公曽祖騰雲皇朝廣茂二州都督廣武伯祖立節起家韓王府記室參軍襲廣武伯父浦郢海淄唐陳五州刺史魯郡都督廣平太守襲廣武伯皆納忠王庭名鏤鐘鼎侯伯繼跡故可略而言焉公即廣武伯之元子也年十九拜北海壽光尉心不挂細務口不言人非羣吏罕測望風敬憚秩滿轉右武衛倉曹參軍次任趙郡昭應縣令奉詔修建初啟運二陵總徒五郡支用三萬貫舉築雷野不鞭一人功成餘八千貫其幹能之聲大振乎齊趙矣時名卿巡按陵有黄赤氣上衝太微散為慶雲數千處蓋精勤動天地也如此因粉圖奏名編入國史天寶四載拜虞城令而天章寵榮俾金玉王度冏若七曜昭囘堂隅於戲敬之哉宸威臨顧作訓以理其俗魯而木舒而徐急則很戾緩則鳥散公酌以鈞道和之琴心于是安四人敷五教處必糲食行惟單車觀其約而吏儉仰其敬而俗讓激直士之素節揚亷夫之清波三月政成鄰境取則因行春見枯骸于路隅惻然疚懷出俸而葬由是百里掩骸四封歸仁有居喪行號城市者習以成俗公勗之親鄰厄以凶事而鰥寡惸獨衆所賴焉可謂變其頹風永錫爾類先時邑中有聚黨横猾者實惟二耿之族幾百家焉公訓為純人易其里曰大忠正之里北境黎丘之古鬼焉或醉父以刃其子自公到職蔑聞為災官宅舊井水清而味苦公下車嘗之莞爾而笑曰既苦且清足以符吾志也遂汲用不改變為甘泉蠡丘館東有三柳焉公往來憇之飲水則去行路勿剪比于甘棠鄉人因樹而書頌四十有六篇惟公志氣塞乎天地徳音發乎聲容縞乎若寒崖之霜湛乎若清川之月彈惡雪善速若箭飛尤能筆工新文口吐雅論天下美士多從之遊非汝陽三公三伯之積德則何以生此邑之賢老劉楚瓌等乃相謂曰我李公以神明之化大賴于虞人虞人陶然歌詠其徳官則敬去則思山川鬼神猶懷之况于人乎乃咨羣寮興去思之頌縣丞王彦暹員外丞魏陟主簿李詵縣尉李向趙濟盧榮等同德比義好謀而成相與採其瓌蹤茂行俾刻石篆美庶清風令名奮乎百世之上其詞曰激揚之水兮白石有鑿李公之來兮雪虞人之惡厥德孔昭折獄既清五教大行殷雲雷之聲既父其父又子其子春之以風化成草靡乃影我崗乃雨我田陽無驕􅄽四載有年人戴公之賢猶百里之天棄余往矣茫如墜川哀喪惠愽掩骼仁深苦井變甘凶人易心三栁勿剪永思清音為竇氏小師祭璿和尚文年月日某謹以齊􅂼之奠敢昭告于和尚之靈伏惟和尚降靈自天依化遊世角立獨出嶷然生知鳳凰開九包之翼豫章横萬頃之陂始傳燈而納照因落髮以從師邁龍象以蹴踏為天人之羽儀紹釋風於西域迴佛日於東維若大塊之噫氣鼓和風而一吹熱惱清灑道芽榮滋走吳楚以宗仰將掃地而歸之嗚呼來無所從去復何適水還火歸蕭散本宅寶舟輟棹禪月掩魄痛一往而無蹤愴雙林之變白某早承訓誨偏荷恩慈忝餐風於法侣旋落䕃於禪枝號無輟響泣有餘悲手撰茗藥精誠嚴思冀神道之昭格庶明靈而饗之為宋中丞祭九江文謹以三牲之奠敬祭于長源公之靈惟神包括乾坤平凖天地劃三峽以中斷疏九道以爭奔綱紀南維朝宗東海牲玉有禮祀典無虧今萬乗蒙塵五陵慘黷蒼生悉為白骨赤血流於紫宫宇宙倒懸欃槍未滅含識結憤思剪元凶若思參列雄藩各當重寄遵奉天命大舉天兵照海色於旌旗肅軍威於原野而洪濤渤潏狂飈振驚惟神使陽侯巻波羲和奉命樓船先濟士馬無虞掃妖孽於幽燕斬鯨鯢於河洛惟神祐我降休于民敬陳精誠庶垂歆饗李太白文集巻二十九
