body:
  text: 李太白文集巻二唐李白撰歌詩三十一首樂府一逺别離逺别離古有皇英之二女乃在洞庭之南瀟湘之浦海水直下萬里深誰人不言此離苦日慘慘兮雲冥冥猩猩啼煙兮鬼嘯雨我縱言之將何補皇穹竊恐不照余之忠誠雷憑憑兮欲吼怒堯舜當之亦禪禹君失臣兮龍為魚權歸臣兮䑕變虎或云堯幽囚舜野死九疑聨綿皆相似重瞳孤墳竟何是帝子泣兮緑雲間隨風波兮去無還慟哭兮逺望見蒼梧之深山蒼梧山崩湘水絶竹上之淚乃可滅公無渡河黄河西來決崑崙咆哮萬里觸龍門波滔天堯咨嗟大禹理百川兒啼不窺家殺湍堙洪水九州始蠶麻其害乃去茫然風沙被髪之叟狂而癡清晨徑一作臨流欲奚為旁人不惜妻止之公無渡河苦渡之虎可搏河難憑公果溺死流海湄有長鯨白齒若雪山公乎公乎挂骨於其間箜篌所悲竟不還蜀道難諷章仇兼瓊也噫吁嚱危乎髙哉蜀道之難難於上青天蠶叢及魚鳬開國何茫然爾來四萬八千嵗不一作乃與秦塞通人煙西當太白有鳥道何一作可以横絶峨眉巔地崩山摧壯士死然後天梯石棧方一作相鉤連上有六龍回日之髙標一作横河㫁海之浮雲下有衝波逆折之回川黄鶴之飛尚不得一作過猨猱欲度愁攀縁一作牽青泥何盤盤百歩九折縈巗巒捫參歴井仰脅息以手撫膺坐長歎問君西遊何時還畏途巉巗不可攀但見悲鳥號古木雄飛雌從遶林間又聞子規啼夜月愁空山蜀道之難難於上青天使人聽此凋朱顔連峯去天不盈尺一作入煙幾千尺枯松倒挂倚絶壁飛湍暴流爭喧豗砅崖轉石萬壑雷其嶮也若此嗟爾逺道之人胡為乎來哉劒閣崢嶸而崔嵬一夫當關萬人一作夫莫開所守或匪親一作人化為狼與豺朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如早還家蜀道之難難於上青天側身西望長咨嗟一作令人嗟梁甫吟長嘯梁甫吟何時見陽春君不見朝歌屠叟辭棘津八十西來釣渭濵寧羞白髪照渌水逢時壯一作吐氣思經綸廣張三千六百鉤一作釣風期暗與文王親大賢虎變愚不測當年頗似尋常人君不見髙陽酒徒起草中長揖山東隆凖公入門開說一作一開游說騁雄辯兩女輟洗來趨風東下齊城七十二指麾楚漢如旋蓬狂客一作生落拓尚如此何况壯士當羣雄我欲攀龍見明主雷公砰訇震天鼔帝旁投壺多玉女三時大笑開電光倐爍晦冥起風雨閶闔九門不可通以額叩關閽者怒白日不照吾精誠杞國無事憂天傾猰㺄磨牙競人肉騶虞不折生草莖手接飛猱搏彫虎側足焦原未言苦智者可巻愚者豪世人見我輕鴻毛力排南山三壯士齊相殺之費二桃吳楚弄兵無劇孟亞夫咍爾為徒勞梁甫吟聲正悲張公兩龍劒神物合有時風雲感㑹起屠釣大人􅒈屼當安之烏夜啼黄雲城邉烏欲棲歸飛啞啞枝上啼機中織錦秦川女一作閨中織婦秦家女碧紗如煙隔䆫語停梭悵然一作望憶逺人一作問人憶故夫獨宿孤房一作獨宿空堂一作知在流沙淚如雨一作停梭向人問故夫知在關西淚如雨烏棲曲姑蘇臺上烏棲時吳王宫裏醉西施吳歌楚舞歡未畢青山欲銜半邉日銀箭金壺一作金壺丁丁漏水多起看秋月墜江波東方漸髙奈樂何一作爾何戰城南去年戰桑乾源今年戰葱河道洗兵條支海上波放馬天山雪中草萬里長征戰三軍盡衰老匈奴以殺戮為耕作古來唯見白骨黄沙田秦家築城備胡處漢家還有烽火燃烽火燃不息征戰一作長征無已時野戰格鬭死敗馬號鳴向天悲烏鳶啄人腸銜飛上挂枯樹枝一作上枯枝士卒塗草莽將軍空爾為乃知兵者是凶器聖人一作君不得已而用之將進酒一作惜空樽酒君不見黄河之水天上來奔流到海不復回君不見髙堂明鏡悲白髪朝如青絲暮成一作如雪人生得意須盡歡莫使金樽空對月天生我材必有用一作開又云天生我身必有財又作天生吾徒有俊材千一作黄金散盡還復來烹羊宰牛且為樂㑹須一飲三百杯岑夫子丹丘生進酒君莫停一作將進酒杯莫停與君歌一曲請君為我傾耳聽鐘鼓饌玉不足貴一作玉帛豈足貴但願長醉不用一作復醒古來聖賢皆寂寞一作死盡唯有飲者留其名陳王昔時一作日宴平樂斗酒十千恣歡謔主人何為言少錢徑須沽取對君酌一作且須沽酒共君酌五花馬千金裘呼兒將出換美酒與爾同銷萬古愁行行且逰獵篇邉城兒生年不讀一字書但知逰獵誇輕趫胡馬秋肥宜白草騎來躡影何矜驕一作可憐驕金鞭拂雪揮鳴鞘半酣呼鷹出逺郊弓彎一作彎弧滿月不虚發雙鶬迸落連飛􅐴海邉觀者皆辟易猛氣英風振沙磧儒生不及逰俠人白首下帷復何益飛龍引二首黄帝鑄鼎於荆山錬丹砂丹砂成黄金騎龍飛去太上家雲愁海思令人嗟宫中綵女顔如花飄然揮手凌紫霞從風縱體登鑾一作鸞車登鑾車侍軒轅遨逰青天中其樂不可言鼎湖流水清且閑軒轅去時有弓劒古人傳道留其間後宫嬋姢多花顔乗鸞飛煙亦不還騎龍攀天造天關造天關聞天語屯雲河車載玉女載玉女過紫皇紫皇乃賜白兎所𢷬之藥方後天而老凋三光下視瑶池見王母蛾眉蕭颯如秋霜天馬歌天馬來出月支窟背為虎文龍翼骨嘶青雲振緑髪蘭筋權竒走滅没騰崑崙歴西極四足無一蹶雞鳴刷燕晡秣越神行電邁躡恍惚天馬呼飛龍一作黄趨目明長庚臆雙鳬尾如流星首渴烏口噴紅光汗溝珠曽陪時龍躍天衢羈金絡月照星一作皇都逸氣稜稜凌九區白璧如山誰敢沽回頭笑紫鷰但覺爾輩愚天馬奔戀君軒駷躍驚矯浮雲翻萬里足躑躅遥瞻閶闔門不逢寒風子誰採逸景孫白雲在青天丘陵逺崔嵬鹽車上峻坂倒行逆施畏日晚伯樂剪拂中道遺少盡其力老棄之願逢田子方惻然為我思一作悲雖有玉山禾不能療苦一作我饑嚴霜五月凋桂枝伏櫪銜寃摧兩眉請君贖獻穆天子猶堪弄影舞瑶池行路難三首第三首一作古興金鐏清酒斗十千玉盤珍羞直萬錢停杯投筯不能食㧞劒四顧心茫然欲渡黄河冰塞川將登太行雪暗天一作滿山閑來垂釣坐一作碧溪上忽復乗舟夢日邉行路難行路難多岐路今安在長風破浪㑹有時直挂雲帆濟滄海大道如青天我獨不得出羞逐長安社中兒赤雞白狗一作雉賭梨栗彈劒作歌奏苦聲曳裾王門不稱情淮隂市井笑韓信漢朝公卿忌賈生君不見昔時燕家重郭隗擁篲折節無嫌猜劇辛樂毅感恩分輸肝剖膽効英一作俊才昭王白骨縈蔓草誰人更掃黄金臺行路難歸去來有耳莫洗潁川水有口莫食首陽蕨含光混世貴無名何用孤髙比雲月吾觀自古賢達人功成不退皆殞身子胥既棄吳江上屈原終投湘水濵陸機雄才豈自保李斯稅駕苦不早華亭鶴唳詎可聞上蔡蒼鷹何足道君不見吳中張翰稱一作真達生秋風忽憶江東行且樂生前一杯酒何須身後千載名長相思長相思在長安絡緯秋啼金井欄微一作凝霜淒淒簟色寒孤燈不明一作寐又作眠思欲絶巻帷望月空長歎美人如花一作佳期迢迢隔雲端上有青冥之髙天下有渌水之波瀾天長路逺魂飛苦夢魂不到關山難長相思摧心肝上留田行至上留田孤墳何崢嶸積此萬古恨春草不復生悲風四邉來腸斷白楊聲借問誰家地埋没蒿里塋古老向余言言是上留田蓬科馬鬛今已平昔之弟死兄不葬他人於此舉銘旌一鳥死百鳥鳴一獸走百獸驚桓一作常山之禽别離苦欲去回翔不能征田氏倉卒骨肉分青天白日摧紫荆交讓之木本同形東枝顦顇西枝榮無心之物尚如此參商胡乃尋天兵孤竹延陵讓國揚名髙風緬邈頽波激清尺布之謡塞耳不能聽春日行深宫髙棲入紫清金作蛟龍盤繡楹一作繡作楹佳人當䆫弄白日絃將手語彈鳴箏春風吹落君王耳此曲乃是昇天行因出天池汎蓬瀛樓船蹙沓波浪驚三千雙蛾獻歌笑撾鐘考皷宫殿傾萬姓聚舞歌太平我無為人自寧三十六帝欲相迎仙人飄翩下雲軿帝不去留鎬京安能為軒轅獨往入窅冥小臣拜獻南山夀陛下萬古垂鴻名前有樽酒行二首春風東來忽相過金樽渌酒生微波落花紛紛稍覺多美人欲醉朱顔􅋳青軒桃李能幾何流光欺人忽蹉􅋸君起舞日西一作将夕當年意氣不肯傾白髪如絲一作白首垂絲歎何益琴奏龍門之緑桐玉壺美酒清若空催絃拂柱與君飲看朱成碧顔始紅一作眼白看杯顔色紅胡姬貌如花當壚笑春風笑春風舞羅衣君今不醉欲安歸夜坐吟冬夜夜寒覺夜長沉吟久坐坐北堂冰合井泉月入閨金釭青凝照悲啼金釭滅啼轉多掩妾淚聽君歌歌有聲妾有情情聲合兩無違一語不入意從君萬曲梁塵飛野田黄雀行逰莫逐炎洲翠棲莫近吳宫鷰吳宫火起焚爾窠炎洲逐翠遭網羅蕭條兩翅蓬蒿下縱有鷹鸇奈若一作爾何箜篌謡續古詞亦曰引攀天莫登龍走山莫騎虎貴賤結交心不移唯有嚴陵及光武周公稱大聖管蔡寧相容漢謡一斗粟不與淮南舂兄弟尚路人一作行路吾心安所從他人方寸間山海幾千重輕言託朋友對面九疑峯多花必早落桃李不如松管鮑久已死何人繼其蹤雉朝飛一有絃字麥隴青青三月時白雉朝飛挾兩雌錦衣綺翼何離褷犢牧採薪感之悲春天和白日暖啄食飲泉勇氣滿爭雄鬭死繡頸斷雉子班奏急管絃心傾美酒盡玉椀枯楊枯楊爾生荑我獨七十而孤棲彈絃寫恨意不盡瞑目歸黄泥上雲樂老胡文康詞或云范雲及周捨所作今擬之金天之西白日所没康老胡鶵生彼月窟巉巗容儀戍削風骨碧玉炅炅一作皎皎雙目瞳黄金拳拳兩鬢紅一作髪華蓋垂下睫嵩岳臨上脣不覩譎詭皃豈知造化神大道是文康之嚴父元氣乃文康之老親撫頂弄盤古推車轉天輪云見日月初生時鑄冶火精與水銀陽烏未出谷顧兎半藏身女媧戲黄土團作愚下人散在六合間濛濛若沙塵生死了不盡誰明此胡是仙真西海栽若木東溟植扶桑别來幾多時枝葉萬里長中國有七聖半路頽鴻荒陛下應運起龍飛入咸陽赤眉立盆子白水興漢光叱咤四海動洪濤為簸揚舉足蹋紫微天關自開張老胡感至徳東來進仙倡五色師子九苞鳯皇是老胡鷄犬鳴舞飛帝鄊淋漓颯沓進退成行能胡歌獻漢酒跪雙膝並兩肘散花指天舉素手拜龍顔獻聖夀北斗戾南山摧天子九九八十一萬嵗長傾萬嵗一作年杯夷則格上白鳩拂舞辭鏗鳴鐘考朗鼔歌白鳩引拂舞白鳩之白誰與隣霜衣雪襟誠可珍含哺七子能平均食不咽性安一作可馴首農政鳴陽春天子刻玉杖鏤形賜耆人白鷺一作鷹之白非純真外潔其色心匪仁闕五徳無司晨胡為啄我葭下之紫鱗鷹鸇鵰鶚貪而好殺鳯皇雖大聖不願以為臣日出入行日出東南隅似從地底來厯天又復入西海六龍所舎安在哉其始與終古不息一作其行終古不休息人非元氣安得與之久徘徊草不謝榮於春風木不怨落於秋天誰揮鞭䇿驅四運萬物興歇皆自然羲和羲和汝奚汩没於荒淫之波魯陽何徳駐景揮戈逆道違天矯誣實多吾將囊括大塊浩然與溟涬同科塞上曲嚴風吹霜海草凋筋幹精堅邉馬驕漢家戰士三十萬將軍兼領一作誰者霍嫖姚流星白羽􅆎間挿劒花秋蓮光出匣天兵照雪下玉關飛箭如沙射金甲雲龍風虎盡一作晝交回太白入月敵可摧敵可摧旄頭滅壯士投戈同㰱血䇿名丹霄上揚威紫塞傍武功成漢道昌陛下之夀三千霜但歌大風雲飛揚安用猛士兮守四方北風行燭龍棲寒門光耀猶旦開日月照之何不及此一作日月之賜不及此唯有北風號怒天上來燕山雪花大如席片片吹落軒轅臺幽州思婦十二月停歌罷笑雙蛾摧倚門望行人念君長城苦寒良可哀别時提劒救邉去遺此虎文金鞞靫中有一雙白羽箭蜘蛛結網生塵埃箭空在人今戰死不復回不忍見此物焚之已成一作以為灰黄河捧土尚可塞北風雨雪恨難裁一作哉俠客行趙客縵胡纓吳鉤霜雪明銀鞍照白馬颯沓如流星十歩殺一人千里不留行事了拂衣去深藏身與名閑過信陵飲脫劒膝前一作上横將炙啖朱亥持觴勸侯嬴三杯吐然諾五嶽倒為輕眼花耳熱後意氣素霓生救趙揮金槌邯鄲先震驚千秋二壯士烜赫大梁城縱死俠骨香不慙世上英誰能書閣下白首太𤣥經關山月明月出天山蒼茫雲海間長風幾萬里吹度玉門關漢下白登道胡窺青海灣由來征戰地不見有人還戍客望邉色一作邑思歸多苦顔髙樓當此夜歎息未應閑一作還李太白文集巻二
