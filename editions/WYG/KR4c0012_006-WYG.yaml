body:
  text: 李太白文集巻六唐李白撰歌詩六十八首歌吟下梁園吟一作梁園醉酒歌梁宋我浮一作乗黄河一作雲去京關挂席欲進一作往波連山天長水闊厭遠涉訪古始及平臺間平臺為客憂思多對酒一作醉來遂作梁園歌却憶蓬池阮公詠因吟淥水揚洪波洪波浩蕩迷舊國路遠西歸安可得人生達命豈假愁且飲美酒登高樓平頭奴子揺大扇五月不熱疑一作如清秋玉一作素盤楊一作青梅為君設呉鹽如花皎白一作如雪持鹽把酒但飲之莫學夷齊事高潔一作何用孤高比雲月又作咄咄書空字還滅昔人豪貴信陵君今人耕種信陵墳荒城虛一作遠照碧山月古木盡入蒼梧雲梁王宫闕一作賔客今安在枚馬先歸不相待舞影歌聲散淥池空餘汴水東流海沈吟此事淚滿衣黄金買醉未能一作莫言歸連呼五白行一作投六博分曹賭酒酣一作看馳暉歌且謡意方逺東山髙卧時一作忽又作還起來欲濟蒼生未應晚鳴臯歌送岑徵君時梁園三尺雪在清泠池作若有人兮思鳴臯阻積雪兮心煩勞洪河凌競不可以徑度冰龍鱗兮難容舠邈仙山一作神仙之峻極兮聞天籟之嘈嘈霜崖縞皓以合沓兮若長風一作虹扇海湧滄溟之波濤𤣥猿綠羆舔舕岌一作崟危咆柯振石駭膽慄魄羣呼而相號峯崢嶸以路絶挂星辰於巖㟼送君之歸兮動鳴臯之新作交鼔吹兮彈絲觴清泠之池閣君不行兮何待若返顧之黄鶴掃梁園之羣英振大雅於東洛巾征軒兮歴阻折尋幽居兮越巘㟧盤白石兮坐素月琴松風兮寂一作昇萬壑望不見兮心氛氲蘿冥冥兮霰紛紛水横洞以下淥波小聲而上聞虎嘯谷而生風龍藏谿而吐雲㝠一作寡鶴清唳飢鼯嚬呻塊獨處此幽黙兮愀一作啼空山而一作兮愁人雞聚族以爭食鳯孤飛而無鄰蝘蜒嘲龍魚目混珍嫫母衣錦西施負薪若使巢由桎梏於軒冕兮亦奚異乎䕫龍蹩躠於風塵哭何苦而救楚笑何誇而却秦吾誠不能學二子沽名矯節以耀世兮固將棄天地而遺身白鷗兮飛來長與君兮相親鳴臯歌奉餞從翁清歸五崖山居昨憶鳴臯夢裏還手弄素月清潭間覺時枕席非碧山側身西望阻秦關麒麟閣上春還早著書却憶伊陽好青松來風吹石道綠蘿飛花覆烟草我家仙公愛清真才雄草聖凌古人欲卧鳴臯絶世塵鳴臯微茫在何處五崖峽一作溪水横樵路身披翠雲裘袖拂紫烟一作雲去去時應過嵩少間相思為折三花樹僧伽歌真僧法號號僧伽有時與我論三車問言誦呪幾千徧口道恒河沙復沙此僧本住南天竺為法頭陀來此國戒得長天秋月明心如世上青蓮色意清淨貌稜稜亦不減亦不増瓶裏千年舍利骨手中萬嵗胡孫藤嗟予落泊江淮久罕遇真僧說空有一言懺盡波羅夷再禮渾除犯輕垢白雲歌送劉十六歸山楚山秦山皆白雲白雲處處長隨君長隨君君入楚山裏雲亦隨君渡湘水湘水上女羅衣白雲堪卧君早歸金陵歌送別范宣金陵石頭巉巗如虎踞凌波欲過滄江去鍾山龍盤走勢來秀色横分歴陽樹四十餘帝三百秋功名事跡隨東流白馬小兒誰家子泰清之嵗來闗囚一作白馬金鞍誰家子吹脣虎嘯鳯皇樓金陵昔時何壯哉席巻英豪天下來冠蓋散為烟霧盡金輿玉座成寒灰扣劍悲吟空咄嗟梁陳白骨亂如麻天子龍沈景陽井誰歌玉樹後庭花此地傷心不能道目一作日下離離長春草送爾長江萬里心他年來訪南山皓勞勞亭歌在江寧縣南十五里古送別之所一名臨滄觀金陵勞勞送客堂蔓草離離生道傍古情不盡東流水此地悲風愁白楊我乘素舸同康樂朗詠清川飛夜霜昔聞牛渚吟五章今來何謝袁家郎苦竹寒聲動秋月獨宿空簾歸夢長横江詞六首人言横江好儂道横江惡一風三日吹倒山一作猛風吹倒天門山白浪高於瓦官閣海潮南去過尋陽牛渚由來險馬當横江欲渡風波惡一水牽愁萬里長横江西望阻西秦漢水東連一作楚水東流楊子津白浪如山那可渡狂風愁殺峭㠶人海神來過惡風迴浪打天門石壁開浙江八月何如此濤似連山噴雪來横江館前津吏迎向余東指海雲生郎今欲渡緣何事如此風波不可行月暈天風霧不開海鯨東蹙百一作衆川迴驚波一起三山動公無一作莫渡河歸去來金陵城西樓月下吟金陵夜寂一作靜涼風發獨上高一作西樓望呉越白雲映水揺空一作秋城白露垂珠滴秋月一作沾衣濕秋月月下沈一作長吟久不歸古來一作今相接眼中稀解道澄江淨如練令人長一作還憶謝𤣥暉東山吟去江寧城三十五里晉謝安攜妓之所一云醉過謝安東山攜妓東土山悵然悲謝安我妓今朝如花月他妓古墳荒草寒白雞夢後五一作三百嵗洒酒澆君同所懽酣來自作青海舞秋風吹落紫綺冠彼亦一時此亦一時浩浩洪流之一作高詠何必竒秋浦歌十七首秋浦秋浦長似秋蕭條使人愁客愁不可渡行上東大樓正西望長安下見江水流寄言向江水汝意憶儂不遥傳一掬淚為我達揚州秋浦猿夜愁黄山堪白頭青溪非隴水翻作斷腸流欲去不得去薄遊成久遊何年是歸日雨淚下孤舟秋浦錦駞鳥人間天上稀山雞羞淥水不敢照毛衣兩鬢入秋浦一朝颯已衰猿聲催白髮長短盡成絲秋浦多白猿超騰若飛雪牽引條上兒飲弄水中月愁作秋浦客一作曲强看秋浦花山川如剡縣風日似長沙醉上山公馬寒歌寗戚牛空吟白石爛淚滿黒貂裘秋浦千重嶺水車嶺一作人行路最竒天傾欲墮石水拂寄生枝江祖一片石青天掃畫屏題詩畱萬古綠字錦苔生千千石楠樹萬萬女貞林山山白鷺一作鷴滿澗澗白猿吟君莫向秋浦猿聲碎客心邏人横鳥道江祖出魚梁水急客舟疾山花拂靣香水如一疋練此地即平天耐可乘明月看花上酒船淥水淨素月月明白鷺飛郎聽採菱女一道夜歌歸爐火照天地紅星亂紫煙􅎼郎明月夜歌曲動寒川白髮三千丈緣愁似箇長不知明鏡裏何處得秋霜秋浦田舍翁採魚水中宿妻子張白鷴結罝映深竹桃波一步地了了語聲聞闇與山僧别低頭禮白雲當塗趙炎少府粉圖山水歌峨眉高出西極天羅浮直與南溟連名工繹思揮彩筆驅山走海置眼前滿堂空翠如可掃赤城霞氣蒼梧烟洞庭瀟湘意渺緜三江七澤情洄㳂驚濤洶湧向何處孤舟一去迷歸年征帆不動亦不旋飄如隨風落天邊心揺目斷興難盡幾時可到三山巔西峯崢嶸噴流泉横石蹙水波潺湲東崖合沓蔽輕霧深林雜樹空芊緜此中㝠昧失晝夜隱几寂聽無鳴蟬長松之下列羽客對坐不語南昌仙南昌仙人趙夫子妙年歴落青雲士訟庭無事羅衆賔杳然如在丹青一作霄裏五色粉圖安足珍真山可以全吾身若待功成拂衣去武陵桃花笑殺人永王東巡歌十一首永王軍中永王正月東出師天子遥分龍虎旗樓船一舉風波靜江漢飜為鴈鶩池三川北虜亂如麻四海南奔似永嘉但用東山謝安石為君談笑靜胡沙雷鼔嘈嘈喧武昌雲旗獵獵過尋陽秋毫不犯三呉悅春日遥看五色光龍盤虎踞帝王州帝子金陵訪古丘春風試暖昭陽殿明月還過鳷鵲樓二帝巡遊俱未迴五陵松栢使人哀諸侯不救河南地更喜賢王遠道來丹陽北固是呉關畫出樓臺雲水間千巖烽火連滄海兩岸旌旗繞碧山王出三江按五湖樓船跨海次揚都戰艦森森羅虎士征帆一一引龍駒長風挂席勢難迴海動山傾古月摧君看帝子浮江日何似龍驤出峽來祖龍浮海不成橋漢武尋陽空射蛟我王樓艦輕秦漢却似文皇欲渡遼帝寵賢王入楚關掃清江漢始應還初從雲夢開朱邸更取金陵作小山試借君王玉馬鞭指麾戎虜坐瓊筵南風一掃胡塵靜西入長安到日邊上皇西巡南京歌十首胡塵輕拂建章臺聖主西巡蜀道來劍壁門高五千尺石為樓閣九天開九天開出一成都萬戸千門入畫圖草樹雲山如錦繡秦川得及此間無華陽春樹似新豐行入新都若舊宫柳色未饒秦地綠花光不減上林紅誰道君王行路難六龍西幸萬人歡地轉錦江成渭水天迴玉壘作長安萬國同風共一時錦江何謝曲江池石鏡更明天上月後宫親一作新得照蛾眉濯錦清江萬里流雲帆龍舸下揚州北地雖誇上林苑南京還有散花樓錦水東流繞錦城星橋北挂象天星四海此中朝聖主峩眉山上一作下列仙庭秦開蜀道置金牛漢水元通星漢流天子一行遺聖跡錦城長作帝王州水淥天青不起塵風光和暖勝三秦萬國烟花隨玉輦西來添作錦江春劒閣重闗蜀北門上皇歸馬若雲屯少帝長安開紫極雙懸日月照乾坤峨眉山月歌峽路峨眉山月半輪秋影入平羌江水流夜發清溪向三峽思君不見下渝州峨眉山月歌送蜀僧晏入中京我在巴東三峽時西看明月憶峨眉月出峨眉一作峨眉山月照滄海與人萬里長相隨黄鶴樓前月華白此中忽見峨眉客峨眉山月還送君風吹西到長安陌長安大道横九天峨眉山月照秦川黄金獅子承高座白玉麈尾談重𤣥我似浮雲滯呉越君逢聖主遊丹闕一振高名滿帝都歸時一作來還弄峨眉月赤壁歌送別江夏二龍爭戰決雌雄赤壁樓船掃地空烈火張天照雲海周瑜於此破曹公君去滄江望一作弄澄碧鯨鯢唐突畱餘跡一一書來報故人我欲因一作觀之壯心魄江夏行憶昔嬌小姿春心亦自持為言嫁夫聓得免長相思誰知嫁商賈令人却愁苦自從為夫妻何曽在鄉土去年下揚州相送黄鶴樓眼看帆去遠心逐江水流只言期一載誰謂歴三秋使妾腸欲斷恨君情悠悠東家西舍同時發北去南來不逾月未知行李遊何方作箇音書能斷絶適來往南浦欲問西江船正見當壚女紅粧二八年一種為人妻獨自多悲恓對鏡便垂淚逢人只欲啼不如輕薄兒旦暮長追隨悔作商人婦青春長別離如今正好同歡樂君去容華誰得知懷仙歌一鶴東飛過滄海放心散漫知何在仙人浩歌望我來應攀玉樹長相待堯舜之事不足驚自餘囂囂真可輕巨鼇莫載三山去吾一作我欲蓬萊頂上行玉真仙人詞玉真之真一作仙人時往一作西上太華峯清晨鳴天鼔飈歘騰雙龍弄電不輟手行雲本無蹤幾時入少室王母應相逢清溪行宣城一作宣州青溪清溪清我心水色異諸水借問新安江見底何如此人行明鏡中鳥度屏風裏向晩猩猩啼空悲遠遊子詶殷佐明見贈五雲裘歌謝朓宅在當塗青山下我吟謝朓詩上語朔風颯颯吹飛雨謝朓已没青山空後來繼之有殷公粉圖珍裘五雲色曄如晴天散綵虹文章彪炳光陸離應是素娥玉女之所為輕如松花落金粉濃似苔錦含碧滋遠山積翠横海島殘霞飛丹映江草凝毫採掇花露容幾年功成奪天造故人贈我我不違著令山水含晴暉一作清輝頓驚謝康樂詩興生我衣襟前林壑斂暝色袖上烟霞收夕霏羣仙長歎驚此物千崖萬嶺相縈鬱身騎白鹿行飄颻手翳紫芝笑披拂相如不足誇鷫鸘王恭鶴氅安可方瑶臺雪花數千㸃片片吹落春風香為君持此凌蒼蒼上朝三十六玉皇下窺夫子不可及矯手相思空斷腸臨路歌大鵬飛兮振八裔中天摧兮力不濟餘風激兮萬世遊扶桑兮挂石袂後人得之傳此仲尼亡兮誰為出涕歴陽壯士勤將軍名思齊歌并序厯陽壯士勤將軍神力出於百夫則天太后召見竒之授遊擊將軍賜錦􅂁玉帶朝野榮之後拜横南將軍大臣慕義結十友即燕公張說館陶公郭元振為首余壯之遂作詩太古歴陽郡化為洪川在江山猶鬱盤龍虎祕光彩蓄洩數千載風雲何霮䨴特生勤將軍神力百夫倍草書歌行少年上人號懷素草書天下稱獨步墨池飛出北溟魚筆鋒殺盡中山兔八月九月天氣涼酒徒辭客滿高堂牋麻素絹排數箱宣州石硯墨色光吾師醉後倚䋲牀須臾掃盡數千張飄風驟雨驚颯颯落花飛雪何茫茫起來向壁不停手一行數字大如斗怳怳如聞神鬼驚時時只見龍蛇走左盤右蹙如驚電狀同楚漢相攻戰湖南七郡凡幾家家家屏障書題徧王逸少張伯英古來幾許浪得名張顛老死不足數我師此義不師古古來萬事貴天生何必要公孫大娘渾脫舞古意君為女蘿草妾作兔絲花輕條不自引為逐春風斜百丈託遠松纒緜成一家誰言㑹靣易各在青山崖女蘿發馨香兔絲斷人腸枝枝相糾結葉葉竟飄揚生子不知根因誰共芬芳中巢雙翡翠上宿紫鴛鴦君識二草心海潮亦可量山鷓鴣詞苦竹嶺頭秋月輝苦竹南枝鷓鴣飛嫁得燕山胡鴈壻欲銜我向鴈門歸山雞翟雉來相勸南禽多被北禽欺紫塞嚴霜如劍㦸蒼梧欲巢難背違我心誓死不能去哀鳴驚叫淚霑衣和盧侍御通塘曲君誇通塘好通塘勝耶溪通塘在何處宛在尋陽西青蘿嫋嫋拂烟樹白鷴處處聚沙堤石門中斷平湖出百丈金潭照雲日何處滄浪垂釣翁鼔棹漁歌趣非一相逢不相識出没繞通塘浦邊清水明素足別有浣紗呉女郎行盡淥潭潭轉幽疑是武陵春碧流秦人雞犬桃花裏將比通塘渠見羞通塘不忍別十去九遲迴偶逢佳境心已醉忽有一鳥從天來月出青山送行子四邊苦竹秋聲起長吟白雪望星河雙垂兩足揚素波梁鴻德耀㑹稽日寧知此中樂事多李太白文集巻六
