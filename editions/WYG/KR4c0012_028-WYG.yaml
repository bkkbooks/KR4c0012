body:
  text: 李太白文集巻二十八唐李白撰頌銘記趙公西候新亭頌惟十有四載皇帝以歳之驕陽秋五不稔乃慎擇明牧恤南方凋枯伊四月孟夏自淮陰遷我天水趙公作藩于宛陵祇明命也惟公代秉天憲作保南臺洪柯大本聿生懿徳宜乎哉横風霜之秀氣鬱王霸之竒略初以鐡冠白筆佐我燕京威雄振肅虜不敢視而後鳴琴二邦天下取則起草三省朝端有聲天子識面宰衡動聽殷南山之雷剖赤縣之劇强項不屈三州所居大化咸列碑頌至於是邦也酌古以訓俗宣風以布和平心理人兵鎮唯靜畫一千里時無莠言退公之暇清眺原隰以此郡東塹巨海西襟長江咽三吳扼五嶺輶軒錯出無旬時而息焉出自西郭蒼然古道道寡列樹行無清陰至有疾雷破山狂飈震壑炎景爍野秋霖灌途馬逼側於谷口人周章於山頂亭候靡設逢迎闕如自唐有天下作牧百數因循齷齪罔恢永圖及公來思大革前弊實相此土陟降觀之壯其廻崗龍盤沓嶺波起勝勢交至可以有作方農之隙廓如是營遂鏟崖坦堙卑驅石剪棘削汚壤堦髙隅以門以墉乃棟乃宇儉則不陋麗而不奢森沉閈閎燥濕有庇若鼇之湧如鵬斯騫縈流鏡轉涵映池底納逺海之餘清㵼連峯之積翠信一方雄勝之郊五馬踟蹰之地也長史齊公光乂人倫之師表司馬武公幼成衣冠之髦彦録事參軍吳鎮宣城令崔欽令德之後良材間生縱風教之樂地出人倫之髙格卓絶映古清明在躬僉謀僝功不日而就總是役也伊二公之力歟過客沉吟以稱嘆邦人聚舞以相賀僉曰我趙公之亭也羣寮獻議請因謡頌以名之則必與謝公北亭同不朽矣白以為謝公徳不及後世亭不留要衝無勿拜之言鮮登髙之賦方之今日我則過矣敢詢耆老而作頌曰眈眈髙亭趙公所營如鼇背突兀於太清如鵬翼開張而欲行趙公之宇千載有覩必恭必敬爰遊爰處瞻而思之罔敢大語趙公來翔有禮有章煌煌鏘鏘如文翁之堂清風洋洋永世不忘崇明寺佛頂尊勝陁羅尼幢頌共工不觸山媧皇不補天其洪波汩汩流伯禹不治水萬人其魚乎禮樂大壞仲尼不作王道其昏乎而有功包陰陽力掩造化首出衆聖卓稱大雄彼三者之不足徴矣粤有我西方金僊之垂範覺曠劫之大夢碎羣愚之重昏寂然不動湛而常存使苦海靜滔天之波疑山滅炎崑之火囊括天地置之清凉日月或墜神通自在不其偉歟魯郡崇明寺南門佛頂尊勝陁羅尼石幢者蓋此都之壯觀昔善住天子及千大天遊于園觀又與天女遊戲受諸快樂即於夜分中聞有聲曰善住天子七日滅後當生七反畜生之身於是如來授之吉祥真經遂脱諸苦蓋之天徴為大法印不可得而聞也我唐髙宗時有􅄢賔桑門持入中土猶日藏大寶清園虛空檀金淨彩人皆悦見所以山東開士舉國而崇之時有萬商投珍士女雲㑹衆布蓄沓如陵琢文石於他山聳髙標於列肆鑱珉錯綵為鯨為螭天人海怪若叱若語貝葉金言刋其上荷花水物形其隅良工草萊獻技而去聖君垂拱南面穆清而居大明廣運無幽不燭以天下所立兹幢多臨諸旗亭喧囂湫隘本非經行網繞之所乃頒下明詔令移於寶坊吁百尺中標矗若雲斷委翳苔蘚周流星霜俾龍象興嗟仰瞻無地良可嘆也我太官廣武伯隴西李公先名琬奉詔書改為輔其從政也肅而寛仁而惠五鎮方牧聲聞于天帝乃加剖竹于魯魯道粲然可觀方將和陰陽於泰階致君於堯舜豈徒閉閤坐嘯鴻盤二千哉乃再崇厥功發揮象教於是與長史盧公司馬李公等咸明明在公綽綽有裕韜大國之寶鍾元精之和榮兼半刺道光列嶽才或大而用小識無微而不通政其有經談豈更僕有律師道宗心總羣妙量苞大千日何瑩而常明天不言而自運識岸浪注𤣥機清發每口演金偈舌揺電光開關延敵罕有當者由萬竅同號於一風衆流俱納於溟海若乃嚴飾佛事規矩梵天法堂鬱以霧開香樓岌乎島峙皆我公之締構也以天寶八載五月一日示滅大寺百城號天四衆泣血焚香散花扶櫬卧轍仙鶴數十飛鳴中絶非至徳動天深仁感物者其孰能與於此乎三綱等皆論窮彌天惠湛清月傳千燈於智種了萬法於真空不謀同心克樹聖跡太官李公乃命門於南垣廟通衢曾盤舊規累構餘石壯士加勇力侔拔山纔擊鼓以雷作拖鴻縻而電掣千人壯萬夫勢轉鹿盧於横梁泯環合而無際常六合之振動崛九霄之崢嶸非鬼神功曷以臻此況其清景燭物香風動塵羣形所霑積若都雪粲星辰而増輝挂文字而不滅雖漢家金莖伏波銅柱擬兹陋矣或日月圓滿方檀散華清心諷持諸佛稱贊夫如是亦可以從一天至一天開天宫之門見羣聖之顔巍巍功德不可量也其録事參軍六曹英寮及十一縣官屬有宏才碩德含香繡衣者皆列名碑陰此不具載郡人都水使者宣道先生孫太沖得真人紫蘃玉笈之書能令太一神自成還丹以獻于帝帝服享萬壽與天同休功成身退謝病而去不謂古之𤣥通微妙之士歟乃謂白曰昔王文考觀藝於魯騁雄辭於靈光陸佐公知名在吳銘雙闕於盤石吾子盍可美盛德揚中和恭承話言敢不惟命遂作頌曰揭髙幢兮表天宫嶷獨出兮凌星虹神摐摐兮來空仡扶傾兮蒼穹西方大聖稱大雄横絶苦海舟羣蒙陁羅尼藏萬法宗善住天子獲厥功明明李君牧東魯再新頽規扶衆苦如大雲王注法雨邦人清涼喜聚舞揚鴻名兮振海浦銘豐碑兮昭萬古化城寺大鐘銘噫天以震雷鼓羣動佛以鴻鐘驚大夢而能發揮沉潛開覺茫蠢則鐘之取象其義愽哉夫揚音大千所以清真心警俗慮恊響廣樂所以達元氣彰天聲銘勲皇宫所以旌豐功昭茂德莫不配美金鼎増輝寶坊仍事作制豈徒然也粤有唐宣城郡當塗縣化城寺大鐘者量函千鈞聲盈萬壑蓋邑宰李公之所剏也公名有則系𤣥元之英蕤茂列聖之天枝生于公族貴而秀出少藴才略壯而有成西逾流沙立功絶域帝疇乎厥庸始學古從政厯宰㓗白聲聞于天天書褒榮輝之簡牘稽首三復子孫其傳天寶之初鳴琴此邦不言而治日計之無近功歳計之有大利物不知化潛臻小康神明其道越不可尚方入于禪關覩天宫崢嶸聞鐘聲瑣屑乃謂諸龍象曰盍不建大法鼓樹之層臺使羣聾六時有所歸仰不亦美乎於是發一言以先覺舉百里而感應秋毫不挫人多子來銅崇朝而山積工不日而雲㑹乃採鳬氏撰鳴鐘火天地之爐扇陰陽之炭囘禄奮怒飛亷震驚金精轉涾以融熠銅液星縈而熣燦光噴日道氣歊天維紅雲㸃於太清紫煙矗於遥海烜赫宇宙功侔鬼神瑩而察之吁駭人也爾其龍質炳發虎形躨跜縻金索以上絙懸寶樓而迭擊傍振萬壑髙聞九天聲動山以隱隱響奔電而闐闐赦湯鑊於幽途息劍輪於苦海景福􅆄蠁被于人天非李公好謀而成𢎞濟羣有孰能興於此乎丞尉等並衣冠之龜龍人物之標凖大雅君子同僚盡心聞善賈勇贊成厥美寺主昇朝閑心古容英骨秀氣洒落毫素謙柔笑言海受水而皆納鏡無形而不燭直道妙用乃如是然常虛懷忘情㓗已利物是人行空寂不動見如來有若上座靈隱都維郍則舒名僧日暉藴虛常因調䕶賢哉六開士普聞八萬法深入禪惠精修律儀將愽我以文章求我以述作功德大海酌而難名遂與六曹豪吏姑孰賢老乃緇乃黄鳬趨梵庭請揚宰君之鴻美白昔忝侍從備于辭臣恭承德音敢闕清風之頌其辭曰雄雄鴻鐘砰隱天雷鼓霆擊警大千含號烜爀聲無邊摧慴魑魅招靈仙傍極六道下九泉劍輪輟苦期息肩湯鑊猛火停熾燃愷悌賢宰人父母興功利物信可久德方金鐘永不朽天門山銘梁山愽望關扃楚濵夾據洪流實為吳津兩坐錯落如鯨張鱗惟海有若唯川有神牛渚怪物目圍車輪光射島嶼氣凌星辰巻沙揚濤溺馬殺人國泰呈瑞時訛返珍開則九江納鍚閉則五嶽飛塵天險之地無徳匪親任城縣㕔壁記風姓之後國為任城蓋古之秦縣也在禹貢則南徐之分當周成廼東魯之邦自伯禽到于傾公三十二代遭楚蕩滅因屬楚焉炎漢之後更為郡縣隋開皇三年廢髙平郡移任城於舊居邑乃屢遷井則不改魯境七百里郡有十一縣任城其衝要東盤琅邪西控鉅野北走厥國南馳互鄉青帝太昊之遺墟白衣尚書之舊里土俗古逺風流清髙賢良間生掩映天下地愽厚川踈明漢則名王分茅魏則天人列土所以代變豪侈家傳文章君子以才雄自髙小人則鄙朴難治況其城池爽塏邑屋豐潤香閣倚日凌丹霄而欲飛石橋横波驚彩虹而不去其雄麗坱圠有如此焉故萬商往來四海緜厯實泉貨之橐籥為英髦之咽喉故資大賢以主東道制我美錦不易其人今鄉二十六户一萬三千三百七十一帝擇明徳以賀公宰之公温恭克修儼碩有立季野備四時之氣士元非百里之才撥煩彌閑剖劇無滯鏑百發克破於楊葉刀一鼓必合於桑林寛猛相濟弦韋適中一之歳肅而教之二之歳惠而安之三之歳富而樂之然後青衿向訓黄髮履禮耒耜就役農無游手之夫杼軸和鳴機罕嚬蛾之女物不知化陶然自春權豪鋤縱暴之心黠吏返淳和之性行者讓於道路任者併於輕重扶老攜幼尊尊親親千載百年再復魯道非神明愽逺孰能契於此乎白探竒東蒙竊聽輿論輒記於壁垂之將來俾後賢之操刀知賀公之絶跡者也李太白文集巻二十八
