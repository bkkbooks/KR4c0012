body:
  text: 李太白文集巻十九唐李白撰歌詩六十一首行役安州應城玉女湯作安州神女歿幽境湯池流大川隂陽結炎炭造化開靈泉地底爍朱火沙傍歊素烟沸珠躍晴月皎鏡涵空天氣浮蘭芳滿色漲桃花然精覽萬殊入潛行七澤連愈疾功莫尚變盈道乃全濯纓掬清泚晞髪弄潺湲散下楚王國分澆宋玉田可以奉巡幸奈何隔窮偏獨隨朝宗水赴海輸微㳙之廣陵宿常二南郭幽居淮南渌水接柴門有如桃花源忘憂或假草滿院羅叢萱暝色湖上來微雨飛南軒故人宿茅宇夕鳥歸楊園還惜詩酒别深為江海言明朝廣陵道獨憶此傾樽夜下征虜亭船下廣陵去月明征虜亭山花如繡頰江火似流螢下途歸石門舊居呉中呉山髙越水清握手無言傷别情將欲辭君挂帆去離魂不散烟郊樹此心鬱悵誰能論有愧叨承國士恩雲物共傾三月酒嵗時同餞五侯門羡君素書常滿案含丹照白霞色爛余嘗學道窮㝠筌夢中往往遊仙山何當脫屣謝時去壺中别有日月天俛仰人間易凋朽鑪峯五雲在軒牖惜别愁窺玉女牕歸來笑把洪崖手隠居寺隱居山陶公鍊液棲其間靈神閉氣昔登攀恬然但覺心緒閑數人不知幾甲子昨來猶帶氷霜顔我離雖則嵗物改如今了然識所在别君莫道不盡懽懸知樂客遥相待石門流水徧桃花我亦曽到秦人家不知何處得雞豕就中仍見繁桑麻翛然逺與世事間裝鸞駕鶴又服逺何必長從七貴遊勞生徒聚萬金産揖君去長相思雲遊雨散從此辭欲知悵别心易苦向暮春風楊栁絲客中作蘭陵美酒鬱金香玉椀盛來琥珀光但使主人能醉客不知何處是他鄉太原早秋并州歲落衆芳歇時當大火流霜威出塞早雲色渡河秋夢遶邊城月心飛故國樓思歸若汾水無日不悠悠奔亡道中五首江東蘇武天山上田横海島邊萬重關塞斷何日是歸年亭伯去安在李陵降未歸愁容變海色短服改胡衣談笑三軍却交遊七貴疎仍留一隻箭未射魯連書函谷如玉關幾時可生還洛川為易水嵩岳是燕山俗變羌胡語人多沙塞顔申包唯慟哭七日鬢毛斑淼淼望湖水青青蘆葉齊歸心落何處日沒大江西歇馬傍春草欲行逺道迷誰忍子規鳥連聲向我啼郢門秋懐荆州江夏岳陽郢門一為客巴月三成弦朔風正揺落行子愁歸旋杳杳山外日茫茫江上天人迷洞庭水雁度瀟湘烟清曠諧宿好緇磷及此年百齡何蕩漾萬化相推遷空謁蒼梧帝徒尋溟海仙已聞蓬岳淺豈見三桃圎倚劒増浩歎捫襟還自憐終當遊五湖濯足滄浪泉至鴨欄驛上白馬磯贈裴侍御側疊萬古石横為白馬磯亂流若電轉舉棹揚珠輝臨驛巻緹幕升堂接繡衣情親不避馬為我解霜威荆門浮舟望蜀江春水月峽來浮舟望安極正見桃花流依然錦江色江色渌且明茫茫與天平逶迤巴山盡遥曳楚雲行雪照聚沙雁花飛出谷鸎芳洲却已轉碧樹森森迎流目浦烟夕揚帆海月生江陵識遥火應到渚宫城上三峽巫山夾青天巴水流若兹巴水忽可盡青天無到時三朝上黄牛三暮行太遲三朝又三暮不覺鬢成絲自巴東舟行經瞿唐峽登巫山最髙峰晩還題壁江行幾千里海月十五圎始經瞿唐峽遂步巫山巔巫山髙不窮巴國盡所厯日邊攀垂蘿霞外倚穹石飛步凌絶頂極目無纎烟却顧失丹壑仰觀臨青天青天若可捫銀漢去安在望雲知蒼梧記水辨瀛海周遊孤光晚厯覽幽意多積雪照空谷悲風鳴森柯歸途行欲曛佳趣尚未歇江寒早啼猿松暝已吐月月色何悠悠清猿響啾啾辭山不忍聽揮策還孤舟早發白帝城一作白帝下江陵朝辭白帝彩雲間千里江陵一日還兩岸猿聲啼不盡輕舟已過萬重山一作須㬰過却萬重山秋下荆門霜落荆門江樹空布帆無恙挂秋風此行不為鱸魚鱠自愛名山入剡中江行寄逺刳木出呉楚危槎百餘尺疾風吹片帆日暮千里隔别時酒猶在已為異鄉客思君不可得愁見江水碧宿五松山下荀媪家宣州我宿五松下寂寥無所歡田家秋作苦鄰女夜舂寒跪進彫胡飯月光明素盤令人慚漂母三謝不能飡下涇縣陵陽溪至澁灘澁灘鳴嘈嘈兩山足猿猱白波若巻雪側石不容舠漁人與舟人撑折萬張篙下陵陽㳂髙溪三門六刺灘三門横峻灘六刺走波瀾石驚虎伏起水狀龍縈盤何慙七里瀨使我欲垂竿夜泊黄山聞殷十四呉吟昨夜誰為呉㑹吟風生萬壑振空林龍驚不敢水中卧猿嘯時聞巖下音我宿黄山碧溪月聽之却罷松間琴朝來果是滄洲逸酤酒提盤飯霜栗半酣更發江海聲客愁頓向盃中失宿鰕湖雞鳴發黄山暝投鰕湖宿白雨映寒山森森似銀竹提攜採鈆客結荷水邊沐半夜四天開星河爛人目明晨大樓去崗隴多屈伏當與持斧翁前溪伐雲木懐古西施呉越西施越溪女出自苧羅山秀色掩今古荷花羞玉顔浣紗弄碧水自與清波閑皓齒信難開沈吟碧雲間句踐徴絶艶揚蛾入呉關提攜館娃官杳𣺌詎可攀一破夫差國千秋竟不還王右軍右軍本清真瀟灑在風塵山隂遇羽客要此好鵝賓掃素寫道經筆精妙入神書罷籠鵝去何曽别主人上元夫人上元誰夫人偏得王母嬌嵯峨三角髻餘髪散垂腰裘披青毛錦身著赤霜袍手提嬴女兒閑與鳯吹簫眉語兩自笑忽然隨風飄蘇臺覽古舊苑荒臺楊栁新菱歌清唱不勝春只今唯有西江月曽照呉王宫裏人越中覽古越王勾踐破呉歸義士還家盡錦衣宫女如花滿春殿只今唯有鷓鴣飛商山四皓白髪四老人昻藏南山側偃卧松雪間㝠翳不可識雲牕拂青靄石壁横翠色龍虎方戰争於焉自休息秦人失金鏡漢祖昇紫極隂虹濁太陽前星遂淪匿一行佐明兩歘起生羽翼功成身不居舒巻在胸臆窅㝠合元化茫昧信難測飛聲塞天衢萬古仰遺迹過四皓墓我行至商洛幽獨訪神仙園綺復安在雲蘿尚宛然荒涼千古跡蕪沒四墳連伊昔鍊金鼎何言閉玉泉隴寒唯有月松古漸無烟木魅風號去山精雨嘯旋紫芝髙詠罷青史舊名傳今日併如此哀哉信可憐峴山懐古訪古登峴首慿髙眺襄中天清逺峰出水落寒沙空弄珠見遊女醉酒一作月懐山公感歎發秋興長松鳴夜風自廣平乗醉走馬六十里至邯鄲登城樓覽古書懐燕趙醉騎白花駱一作馬西走邯鄲城揚鞭動栁色寫鞚春風生入郭登髙樓山川與雲平深宫翳緑草一作雄都半古冢萬事傷人情相如章華巔猛氣折秦嬴兩虎不可鬭㢘公終負荆提攜袴中兒杵臼及程嬰空孤獻白刃一作立孤就白刃必死耀丹誠平原三千客談笑盡豪英毛君能穎脫二國且同盟皆為黄泉土使我涕縱横磊磊石子崗蕭蕭白楊聲諸賢一作賢豪沒此地碑版有殘銘太古共今時由來互衰榮傷哉何足道感激仰空一作虛名趙俗愛長劒文儒少逢迎閑從博陵一作徒遊帳飲雪朝酲一作雪中醒歌酣易水動鼓震叢臺傾日落把燭歸凌晨向燕京方陳五餌䇿一使胡塵清蘇武蘇武在匈奴十年持漢節白雁上林飛空傳一書札牧羊邊地苦落日歸心絶渴飲月窟氷飢餐天上雪東還砂塞逺北愴河梁别泣把李陵衣相看淚成血經下邳圯橋懐張子房淮泗子房未虎嘯破産不為家滄海得壯士椎秦博浪沙報韓雖不成天地皆振動潛匿遊下邳豈曰非智勇我來圯橋上懐古欽英風唯見碧流水曽無黄石公歎息此人去蕭條徐泗空月夜金陵懐古金陵蒼蒼金陵月空懸帝王州天文列宿在霸一作鼎業大江流渌水絶馳道青松摧古丘臺傾鳷鵲觀宫沒鳳皇樓别殿悲清暑芳園罷樂遊一聞歌玉樹蕭瑟後庭秋一作千古不勝愁金陵三首晉家南渡日此地舊一作即長安地即帝王宅山為龍虎盤一作碧宇樓臺滿青山龍虎盤金陵空壯觀天壍一作江塞浄波瀾醉客迴橈去呉歌且自歡一作誰云行路難地擁金陵勢城迴江一作漢水流當時百萬户夾道起朱樓亡國生春草離宫沒古丘空餘後湖月波上對瀛洲六代興亡國三盃為爾歌苑方秦地少一作小山似洛陽多古殿呉花草深宫晉綺羅併隨人事滅東逝與一作只滄波秋夜板橋浦汎月獨酌懐謝朓天上何所有迢迢白玉繩斜低建章闕耿耿對金陵漢水舊如練霜江夜清澄長川瀉落月洲渚曉寒凝獨酌板橋浦古人誰可徵𤣥暉難再得灑酒氣填膺金陵新亭金陵風景好豪士集新亭舉目山河異偏傷周顗情四坐楚囚悲不憂社稷傾王公何慷慨千載仰雄名過彭蠡湖尋陽謝公入彭蠡因此遊松門余方窺石鏡兼得窮江源前賞迹可見後來道空存而欲繼風雅豈唯清心魂雲海方助興波濤何足論青嶂憶遥月緑蘿鳴愁猿水碧或可採金膏祕莫言余將振衣去羽化出囂煩入彭蠡經松門觀石鏡緬懐謝康樂題詩書遊覽之志二篇或同或異故并録之謝公之彭蠡因此遊松門余方窺石鏡兼得窮江源將欲繼風雅豈徒清心魂前賞逾所見後來道空存况屬臨汎美而無洲渚喧漾水向東去漳流直南奔空濛三川夕迴合千里昏青桂隱遥月緑楓鳴愁猿水碧或可采金精祕莫論吾將學仙去冀與琴髙言廬江主人婦宿松孔雀東飛何處棲廬江小吏仲卿妻為客裁縫石自見城烏獨宿夜空啼陪宋中丞武昌夜飲懐古江夏清景南樓夜風流在武昌庾公愛秋月乗興坐胡牀龍笛吟寒水天河落曉霜我心還不淺懐古一作留客醉餘觴望鸚鵡洲悲禰衡魏帝營八極蟻觀一禰衡黄祖斗筲人殺之受惡名呉江賦鸚鵡落筆超羣英鏘鏘振金玉句句欲飛鳴鷙鶚啄孤鳳千春傷我情五岳起方寸隱然詎可平才髙竟何施寡識冒天刑至今芳洲上蘭蕙不忍生宿巫山下巫峽昨夜巫山下猿聲夢裡長桃花飛渌水三月下瞿塘雨色風吹去南行拂楚王髙丘懐宋玉訪古一霑裳金陵白楊十字巷白楊十字巷北夾湖溝道不見呉時人空生唐年草天地有反覆宫城盡傾倒六帝餘古丘樵蘇泣遺老謝公亭蓋謝朓范雲之所游謝亭離别處風景每生愁客散青天月山空碧水流池花春映日牕竹夜鳴秋今古一相接長歌懐舊遊紀南陵題五松山一作南陵五松山感時贈别山名銅坑村五里聖達有去就潛光愚其徳魚與龍同池龍去魚不測當時板築輩豈知傅說情一朝和一作雨殷人光氣為列星伊尹生空桑捐庖佐皇極桐宫放太甲攝政無愧色三年帝道明委質終輔翼曠哉至人心萬古可為則時命或大謬仲尼將一作其奈何鸞鳳忽覆巢麒麟不來過龜山蔽魯國有斧且無柯歸去來歸去來一作歸來歸去來宵濟越洪波夜泊牛渚懐古此地即謝尚聞袁宏詠史處牛渚西江夜青天無片雲登舟望秋月空憶謝將軍余亦能髙詠斯人不可聞明朝挂帆席一作洞庭去楓葉落一作正紛紛姑孰十詠姑孰谿愛此溪水閑乗流興無極􅃞楫怕鷗驚垂竿待魚食波翻曉霞影岸疊春山色何處浣紗人紅顔未相識丹陽湖湖與元氣連風波浩難止天外賈客歸雲間片帆起龜遊蓮葉上鳥宿蘆花裡少女棹輕舟歌聲逐流水謝公宅青山日將暝寂寞謝公宅竹裡無人聲池中虛月白荒庭衰草徧廢井蒼苔積唯有清風閑時時起泉石凌歊臺曠望登古臺臺髙極人目疊嶂列逺空雜花間平陸閑雲入牕牖野翠生松竹欲覽碑上文苔侵豈堪讀桓公井桓公名已古廢井曽未竭石甃冷蒼苔寒泉湛孤月秋來桐暫落春至桃還發路逺人罕窺誰能見清澈慈姥竹野竹攅石生含烟映江島翠色落波深虛聲帶寒草龍吟曽未聽鳳曲吹應好不學蒲栁凋貞心常自保望夫山寫望臨碧空怨情感離别江草不知愁巖花但争發雲山萬重隔音信千里絶春去秋復來相思幾時歇牛渚磯絶壁臨巨川連峰勢相向亂石流洑間迴波自成浪但驚羣木秀莫測精靈狀更聽猿夜啼憂心醉江上靈墟山丁令辭世人拂衣向仙路伏鍊九丹成方隨五雲去松蘿蔽幽洞桃杏深隠處不知曽化鶴遼海歸幾度天門山逈出江上山雙峰自相對岸映松色寒石分浪花碎參差逺天際縹緲晴霞外落日舟去遥迴首沈青靄李太白文集巻十九
