body:
  text: 李太白文集巻五唐李白撰歌詩三十三首樂府四髙句驪金花折風帽白馬小遲回翩翩舞廣袖似鳥海東來静夜思牀前看月光疑是地上霜舉頭望山月低頭思故鄉渌水曲渌水明秋日南湖採白蘋荷花嬌欲語愁殺蕩舟人鳯臺曲嘗聞秦帝女傳得鳯皇聲是日逢仙子當時别有情人吹彩簫去天借緑雲迎心一作曲在身不返空餘弄玉名猛虎行一作吟朝作猛虎行暮作猛虎吟一作行亦猛虎吟坐亦猛虎吟腸斷非闗隴頭水淚下不為雍門琴旍旌一作旌旗繽紛兩河道戰鼓驚山欲傾倒秦人半作燕地囚胡馬飜銜洛陽草一輸一失闗下兵朝降夕叛幽薊城巨鼇未斬海水動魚龍奔走安得寧頗似楚漢時翻覆無定止朝過博浪沙暮入淮隂市張良未遇韓信貧劉項存亡在兩臣暫到下邳受兵畧來投漂母作主人賢哲恓恓古如此今時亦棄青雲士有䇿不敢犯龍鱗竄身南國避胡塵寳書玉劍挂髙閣金鞍駿馬散故人昨日方為宣城客掣鈴交通二千石有時六博快壯心一作快寸心遶牀三匝呼一擲楚人每道張旭竒心藏風雲世莫知三吳邦伯皆一作多顧盻四海雄俠兩追隨一作皆相推蕭曹曾作沛中吏攀龍附鳯當有時溧陽酒樓三月春楊花茫茫一作漠漠愁殺人胡鶵緑眼吹玉笛吳歌白紵飛梁塵丈夫相見一作到處且為樂槌牛撾鼓㑹衆賔我從此去釣東海得魚笑寄情相親從軍行從軍玉門道逐虜金㣲山笛奏梅花曲刀開明月環鼓聲鳴海上兵氣擁雲間願斬單于首長驅静鐵闗秋思春陽如昨日碧樹鳴黄鸝蕪然蕙草暮颯爾凉風吹天秋木葉下月冷莎雞悲坐愁羣芳歇白露凋華滋春思燕草如碧絲秦桑低緑枝當君懐歸日是妾斷腸時春風不相識何事入羅帷秋思燕支黄葉落妾望白登臺海上一作月出碧雲斷單于一作蟬聲秋色來胡兵沙塞合漢使玉闗回征客無歸日空悲蕙草摧子夜吳歌春夏秋冬秦地羅敷女採桑緑水邊素手青條上紅粧白日鮮蠶飢妾欲去五馬莫留連春鏡湖三百里菡萏發荷花五月西施採人看隘若耶回舟不待月歸去越王家夏長安一片月萬户𢷬衣聲秋風吹不盡總是玉闗情何日平邊塞良人罷逺征秋明朝驛使發一夜絮征袍素手抽針冷那堪把剪刀裁縫寄逺道㡬日到臨洮冬對酒松子棲金華安期入蓬海此人古之仙羽化竟何在浮生速流電倐忽變光彩天地無凋換容顔有遷改對酒不肯飲含情欲誰待估客樂海客乗天風将船逺行役譬如雲中鳥一去無蹤跡少年行君不見淮南少年游俠客白日毬獵夜擁擲呼盧百萬終不惜報讎千里如咫尺少年遊俠好經過渾身装束皆綺羅蘭蕙相隨喧妓女風光去處滿笙歌驕矜自言不可有俠士堂中養來久好鞍好馬乞與人十千五千旋沽酒赤心用盡為知已黄金不惜栽桃李桃李栽來㡬度春一回花落一回新府縣盡為門下客王侯皆是平交人男兒百年且樂命何須讀書受貧病男兒百年且榮身何須徇節甘風塵衣冠半是征戰士窮儒浪作林泉民遮莫枝根長百丈不如當代多還往遮莫親姻連帝城不如當身自簪纓看取富貴眼前者何用悠悠身後名𢷬衣篇閨裏佳人年十餘嚬蛾對影恨離居忽逢江上春歸鷰銜得雲中尺素書玉手開緘長嘆息狂夫猶戍交河北萬里交河水北流願為雙鳥泛中洲君邊雲擁青絲騎妾處苔生紅粉樓樓上春風日将歇誰能攬鏡看愁髮曉吹員管隨落花夜𢷬戎衣向明月明月髙髙刻漏長真珠簾箔掩蘭堂横垂寳幄同心結半拂瓊筵蘇合香瓊筵寳幄連枝錦燈燭熒熒照孤寝有使憑将金剪刀為君留下相思枕摘盡庭蘭不見君紅巾拭淚坐氤氲明年更若征邊塞願作陽臺一段雲去婦詞古來有棄婦棄婦有歸處今日妾辭君辭君遣何去本家零落盡慟哭來時路憶昔未嫁君聞君却周旋綺羅錦繡段有贈黄金千十五許嫁君二十移所天自從結髮日未㡬離君緬山川家家盡歡喜孤妾長自憐幽閨多怨思盛色無十年相思若循環枕席生流泉流泉咽不掃獨夢闗山道及此見君歸君歸妾已老物華惡衰賤新寵方妍好掩淚出故房傷心劇秋草自妾為君妻君東妾在西羅幃到曉恨玉貌一生啼自從離别久不覺塵埃厚常嫌玳瑁孤猶羨鴛鴦偶嵗華逐霜霰賤妾何能久寒沼落芙蓉秋風散楊栁以此顦顇顔空持舊物還餘生欲何寄誰肯相牽攀君恩既斷絶相見何年月悔傾連理杯虛作同心結女蘿附青松貴欲相依投浮萍失緑水教作若為流不歎君棄妾自歎妾縁業憶昔初嫁君小姑纔倚牀今日妾辭君小姑如妾長回頭語小姑莫嫁如兄夫長歌行桃李得日開榮華照當年東風動百物草木盡欲言枯枝無醜葉涸水吐清泉大力運天地羲和無停鞭功名不早著竹帛将何宣桃李務青春誰能貰白日富貴與神仙􅀈􅋸成兩失金石猶銷鑠風霜無久質畏落日月後强歡歌與酒秋霜不惜人倐忽侵蒲栁長相思日色欲盡花含煙月明欲素愁不眠趙瑟初停鳯凰柱蜀琴欲奏鴛鴦絃此曲有意無人傳願隨春風寄燕然憶君迢迢隔青天昔時横波目今為流淚泉不信妾腸斷歸來看取明鏡前歌吟上襄陽歌襄漢落日欲没峴山西倒著接䍦一作行客辭歸花下迷襄陽小兒齊拍手攔街争唱白銅鞮傍人借問笑何事笑殺山公醉似泥鸕鷀杓鸚鵡盃百年三萬六千日一日須傾三百盃遥看漢水鴨頭渌恰似蒲萄初醱醅此江若變作春酒壘麴便築糟丘臺千金駿馬換少妾醉坐雕鞍歌落梅車傍側挂一壺酒鳯笙龍管行相催咸陽市中歎黄犬何如月下傾金罍君不見晉朝羊公一片古碑材龜頭剥落生莓苔淚亦不能為之墮心亦不能為之哀誰能憂彼身後事金鳬銀鴨葬死灰清風朗月不用一錢買玉山自倒非人推舒州杓力士鐺一作黄金爵白玉瓶李白一作酒仙與爾同死生襄王雲雨今安在江水東流猿夜聲南都行南都信佳麗武闕横西闗白水真人居萬商羅􅆵闤髙樓對紫陌甲第連青山此地多英豪邈然不可攀陶朱與五羖名播天壤間麗華秀玉色漢女嬌朱顔清歌遏流雲艷舞有餘閑遨遊盛宛洛冠盖隨風還走馬紅陽城呼鷹白河灣誰識卧龍客長吟愁鬢班江上吟一作江上遊木蘭之枻沙棠舟玉簫金管坐兩頭美酒樽一作當中置千斛載妓隨波任去留仙人有待乗黄鶴海客無心隨一作狎白鷗屈平詞賦懸日月楚王臺榭空山丘興酣落筆揺五岳詩成嘯傲凌滄洲功名富貴若長在漢水亦應西北流侍從宜春苑奉詔賦龍池栁色初青聽新鸎百轉歌長安東風已緑瀛洲草紫殿紅樓覺春好池南栁色半青青縈煙裊娜拂綺城垂絲百尺挂雕楹上有好鳥相和鳴間闗早得春風情春風巻入碧雲去千門萬户皆春聲是時君王在鎬京五雲垂暉耀紫清仗出金宫隨日轉天回玉輦繞花行始向蓬萊看舞鶴還過茝若聽新鸎新鸎飛繞上林苑願入簫韶雜鳯笙玉壺吟烈士擊玉壺壯心惜暮年三盃拂劍舞秋月忽然髙詠涕泗漣一作秋月忽髙懸鳯凰初下紫泥詔謁帝稱觴登御筵揄揚九重萬乗主謔浪赤墀青瑣賢朝天數換飛龍馬勅賜珊瑚白玉鞭世人不識東方朔大隠金門是謫仙西施宜笑復宜嚬醜女效之徒累身君王雖愛蛾眉好無奈宫中妬殺人笑歌行笑矣乎笑矣乎君不見曲如鈎古人知爾封公侯君不見直如絃古人知爾死道邊張儀所以只掉三寸舌蘇秦所以不墾二頃田笑矣乎笑矣乎君不見滄浪老人歌一曲還道滄浪濯吾足平生不解謀此身虚作離騷遣人讀笑矣乎笑矣乎趙有豫讓楚屈平賣身買得千年名巢由洗耳有何益夷齊餓死終無成君愛身後名我愛眼前酒飲酒眼前樂虚名何處有男兒窮通當有時曲腰向君君不知猛虎不看機上肉洪爐不鑄囊中錐笑矣乎笑矣乎寗武子朱買臣叩角行歌背負薪今日逢君君不識豈得不如佯狂人悲歌行悲來乎悲來乎主人有酒且莫斟聽我一曲悲來吟悲來不吟還不笑天下無人知我心君有數斗酒我有三尺琴琴鳴酒樂兩相得一杯不啻千鈞金悲來乎悲來乎天雖長地雖久金玉滿堂應不守富貴百年能㡬何死生一度人皆有孤猿坐啼墳上月且須一盡杯中酒悲來乎悲來乎鳯鳥不至河無圖㣲子去之箕子奴漢帝不憶李将軍楚王放却屈大夫悲來乎悲來乎秦家李斯早追悔虛名撥向身之外范子何曾愛五湖功成名遂身自退劍是一夫用書能知姓名惠施不肯千萬乗卜式未必窮一經還須黒頭取方伯莫謾白首為儒生􅃎歌行上新平長史兄粲陜西􅃎谷稍稍振庭柯涇水浩浩揚湍波哀鴻酸嘶暮聲急愁雲蒼慘寒氣多憶昨去家此為客荷花初紅栁條碧中宵出飲三百盃明朝歸揖二千石寧知流寓變光輝胡霜蕭颯繞客衣寒灰寂寞憑誰暖落葉飄揚何處歸吾兄行樂窮曛旭滿堂有美顔如玉趙女長歌入彩雲燕姬醉舞嬌紅燭狐裘獸炭酌流霞壯士悲吟寧見嗟前榮後枯相翻覆何惜餘光及棣華西岳雲臺歌送丹丘子西岳峥嶸何壯哉黄河如絲天際來黄河萬里觸山動盤渦轂一作谷轉秦地雷榮光休氣紛五彩千年一清聖人在巨靈咆哮擘兩山洪波噴流射東海一作箭射流東海三峰却立如欲摧翠崕丹谷髙掌開白帝金精運元氣石作蓮花雲作臺雲臺閣道連窈㝠一作人不到中有不死丹丘生明星玉女備灑掃麻姑搔背指爪輕我皇手把天地户丹丘談天與天語九重出入生光輝東求蓬萊復西歸玉漿儻惠故人飲騎二茅龍上天飛元丹丘歌元丹丘愛一作好神仙朝飲潁川一作水之清流暮還嵩岑之紫煙三十六峰長周旋長周旋躡星紅身騎飛龍耳生風横河跨海與天通我知爾遊心無窮扶風豪士歌洛陽三月飛胡沙洛陽城中人怨嗟天津流水波赤血白骨相撑如亂麻我亦東奔向吳國一作來奔溧溪上浮雲四塞道路賖東方日出啼早鴉城門人開掃落花梧桐楊栁拂金井來醉扶風豪士家扶風豪士天下竒意氣相傾山可移作人不倚将軍勢飲酒豈顧尚書期雕盤綺食㑹衆客吳歌趙舞香風吹原嘗春陵六國時開心寫意君所知堂中各有三千士明日報恩知是誰撫長劍一揚眉清水白石何離離脱吾帽向君笑飲君酒為君吟張良未逐赤松去橋邊黄石知我心同族弟金城尉叔一作升卿燭照山水壁畫歌髙堂粉壁圖蓬瀛燭前一見滄洲清洪波洶湧山峥嶸皎若丹丘隔海望赤城光中乍喜嵐氣滅謂逢山隂晴後雪廻谿碧流寂無喧又如秦人月下窺花源了然不覺清心魂秪将疊嶂鳴秋猿與君對此歡未歇放歌行吟達明發却顧海客揚雲帆便欲因之向溟渤白毫子歌淮南小山白毫子乃在淮南小山裏夜卧松下雪朝飡石中髓小山連一作聨緜向江開碧峰巉巖渌水廻余配白毫子獨酌流霞盃拂花弄琴坐青苔緑蘿樹下春風來南窓蕭颯松聲起憑崖一聽清心耳可得見未一作不得親八公擕手五雲去空餘桂樹愁殺人李太白文集巻五
