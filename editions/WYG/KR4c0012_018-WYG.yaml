body:
  text: 李太白文集巻十八唐李白撰歌詩三十六首登覽登錦城散花樓蜀中日照錦城頭朝光散花樓金牕夾繡户珠箔懸瓊鈎飛梯緑雲中極目散我憂一作愁暮雨向三峽春江繞雙流今來一登望如上九天遊登峨眉山蜀國多仙山峨眉􅊬難匹周流試登覽絶怪安可悉青㝠倚天開彩錯疑畫出冷然紫霞賞果得錦嚢術雲間吟瓊簫石上弄寳瑟平生有微尚歡笑自此畢烟容如在顔塵累忽相失儻逢騎羊子攜手凌白日大庭庫魯中朝登大庭庫雲物何蒼然莫辨陳鄭火空霾鄒魯烟我來尋梓慎觀化入寥天古木翔氣多松風如五絃帝圖終㝠沒歎息滿山川登單父陶少府半月臺陶公有逸興不與常人俱築臺像半月逈向一作出髙城隅置酒望白雲商一作髙飈起寒梧秋山入逺海桑柘羅平蕪水色渌且明一作清令人思鏡湖終當過江去愛此暫踟蹰天台曉望呉中天台鄰四明華頂髙百越門標赤城霞樓棲滄島月憑髙逺登覽直下見溟渤雲垂大鵬翻波動巨鼇沒風潮爭洶湧神怪何翕忽觀竒跡無倪好道心不歇攀條摘朱實服藥鋉金骨安得生羽毛千春卧蓬闕早望海霞邊四明三千里朝起赤城霞日出紅光散分輝照雪崕一餐嚥瓊液五内發金沙舉手何所待青龍白虎車焦山杳望松寥山石壁望松寥宛然在碧霄安得五綵虹架天作長橋仙人如愛我舉手來相招杜陵絶句長安南登杜陵上北望五陵間秋水明落日流光滅逺山登太白峰西上太白峰夕陽窮登攀太白與我語為我開天關願乗冷風去直出浮雲間舉手可近月前行若無山一别武功去何時復更還登邯鄲洪波臺置酒觀發兵燕趙時將遊薊門我把兩赤羽來遊燕趙間天狼正可射感激無時閑觀兵洪波臺倚劒望玉關請纓不繫越且向燕然山風引龍虎旗歌鐘昔一作憶追攀撃筑落髙月投壺破愁顔遥知百戰勝定掃鬼方還登廣武古戰場懐古秦鹿奔野草逐之若飛蓬項王氣蓋世紫電明雙瞳呼吸八千人横行起江東赤精斬白帝叱咤入關中兩龍不並躍五緯與天同楚滅無英圖漢興有來功按劒清八極歸酣歌大風伊昔臨廣武連兵决雌雄分我一杯羮太皇乃汝翁戰争有古跡壁壘頽層穹猛虎吟洞壑飢鷹鳴秋空翔雲列曉陣殺氣赫長虹撥亂屬豪聖俗儒安可通沈湎呼豎子狂言非至公撫掌黄河曲嗤嗤阮嗣宗登新平樓陜西去國登兹樓懐歸傷暮秋天長落日逺水净寒波流秦雲起嶺樹胡雁飛沙洲蒼蒼幾萬里目極令人愁謁老君廟梁宋先君懐聖徳靈廟肅神心草合人蹤斷塵濃鳥跡深流沙丹竈滅關路紫烟沈獨傷千載後空餘松柏林秋日登揚州西靈塔淮南寳塔凌蒼蒼登攀覽四荒頂髙元氣合標出海雲長萬象分空界三天接畫梁水揺金刹影日動火珠光鳥拂瓊簷度霞連繡栱張目隨征路斷心逐去帆揚露浩梧楸白風催橘柚黄玉毫如可見於此照迷方登金陵冶城西北謝安墩此墩即晉太傅謝安與右軍王羲之同登超然有髙世之志余將營圍其上故作是詩金陵晉室昔横潰永嘉遂南奔沙塵何茫茫龍虎鬬朝昏胡馬風漢草天驕蹙中原哲匠感穨運雲鵬忽飛翻組練照楚國旌旗連海門西秦百萬衆戈甲如雲屯投鞭可填江一掃不足論一作投䇿可填江一朝為我吞皇運有返正醜虜無遺魂談笑遏横流蒼生望斯存冶城訪古跡一作至今冶城隅猶有謝安墩憑覽周地險髙標絶人喧想像東山姿緬懐右軍言梧桐識佳樹蕙草留芳根白鷺映春洲青龍見朝暾地古雲物在臺傾禾黍繁我來酌清波於此樹名園功成拂衣去歸入一作長嘯武陵源登瓦官閣晨登瓦官閣極眺金陵城鍾山對北户淮水入南榮漫漫雨花落嘈嘈天樂鳴兩廊振法鼓四角吟一作吹風筝杳出霄漢上仰攀日月行山空霸氣滅地古寒隂生寥廓雲海晚蒼茫宫觀平門餘閶闔字樓識鳳皇名雷作百山動神扶萬栱傾靈光何足貴長此鎮呉京登梅崗望金陵贈族姪髙座寺僧中孚鍾山抱金陵霸氣昔騰發天一作神開帝王居海色照宫闕羣峰如逐鹿奔走相馳突江水九道來雲端遥明沒時遷大運去龍虎勢休歇我來屬天清登覽窮楚越吾宗挺禪伯特秀鸞鳳骨一作吾宗道門秀特異鸞鳳骨衆星羅青天朗者獨有月㝠居順生理草木不翦伐烟牕引薔薇石壁老野蕨呉風謝安屐白足傲履襪幾宿一下山一作下山來蕭然忘干謁談經演金偈降鶴舞海雪時聞天香來了與世事絶佳遊不可得春去惜逺别賦詩留巖屏千載庶不滅登金陵鳳皇臺鳳皇臺上鳳皇遊鳳去臺空江自流呉宫一作時花草埋幽徑晉代一作國衣冠成古丘三山半落青天外一水一作二水中分白鷺洲總為一作盡道浮雲能蔽日長安不見使人愁望廬山瀑布二首尋陽西登香爐峰南見一作望瀑布水挂流三百丈一作三千匹噴壑數十里歘如飛電一作練來隠若白虹起初驚河漢一作銀河落半灑雲天裡一作半潟金潭裡仰觀勢轉雄壯哉造化功海風吹不斷江一作山月照還空空中亂潨射左右洗青壁飛珠散輕霞流沫沸穹石而我遊名山對之心益閑無論潄瓊液且得洗塵顔且諧宿所好永願辭人間一作集譜宿所好永不歸人間日照香爐生紫烟遥看瀑布挂長川飛流直下三千尺疑是銀河落九一作半天一本題云望廬山香爐峰瀑布曰廬山上與星斗連日照香爐生紫烟下兩句同望廬山五老峰廬山東南五老峰青天削出金芙蓉九江秀色可攬結吾將此地巢雲松江上望皖公山宿松竒峰出竒雲秀木含秀氣青宴皖公山巉絶稱人意獨遊滄江上終日淡無味但愛兹嶺髙何由討靈異黙然遥相許欲往心莫遂待吾還丹成投跡歸此地望黄鶴山江夏岳陽東望黄鶴山雄雄半空出四面生白雲中峰倚紅日巖巒行穹跨峰嶂亦㝠密頗聞列仙人於此學飛術一朝向蓬海千載空石室金竈生烟埃玉潭祕清謐地古遺草木庭寒老芝术蹇余羨攀躋因欲保閑逸觀竒徧諸嶽兹嶺不可匹結心寄青松永悟客情畢鸚鵡洲鸚鵡來過呉江水江上洲傳鸚鵡名鸚鵡西飛隴山去芳洲之樹何青青烟開蘭葉香風暖岸夾桃花錦浪生遷客此時徒極目長洲孤月向誰明九日登巴陵置酒望洞庭水軍時賊逼華容縣九日天氣清登髙無秋雲造化闢川岳了然楚漢分長風鼓横波合沓蹙龍文憶昔傳遊豫樓船壯横汾今兹討鯨鯢旌斾何繽紛白羽落酒樽洞庭羅三軍黄花不掇手戰鼓遥相聞劒舞轉穨陽當時日停曛酣歌激壯士可以摧妖氛䠎踀東籬下淵明不足羣秋登巴陵望洞庭清晨登巴陵周覽無不極明湖映天光徹底見秋色秋色何蒼然際海俱澄鮮山青滅逺樹水渌無寒烟來帆出江中去鳥向日邊風清長沙浦霜空雲夢田瞻光惜穨髪閱水悲徂年北渚既蕩漾東流自潺湲郢人唱白雪越女歌採蓮聽此更腸斷憑崖淚如泉與夏十二登岳陽樓樓觀岳陽盡川逈洞庭開雁引愁心去一作雁别秋江去山銜好月來雲間逢下榻天上接行盃醉後凉風起吹人舞袖迴登巴陵開元寺西閣贈衡岳僧方外衡岳有開士五峰秀真骨見君萬里心海水照秋月大臣南溟去問道皆請謁灑以甘露言清涼潤肌髪明湖落天鏡香閣凌銀闕登眺餐恵風新花期啓發與賈舍人於龍興寺剪落梧桐枝望㴩湖剪落青梧枝㴩湖坐可窺雨洗秋山净林光澹碧滋水閑明鏡轉雲繞畫屏移千古風流事名賢共此時挂席江上待月有懐待月月未出望江江自流倐忽城西郭青天懸玉鈎素華難可攬清景不同遊耿耿金波裡空瞻鳷鵲樓金陵望漢江漢江迴萬里派作九龍盤横潰豁中國崔嵬飛迅湍六帝淪亡後三呉不足觀我君混區宇垂拱衆流安今日任公子滄浪罷釣竿秋登宣城謝朓北樓宣城江城如畫裡山曉望晴空兩水夾明鏡雙橋落彩虹人烟寒一作空橘柚秋色老梧桐誰念北樓上臨風懐謝公望天門山當塗天門中斷楚江開碧水東流直北迴兩岸青山相對出孤帆一片日邊來望木瓜山早起見日出暮看棲鳥還客心自酸楚况對木瓜山登敬亭北二小山余時客逢崔侍御並登此地送客謝亭北逢君縱酒還屈盤戲白馬大笑上青山迴鞭指長安西日落秦關帝鄉三千里杳在碧雲間過崔八丈水亭髙閣横秀氣清幽併在君簷飛宛溪水牕落敬亭雲猨嘯風中斷漁歌月裡聞閑隨白鷗去沙上自為羣李太白文集巻十八
