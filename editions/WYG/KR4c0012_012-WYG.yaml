body:
  text: 李太白文集巻十二唐李白撰歌詩三十六首别秋日魯郡堯祠亭上宴别杜補闕范侍御魯中我覺秋興逸誰云秋興悲山將落日去水與晴空冝魯酒白玉壺送行駐金羈歇鞍憇古木解帶挂横枝歌鼓川上亭曲度神飈吹一本旡歌鼔川上亭曲度神飈吹十字却添南歌憶郢客東轉見齊姬清波忽澹蕩白雪紛逶迤一隔范杜遊此歡各棄遺三韻雲歸碧海夕鴈没青天時相失各萬里茫然空爾思留别魯頌誰道太山髙下却魯連節誰云秦軍衆摧却魯連舌獨立天地間清風灑蘭雪夫子還倜儻攻文繼前烈錯落石上松無為秋霜折贈言鏤寶刀千嵗庶不滅别中都明府兄吾兄詩酒繼陶君試宰中都天下聞東樓喜奉連枝㑹南陌還為落葉分城隅一作江城渌水明秋日海上青山隔暮雲取醉不辭留夜月鴈行中斷惜離羣夢遊天姥吟留别一作别東魯諸公海客談瀛洲煙濤㣲茫一作濔漫信難求越人語一作道天姥雲霓明滅或一作安可覩天姥連天向天横勢拔一作枝五岳掩赤城天台四萬八千丈對此欲一作絶倒東南傾我欲因之一作冥搜夢吳越一夜飛度鏡湖月湖月照我影送我至剡谿謝公宿處今尚在渌水蕩漾清猿啼脚著謝公屐身登青雲梯半壁見海日空中聞天雞千巖萬轉路不定迷花倚石忽巳暝熊咆龍吟殷巖泉懐深林兮驚層巔雲一作楓青青兮欲雨水澹澹兮生煙列缺霹靂丘巒崩摧洞天石扇一作扉訇然中一作而開青冥浩蕩不見底日月照耀金銀臺霓為衣兮風為馬雲之君兮紛紛而來下虎鼔瑟兮鸞回車仙之人兮列如麻忽魂悸以魄動怳驚起而長嗟惟覺時之枕席失向來之煙霞世間行樂亦如此古來萬事東流水别君去兮何時還且放白鹿青崖間湏行即騎訪名山安能摧眉折腰事權貴使我不得開心顔留别曹南羣官之江南我昔釣白龍放龍溪水傍道成本欲去揮手凌蒼蒼時來不關人談笑遊軒皇獻納少成事歸休辭建章十年罷西笑覽鏡如秋霜閉劔琉璃匣鍊丹紫翠房身佩豁落圖腰垂虎盤囊仙人借綵鳯志在窮遐荒戀子四五人徘徊未翺翔東流送白日驟歌蘭蕙芳仙宫兩無從人間久摧藏范蠡脫勾踐屈平去懐王飄颻紫霞心流浪憶江鄉愁為萬里别復此一銜觴淮水帝王州金陵繞丹陽樓臺照海色衣馬揺川光及此北望君相思淚成行朝雲落夢渚瑶草空髙唐帝子隔洞庭青楓滿瀟湘懐歸路緜邈覽古情凄凉登岳眺百川杳然萬恨長却戀峨眉去弄景偶騎羊留别于十一兄逖裴十三遊塞垣太公渭川水李斯上蔡門釣周獵秦安黎元小魚㕙兎何足言天張雲巻有時節吾徒莫歎羝觸藩于公白首大梁野使人悵望何可論既知朱亥為壯士且願束心秋毫裏秦趙虎爭血中原當去抱關救公子裴生覽千古龍鸞炳天章悲一作髙吟雨雪動林木放書輟劔思一作悲髙堂勸爾一盃酒拂爾裘上霜爾為我楚舞吾為爾楚歌且探虎穴向沙漠鳴鞭走馬凌黄河恥作易水别臨歧淚滂沲留别王司馬嵩魯連賣談笑豈是顧千金陶朱雖相越本有五湖心余亦南陽子時為梁甫吟蒼山容偃蹇白日惜頽侵願一佐明主功成還舊林西來何所為孤劔託知音鳥愛碧山逺一作鳯集碧梧秀魚遊滄海深呼鷹過上蔡賣畚向嵩岑他日閒相訪丘中有素琴還山留别金門知己一本云出金門後書懐留别翰林諸公好古笑流俗素聞賢達風方希佐明主長揖辭成功白日在青天迴光矚一作照㣲躬恭承鳯凰詔歘起雲羅一作藤蘿中清切紫霄逈優遊丹禁通君王賜顔色聲價凌烟虹乗輿擁翠蓋扈從金城東寶馬驟一作麗絶景錦衣入新豐倚巖望松雪對酒鳴絲桐方一作因學揚子雲獻賦甘泉宫天書美片善清芳一作芬播無窮歸來入咸陽譚笑皆王公一朝去金馬飄落成飛蓬賓友一作從日疎散玉鐏亦一作尋巳空長才一作才力猶可倚不慙世上雄閒來東武吟曲盡情未終書此謝知巳扁舟一作滄波尋釣翁夜别張五吾多張公子别酌酣髙堂聽歌舞銀燭把酒輕羅霜横笛弄秋月琵琶彈陌桑龍泉解錦帶為爾傾千觴魏郡别蘇少府因北游魏都接燕趙美女誇芙蓉淇水流碧玉舟車日奔衝青樓夾兩岸萬室喧歌鍾天下稱豪貴一作豪貴遊遊此一作此中每相逢洛陽蘇季子劔㦸森詞鋒六印雖未佩一作說趙復過秦軒車若飛龍黄金數百鎰白璧有㡬雙散盡空掉臂髙歌賦還一作臨卭合從又連横其意未可封落拓乃如此何一作誰人不相從逺别隔兩河雲山杳千重一作雲天滿愁容何時更盃酒再得論心胷留别西河劉少府秋一作我髪巳種種所為竟無成閒傾魯壺酒笑對劉公榮謂我是方朔人間落嵗星白衣千萬乗何事去天庭君亦不得意髙歌羡鴻冥世人若醯雞安可識梅生雖為刀筆吏緬懐在赤城余亦如流萍隨波樂休明自有兩少妾雙騎駿馬行東山春酒緑歸隱謝浮名潁陽别元丹丘之淮陽河南吾將元夫子異姓為天倫本無軒裳契素以烟霞親嘗恨迫世網銘意俱未伸松栢雖寒苦羞逐桃李春悠悠市朝間玉顔日緇磷所共重山岳所得輕埃塵精魄漸蕪穢衰老相慿因我有錦囊訣可以持君身當餐黄金藥去為紫陽賓萬事難並立百年猶崇晨别爾東南去悠悠多悲辛前志庶不易逺途期所遵已矣歸去來白雲飛天津留别廣陵諸公淮南一作留别邯鄲故人憶昔作少年結交趙與燕金羈絡駿馬錦帶横龍泉寸心無疑事所向非徒然晩節覺此疎獵精草太𤣥空名束壯士薄俗棄髙賢中迴聖明顧揮翰凌雲煙騎虎不敢下攀龍忽墮天還家守清真孤潔勵秋蟬鍊丹費火石採藥窮山川臥海不關人租稅遼東田乗興忽復起棹我溪中船臨醉謝葛疆山公欲倒鞭狂歌自此别垂釣滄浪前廣陵贈别玉瓶沽美酒數里送君還繫馬垂楊下銜盃大道間天邊看緑水海上見青山興罷各分袂何湏醉别顔感時留别從兄徐王延年一作延平從弟延陵天籟何參差噫然大塊吹𤣥元苞槖籥紫氣何逶迤一作融怡七葉運皇化千齡光本支仙風生指樹大雅歌螽斯諸王若鸞虯肅穆列藩維哲兄錫茅土聖代含榮滋九卿領徐方七步繼陳思伊昔全盛日雄豪動京師冠劔朝鳯闕樓船侍龍池鼓鐘出朱邸金翠照丹墀君王一顧眄選色獻蛾眉列㦸十八年未曾輒遷移大臣小喑嗚謫竄天南垂長沙不足舞貝錦且成詩佐郡浙江西病閒絶趨馳階軒日苔蘚鳥雀噪簷帷時乗平肩輿出入畏人知北宅聊偃憇歡愉恤惸嫠羞言梁苑地烜赫耀旌旗兄弟八九人呉秦各分離大賢達機兆豈獨慮安危小子謝麟閣鴈行忝肩隨令弟字延陵鳯毛出天姿清英神仙骨芬馥􅊉蘭蕤夢得春草句將非恵連誰深心紫河車與我特相冝金膏猶罔象玉液尚磷緇伏枕寄賓館宛同清漳湄藥物多見饋珍羞亦兼之誰道溟渤深猶言淺恩慈鳴蟬游子意促織念歸期驕陽何火赫海水爍龍龜百川盡凋枯舟檝閣中逵䇿馬採涼月通宵出郊歧泣别目眷眷傷心步遲遲願言保明德王室佇清夷摻袂何所道援毫投此辭别儲邕之剡中借問剡中道東南􅃌越鄉舟從廣陵去水入㑹稽長竹色溪下緑荷花靜裏香辭君向天姥拂石臥秋霜留别金陵諸公金陵海水昔飛動三龍紛戰爭鍾山危波瀾傾側駭奔鯨黄旗一掃蕩割壤開吳京六代更霸王遺跡見都城一作遺都見空城至今秦淮間禮樂秀羣英地扇鄒魯學詩騰顔謝名五月金陵西祖余白下亭欲尋廬峯頂先繞漢水行香爐紫煙滅瀑布落太清若攀星辰去揮手緬含情口號食出野田美酒臨逺水傾東流若未盡應見别離情金陵酒肆留别白門栁花滿一作酒店香呉姬􅎹酒喚客嘗金陵子弟來相送欲行不行各盡觴請君問取東流水别意與之誰短長金陵白下亭留别驛亭三楊樹正當白下門吳煙暝長條漢水齧古根向來送行處迴首阻笑言别後若見之為余一攀翻别東林寺僧東林送客處月出白猿啼笑别廬山逺何煩過虎谿竄夜郎於烏江留别宗十六璟疑烏江及宗字誤君家全盛日台鼎何陸離斬鼇翼媧皇鍊石補天維一迴日月顧三入鳯凰池失勢青門傍種𤓰復㡬時猶㑹舊賓客三千光路岐皇恩雪憤懣松柏含榮滋我非東牀人令姊忝齊眉浪迹未出世空名動京師適遭雲羅解翻謫一作遣夜郎悲拙妻莫邪劔及此二龍隨慙君湍波苦千里逺從之白帝曉猿斷黄牛過客遲遥瞻明月峽西去益相思留别龔處士龔子棲閒地都無人世喧栁深陶令宅竹暗辟彊園我去黄牛峽遥愁白帝猿贈君巻施草心斷竟何言贈别鄭判官竄逐勿復哀慙君問寒灰浮雲無本意吹落章華臺逺别淚空盡長愁心巳摧三年吟澤畔顦顇㡬時迴黄鶴樓送孟浩然之廣陵江夏岳陽故人西辭黄鶴樓烟花三月下揚州孤帆逺影一作映碧山盡唯見長江天際流將遊衡岳過漢陽雙松亭留别族弟浮屠談皓秦欺趙氏璧却入邯鄲宫本是楚家玉還來荆山中符彩照滄溟精輝陵白虹青蠅一相㸃流落此時同卓絶道門秀談𤣥乃支公延蘿結幽居剪竹繞芳叢涼花拂户牖天籟一作樂鳴虚空憶我初來時蒲萄開景風今茲大火落秋葉黄梧桐水色夢沅湘長沙去何窮寄書訪衡嶠但與南飛鴻江夏别宋之悌楚水清若空遥將碧海通人分千里外興在一盃中谷鳥吟晴日江猿嘯晩風平生不下淚於此泣無窮留别賈舍人至二首大梁白雲起飄颻來南洲徘徊蒼梧野十見羅浮秋鼇抃山海傾四溟揚洪流意欲託孤鳯從之摩天遊鳯苦道路難翺翔還崑丘不肯銜我去哀鳴慙不周逺客謝主人明珠難暗投拂拭倚天劔西登岳陽樓長嘯萬里風掃清胷中憂誰念劉越石化為繞指柔秋風吹胡霜凋此簷下芳折芳怨嵗晩離别悽以傷謬攀青𤨏賢延我於此堂君為長沙客我獨之夜郎勸此一盃酒豈唯道路長割珠兩分贈寸心貴不忘何必兒女仁相看淚成行渡荆門送别荆州渡逺荆門外來從楚國遊山隨平野盡江入大荒流月下飛天鏡雲生結海樓仍憐故鄉水萬里送行舟聞李太尉大舉秦兵百萬出征東南懦夫請纓冀申一割之用半道病還留别金陵崔侍御十九韻復至金陵秦出天下兵蹴踏燕趙傾黄河飲馬竭赤羽連天明太尉杖旄鉞雲旗繞彭城三軍受號令千里肅雷霆函谷絶飛鳥武關擁連營意在斬巨鼇何論鱠長鯨一作鯢與鯨恨無左車畧多愧魯連生拂劔照嚴霜彫戈縵胡纓願雪㑹稽恥將期報恩榮半道謝病還無因一作由東南征亞夫未見顧劇孟阻先行天奪壯士心長吁别吳京金陵遇太守倒履欣一作相逢迎羣公咸祖餞四座羅朝英初發臨滄觀醉栖征虜亭舊國見秋月長江流寒聲帝車一作居信迴轉河漢縱復横孤鳯向西海飛鴻辭北溟因之出寥廓揮手謝公卿别韋少府宣州西出蒼龍門南登白鹿原欲尋南一作商山皓猶戀漢皇恩水國逺行邁仙經深討論洗心句溪月清耳敬亭猿築室在人境閉關無世諠多君枉髙駕贈我以㣲言交乃意氣合道因風雅存别離有相思瑶瑟與金樽南陵别兒童入京一云古意白酒新一作初熟山中歸黄雞啄黍秋正肥呼童烹雞酌白酒兒女歌笑牽人衣髙歌取醉欲自慰起舞落日爭光輝遊說萬乗苦不早著鞭跨馬涉逺道㑹稽愚婦輕買臣余亦辭家西一作方入秦仰天大笑出門去我輩豈是蓬蒿人南陵五松山别荀七六即潁水荀無慙許郡賓相逢太史奏應是聚賢人玉隱且在石蘭枯還見春俄成萬里别立德貴清真别山僧涇縣作何處名僧到水西乗舟一作盃弄月宿涇溪平明别我上山去手攜金策踏雲梯騰身轉覺三天近舉足迴看萬嶺低謔浪肯居支遁下風流還與逺公齊此度别離何日見相思一夜瞑猿啼贈别王山人歸布山王子析道論㣲言破秋毫還歸布山隱興入天雲髙爾去安可遲瑶草恐衰歇我心亦懐歸屢夢松上月傲然遂獨往長嘯開巖扉林壑乆已蕪石道生薔薇願言弄笙鶴嵗晩來相依李太白文集巻十二
