body:
  text: 李太白文集巻十七唐李白撰歌詩四十六首遊宴下與從姪杭州刺史良遊天竺寺呉中挂席凌蓬丘觀濤憩樟樓三山動逸興五馬同遨遊天竺森在眼松門颯驚秋覽雲測變化弄水窮清幽疊嶂隔遥海當軒寫歸流詩成傲雲月佳趣滿呉洲同友人舟行遊台越作楚臣傷江楓謝客拾海月懐沙去瀟湘挂席汎溟渤蹇予訪前跡獨往造窮髪古人不可攀去若浮雲沒願言弄倒景從此鍊真骨華頂窺絶㝠蓬壺望超忽不知青春度但怪緑芳歇空持釣鰲心從此謝魏闕下終南山過斛斯山人宿置酒長安暮從碧山下山月隨人歸却顧所來徑蒼蒼横翠微相攜及田家童稚一作稚子開荆扉緑竹入幽楥青蘿拂行衣歡言得所憩美酒聊共揮長歌吟松風曲盡河星稀我醉君復樂陶然共忘機朝下過盧郎中叙舊遊君登金華省我入銀臺門幸遇聖明主俱承雲雨恩復此休浣時閑為疇昔言却話山海事宛然林壑存明湖思曉月疊嶂憶清猿何由返初服田野醉芳樽侍從遊宿温泉宫作羽林十二將羅列應星文霜仗懸秋月蜺旌巻夜雲嚴更千户肅清樂丸天聞日出瞻佳氣叢叢繞聖君邯鄲南亭觀妓燕趙歌鼓一作妓燕趙兒魏姝弄鳴絲粉色艶月彩舞袖一作衫拂花枝把酒領一作顧美人請歌邯鄲詞清箏何繚繞度曲緑雲垂平原君安在科斗生古池座客三千人于今知有誰我輩不作樂但為後代悲春遊羅敷潭行歌入谷口路盡無人躋攀崖度絶壑弄水尋迴磎雲從石上起客到花間迷淹留未盡興日落羣峰西春陪商州裴使君遊石娥溪時欲東歸遂有此贈裴公有仙標拔俗數千丈澹蕩滄洲雲飄颻紫霞想剖竹商洛間政成心已閑蕭條出世表㝠寂閉𤣥關我來屬芳節解榻時相恱褰帷對雲峰揚袂指松雪蹔出東城邊遂遊西巖前横天聳翠壁噴壑鳴紅泉尋幽殊未歇愛此春光發溪傍饒名花石上有好月命駕歸去來露華生緑苔淹留昔將晩復聽清猿哀清猿斷人腸遊子思故鄉明發首東路此歡焉可忘陪從祖濟南太守汎鵲山湖三首齊州初謂鵲山近寧知湖水遥此行殊訪戴自可緩歸橈湖濶數十里湖光揺碧山湖西正有月獨送李膺還水入北湖去舟從南浦迴遥看鵲山轉却似送人來春日陪楊江寧及諸官宴北湖感古作金陵昔聞顔光禄攀龍宴京一作重又作明湖樓船入天鏡帳殿開雲衢君王歌大風如樂豐沛都延年獻嘉作邈與詩人俱我來不及此獨立鍾山孤楊宰穆清飈一作風芳聲騰海隅英寮滿四座粲若瓊林敷鷁首弄倒景蛾眉掇明珠新絃採一作來梨園古舞嬌呉歈曲度繞雲一作清漢聽者皆歡娯雞棲何嘈嘈㳂一作江月沸笙竽古之帝宫苑今乃人樵蘇感此勸一觴願君覆瓢壺榮盛一作盛時當作樂無令後賢吁宴鄭㕘卿山池爾恐碧草晚我畏朱顔移愁看楊花飛置酒正相宜歌聲送落日舞影迴清池今夕不盡盃留歡更邀誰遊謝氏山亭淪老卧江海再歡天地清病閑乆寂寞嵗物徒芬榮借君西池遊聊以散我情掃雪松下去捫蘿石道行謝公池塘上春草一作風颯已生花枝拂人來山鳥向我鳴田家有美酒落日與之傾醉罷弄歸月遥欣稚子迎把酒問月故人賈淳令余問之青天有月來幾時我今停盃一問之人攀明月不可得月行却與人相隨皎如飛鏡臨丹闕緑烟滅盡清輝發但見宵從海上來寧知曉向雲間沒白兔𢷬藥秋復春姮娥孤棲與誰鄰今人不見古時月今月曽經照古人古人今人若流水共看明月皆如此唯願當歌對酒時月光長照金罇裏同族姪一作弟評事黯遊昌禪師山池二首逺公愛康樂為我開禪關蕭然松石下何異清涼山花將色不染水與心俱閑一坐度小劫觀空天地間客來花雨際秋水落金池片石寒青錦疎楊挂緑絲髙僧拂玉柄童子獻霜梨惜去愛佳景烟蘿欲暝時金陵鳳凰臺置酒置酒延落景金陵鳳凰臺長波寫萬古心與雲俱開借問往昔時鳳凰為誰來鳳凰去已乆正當今日迴明君越羲軒天老坐三台豪士無所用彈絃醉金罍東風吹山花安可不盡杯六帝沒幽草深宫㝠緑苔置酒勿復道歌鍾但相催秋浦清溪雪夜對酒客有唱鷓鴣者秋浦披君一作我貂襜褕對君白玉壺雪花酒上滅頓覺夜寒無客有桂陽至能吟山鷓鴣清風動牕竹越鳥起相呼持此足為樂何煩笙與竽與周剛青溪玉鏡潭宴别潭在秋浦桃樹陂下予新名此潭康樂上官去永嘉遊石門江亭有孤嶼千載跡猶存我來憩秋浦三入桃陂源千峰照一作㸃積雪萬壑盡啼猿興與謝公合文因周子論掃崖去落葉席月開清罇溪當大樓南溪水正南奔迴作玉鏡潭澄明洗心魂此中得佳境可以絶囂喧清夜方歸來酣一作蓮歌出平原别後經此地為予謝蘭蓀遊秋浦白笴陂二首何處夜行好月明白笴陂山光揺積雪猿影挂寒枝但恐佳景晚小令歸棹移人來有清興及此有相思白笴夜長嘯爽然溪谷寒魚龍動陂水處處生波瀾天借一明月飛來碧雲端故鄉不可見腸斷正西看宴陶家亭子尋陽曲巷幽人宅髙門大士家池開照膽鏡林吐破顔花緑水藏春日青軒祕晚霞若聞絃管妙金谷不能誇在水軍宴韋司馬樓船觀妓永王軍中揺曳帆在空清流一作川順歸風詩因鼓吹發酒為劒歌雄對舞青樓妓雙鬟白玉童行雲且莫去留醉楚王宫流夜郎至江夏陪長史叔及薛明府宴興徳寺南閣江夏紺殿横江上青山落鏡中岸迴沙不盡日映水成空天樂流一作聞香閣蓮舟颺晚風恭陪竹林宴留醉與陶公汎沔州城南郎官湖并序乾元嵗秋八月白遷於夜郎遇故人尚書郎張謂出使夏口沔州牧杜公漢陽宰王公觴于江城之南湖樂天下之再平也方夜水月如練清光可掇張公殊有勝槩四望超然乃顧白曰此湖古來賢豪遊者非一而枉踐佳景寂寥無聞夫子可為我標之嘉名以傳不朽白因舉酒酹水號之曰郎官湖亦猶鄭圃之有僕射陂也席上文士輔翼岑静以為知言乃命賦詩紀事刻石湖側將與大别山共相磨滅焉張公多逸興共汎沔城隅當時秋月好不減武昌都四坐醉清光為歡古來無郎官愛此水因號郎官湖風流若未減名與此山俱陪侍郎叔遊洞庭醉後三首今日竹林宴我家賢侍郎三盃容小阮醉後發清狂船上齊橈樂湖心汎月歸白鷗閑不去争拂酒筵飛剗却君山好平鋪湘水流巴陵無限酒醉殺洞庭秋夜汎洞庭尋裴侍御清酌日晚湘水渌孤舟無端倪明湖漲秋月獨汎巴陵西遇憩裴逸人巖居陵丹梯抱琴出深竹為我彈鵾雞曲盡酒亦傾北牕醉如泥人生且行樂何必組與珪陪族叔刑部侍郎曄及中書賈舍人至遊洞庭五首洞庭西望楚江分水盡南天不見雲日落長沙秋色逺不知何處弔湘君南湖秋水夜無烟耐可乗流直上天且就洞庭賖月色將船買酒白雲邊洛陽才子謫湘川元禮同舟月下仙記得長安還欲笑不知何處是西天洞庭湖西秋月輝瀟湘江北早鴻飛醉客滿船歌白紵不知霜露入秋衣帝子瀟湘去不還空餘秋草洞庭間淡掃明湖開玉鏡丹青畫出是君山楚江黄龍磯南宴楊執㦸治樓荆楚五月分五洲碧山對青樓故人楊執㦸春賞楚江流一見醉漂月三杯歌棹謳桂枝攀不盡他日更相求銅官山醉後絶句宣城我愛銅官樂千年未擬還要須迴舞袖拂盡五松山與南陵常賛府遊五松山山在南陵銅井西五里有古精舍安石汎溟渤獨嘯長風還逸韻動海上髙情出人間靈異可並跡澹然與世閑我來五松下置酒窮躋攀徵古絶遺老因名五松山五松何清幽勝境美沃洲蕭颯鳴洞壑終年風雨秋響入百泉去聽如三峽流剪竹掃天花且從傲吏遊龍堂若可憩吾欲歸精脩宣城清溪一作入青溪山青溪勝桐廬水木有佳色山貌日髙古石容天傾側綵鳥昔未名白猿初相識不見同懐人對之空歎息與謝良輔遊涇川陵巖寺乗君素舸汎涇西宛似雲門對若溪且從康樂尋山水何必東遊入㑹稽遊水西簡鄭明府天宫水西寺雲錦照東郭清湍鳴迴溪緑竹遶飛閣涼風日瀟灑幽客時憩泊五月思貂裘謂言秋霜落石蘿引古蔓岸笋開新籜吟翫空復情相思爾佳作鄭公詩人秀逸韻宏寥廓何當一來遊愜我雪山諾九日登山淵明歸去來不與世相逐為無杯中物遂偶本州牧因招白衣人笑酌黄花菊我來不得意虚過重陽時題輿何俊發遂結城南期築土接響山俯臨宛水湄胡人呌玉笛越女彈霜絲自作英王胄斯樂不可窺赤鯉湧琴髙白龜道馮夷靈仙如彷彿奠酹遥相知古來登髙人今復幾人在滄洲違宿諾明日猶可待連山似驚波合沓出溟海揚袂揮四座酩酊安所知齊歌送清觴起舞亂參差賓隨葉落散帽逐秋風吹别後登此臺願言長相思九日今日雲景好水緑秋山明攜壺酌流霞搴菊汎寒榮地逺松石古風揚絃管清窺觴照歡顔獨笑還自傾落帽醉山月空歌懐友生九日龍山飲當塗九日龍山飲黄花笑逐臣醉看風落帽舞愛月留人九月十日即事昨日登髙罷今朝更舉觴菊花何太苦遭此兩重陽陪族叔當塗宰遊化城寺升公清風亭化城若化出金牓天宫開疑是海上雲飛空結樓臺升公湖上一作中秀粲然有辯才濟人不利已立俗無嫌猜了見水中月青蓮出塵埃閑居清風亭左右清風來當暑隂廣殿太陽為徘徊茗酌待幽客珍盤薦彫梅飛文何灑落萬象為之摧季父擁鳴琴徳聲布雲雷雖遊道林室亦一作不舉陶潛盃清樂動諸天長松自吟哀留歡若可盡劫石乃成灰李太白文集巻十七
