body:
  text: 李太白文集卷三唐李白撰歌詩四十首樂府二獨漉篇獨漉水中泥水濁不見月不見月尚可水深行人沒越鳥從南來胡鴈亦北度我欲彎弓向天射惜其中道失歸路落葉别樹飄零隨風客無所託悲與此同羅帷舒卷似有人開明月直入無心可猜雄劍挂壁時時龍鳴不斷犀象羞澀苔生國耻未雪何由成名神鷹夢澤不顧鴟鳶為君一擊搏鵬九天登髙丘而望逺海登髙丘望逺海六鼇骨巳霜三山流安在扶桑半摧折白日沉光彩銀臺金闕如夢中秦皇漢武空相待精衛費木石黿鼉無所憑君不見驪山茂陵盡灰滅牧羊之子來攀登盜賊劫寶玉精靈竟何能窮兵黷武今如此鼎湖飛龍安可乘陽春歌長安白日照春空緑楊結煙桑一作垂裊風披香殿前花始紅流芳發色繡户中繡户中相經過飛燕皇后輕身舞紫宫夫人絶世歌聖君三萬六千日嵗嵗年年奈樂何陽叛兒君歌陽叛兒妾勸新豐酒何許最關人烏啼白門栁烏啼隱楊花君醉留妾家博山爐中沉香火雙煙一氣凌紫霞雙燕離雙燕復雙燕雙飛令人羡玉樓珠閣不獨棲金窗繡户長相見柏梁失火去因入吳王宫吳宫又焚蕩雛盡巢亦空憔悴一身在孀雌憶故雄雙飛難再得傷我寸心中山人勸酒蒼蒼雲松落落綺皓春風爾來為阿誰胡蝶忽然滿芳草秀眉霜雪桃花貌青髓緑髮長美好稱是秦時避世人勸酒相歡不知老各守兔一作麋鹿志耻隨龍虎爭歘起佐一作安太子漢皇乃復驚顧謂戚夫人彼翁羽翼成歸來商山下泛若雲無情舉觴酹巢由洗耳何獨一作太清浩歌望嵩嶽意氣還一作遙相傾于闐採花于闐採花人自言花相似明妃一朝西入胡胡中美女多羞死乃知漢地多名姝胡中無花可方比丹青能令醜者妍無鹽翻在深宫裏自古妬娥眉胡沙埋皓齒鞠歌行玉不自言如桃李魚目笑之卞和耻楚國青蠅何太多連城白璧遭讒毁荆山長號泣血人忠臣死為刖足鬼聽曲知寧戚夷吾因小妻秦穆五羊皮買死百里奚洗拂青雲上當時賤如泥朝歌鼓刀叟虎變蟠溪中一舉釣六合遂荒營丘東平生渭水曲誰識一作數此老翁奈何今之人雙目送飛鴻幽澗泉拂彼白石彈吾素琴幽澗愀兮流泉深善手明徽髙張清心寂歷似千古松颼飀兮萬尋中見愁猿弔影而危處兮叫秋木而長吟客有哀時失志而聽者淚淋浪以沾襟乃緝商綴羽潺湲成音吾但寫聲發情於妙指殊不知此曲之古今幽澗泉鳴深林王昭君二首一作昭君怨漢家秦地月流影照一作送明妃一上玉關道天涯去不歸海月還從東海一作方出明妃西嫁無來日燕支長寒雪作花娥眉憔悴沒胡沙生乏黃金枉圖畫死留青塜使人嗟昭君拂玉鞍上馬啼紅頰今日漢宫人明朝胡地妾中山孺子妾歌漢賜中山靖王噲孺子妾及未央才人已下歌四篇中山孺子妾特以色見珍雖然不如延年妹亦是當時絶世人桃李出深井花豔驚上春一貴復一賤關天豈由身芙蓉老秋霜團扇羞網塵戚姬髠翦入舂市萬古共悲辛荆州歌白帝城邊足風波瞿塘五月誰敢過荆州麥熟繭成蛾繅絲憶君頭緒多撥榖飛鳴奈妾何設辟邪伎鼓吹雉子班曲辭辟邪伎作鼓吹驚雉子班之奏曲成喔咿振迅欲飛鳴扇錦翼雄風生雙雌同飲啄趫悍誰能爭乍向草中耿介死不求黃金籠下生天地至廣大何惜遂物情善卷讓天子務光亦逃名所貴曠士懷朗然合太清相逢行相逢紅塵內髙揖黃金鞭萬户垂楊裏君家阿那邊古有所思我思仙一作佳人乃在碧海之東隅海寒多天風白波連山一作天倒蓬壺長鯨噴湧不可涉撫心茫茫淚如珠西來青鳥東飛去願寄一書謝麻姑久别離别來幾春未還家玉窗五見櫻桃花況有錦字書開緘使一作令人嗟此腸斷彼心絶雲鬟緑鬢罷攬結愁如回飈亂白雪去年寄書報陽臺今年寄書重相催胡為乎東風為我吹行雲使西來待來竟不來落花寂寂委青苔採蓮曲若耶溪傍採蓮女笑隔荷花共人語日照新粧水底明風飄香袖空中舉岸上誰家遊冶郎三三五五映垂楊紫騮嘶入落花去見此踟蹰空斷腸白頭吟又一篇與此異今兩存錦水東北流波蕩雙鴛鴦雄巢漢宫樹雌弄秦草芳寧同萬死碎綺翼不忍雲間兩分張此時阿嬌正嬌妬獨坐長門愁日暮但願君恩顧妾深豈惜黃金買詞賦相如作賦得黃金丈夫好新多異心一朝將聘茂陵女文君因贈一作賦白頭吟東流不作西歸水落花辭條羞故林兔絲故無情隨風任傾倒誰使女蘿枝而來强縈抱兩草猶一心人心不如草莫卷龍鬚席從他生網絲且留琥珀枕或有夢來時覆水再收豈滿杯棄妾已去難重回古時得意不相負秪今唯見青陵臺錦衣東流碧波蕩雙鴛鴦雄巢漢宫樹雌弄秦草芳相如去蜀謁武帝赤車駟馬生輝光一朝再覽大人作萬乘忽欲凌雲翔聞道阿嬌失恩寵千金買賦要君王相如不憶貧賤日官髙金多聘私室茂陵姝子皆見求文君歡愛從此畢淚如雙泉水行墮紫羅襟五起雞三唱清晨白頭吟長吁不整緑雲鬢仰訴青天哀怨深城崩杞梁妻誰道土無心東流不作西歸水落花辭枝羞故林頭上玉燕叉是妾嫁時物贈君表相思羅袖幸時拂莫卷龍鬚席從他生網絲且留琥珀枕還有夢來時鷫鸘求在錦屏上自君一挂無由一作人披妾有秦樓鏡照心勝照井願持照新人雙對可憐影覆水却收不滿杯相如還謝文君回古來得意不相負秪今唯有青陵臺臨江王節士歌洞庭白波木葉稀燕鴈始入吳雲飛吳雲寒燕鴈苦風號沙宿瀟湘浦節士感秋淚如雨白日當天心照之可以事明主壯士一作氣憤雄一作寒風生安得倚天劍跨海斬長鯨司馬將軍歌代隴上健兒陳安狂風吹古月竊弄章華臺北落明星動光彩南征猛將如雲雷一作南方有事將軍來手中電曳一作曳電倚天劍直斬長鯨海水開我見樓船壯心目頗似龍驤下三蜀揚兵習戰張虎旗江中白浪如銀屋身居玉帳臨河魁紫髯若㦸冠崔嵬細栁開營揖天子始知灞上為嬰孩羌笛橫吹阿嚲回向月樓中吹落梅將軍自起舞長劍壯士呼聲動九垓功成獻凱見明主丹青畫像麒麟臺君道曲梁之雅歌有五篇今作一章大君若天覆廣運無不至軒后爪牙常先太山稽如心之使臂小白鴻翼於夷吾劉葛魚水本無二土扶可成牆積德為厚地結襪子燕南壯士吳門豪筑中置鉛魚隱刀感君恩重許君命太山一擲輕鴻毛結客少年場行紫燕黃金瞳啾啾一作稜稜搖緑鬃平明相馳逐結客洛門東少年學劍術凌轢白猿公珠袍曳錦帶匕首插吳鴻由來萬夫勇挾此英雄風託交從劇孟買醉入新豐笑盡一杯酒殺人都市中羞道易水寒從一作徒令日貫虹燕丹事不立虛沒秦帝宫武陽死灰人安可與成功長干行二首妾髮初覆額折花門前劇郎騎竹馬來繞牀弄青梅同居長干里兩小無嫌猜十四為君婦羞顔未嘗開低頭向暗壁千喚不一回十五始展眉願同塵與灰常存抱柱信豈一作耻上望夫臺十六君逺行瞿塘灧預堆五月不可觸猿聲天上哀門前遲一作舊行跡一一生緑一作蒼苔苔深不能掃落葉秋風早八月蝴蝶來一作黃雙飛西園草感此傷妾心坐愁紅顔老早晚下三巴預將書報家相迎不道逺直至長風沙憶妾一作昔深閨裏煙塵不曾識嫁與長干人沙頭候風色五月南風興思君下巴陵八月西風起想君發揚子去來悲如何見少别離多湘潭幾日到妾夢越風波昨夜狂風度吹折江頭樹渺渺暗無邊行人在何處北客至一作真王公朱衣滿汀一作江中一作北客浮雲驄經過新市中日暮來投宿數朝不肯東自憐十五餘顔色桃花紅那作商人婦愁水復愁風古朗月行小時不識月呼作白玉盤又疑瑶臺鏡飛在青雲端仙人垂兩足桂樹作一作何團圓白兔搗藥成問言與誰餐蟾蜍蝕圓影天一作大明夜已殘羿昔落九烏天人清且安隂精此淪惑去去不足觀憂來其如何惻愴摧心肝上之回三十六離宫樓臺與天通閣道步行月美人愁煙空恩疏寵不及桃李傷春風淫樂意何極金輿向回中萬乘出黃道千旗揚彩虹前軍細栁北後騎甘泉東豈問渭川老寧邀襄野童但慕一作秋暮瑶池宴歸來樂未窮獨不見白馬誰家子黃龍邊塞兒天山三丈雪豈是逺行時春蕙忽秋草莎雞鳴曲池風催寒梭響月入霜閨悲憶與君别年種桃齊娥眉桃今百餘尺花落成枯枝終然獨不見流淚空自知白紵辭三首揚清歌一作音發皓齒北方佳人東鄰子且吟白紵停緑水長袖拂面為君起寒雲夜卷霜海空胡風吹天飄塞鴻玉顔滿堂樂未終館娃日落歌吹濛館娃日落歌吹深月寒江清夜沉沉美人一笑千黃金垂羅舞縠揚哀音郢中白雪且莫吟子夜吳歌動君心動君心冀君賞願作天池雙鴛鴦一朝飛去青雲上吳刀剪綵一作綺縫舞衣明粧麗服奪春輝揚眉轉袖若雪飛傾城獨立世所稀激楚結風醉忘歸髙堂月落燭已微玉叉挂纓君莫違鳴鴈行胡鴈鳴辭燕山昨發委羽朝度關一一銜蘆枝南飛散落天地間連行接翼往復還客居煙波寄湘吳凌霜觸雪毛體枯畏逢矰繳驚相呼聞弦虛墜良可吁君更彈射何為乎妾薄命漢帝重一作寵阿嬌貯之黃金屋咳唾落九天隨風生珠玉寵極愛還歇妬深情却疏長門一步地不肯暫回車雨落不上天水覆重難收一作難重收君情一作恩與妾意各自東西流昔日芙蓉花今成斷根草一作素秋草以色事他人能得幾時好幽州胡馬客歌幽州胡馬客緑眼虎皮冠笑拂兩隻箭萬人不可干彎弓若轉月白鴈落雲端雙雙掉鞭行遊獵向樓蘭出門不顧後報國死何難天驕五單于狼戾好凶殘牛馬散北海割鮮若虎餐雖居燕支山不道朔雪寒婦女馬上笑顔如赬玉盤翻飛射鳥獸花月醉雕鞍旄頭四光芒爭戰如蜂攢白刃灑赤血流沙為之丹名將古誰是疲兵良可嘆何時天狼滅父子得間安門有車馬客行門有車馬賔一作客金鞍曜朱輪謂從丹一作雲霄落乃是故鄉親呼兒掃中堂坐客論悲辛對酒兩不飲停觴淚盈巾歎我萬里遊飄颻三十春空談霸王略紫綬不挂身雄劍藏玉匣隂符生素塵廓落無所合流離湘水濵借問宗黨間多為泉下人生苦百戰役死託萬鬼鄰北風揚胡沙埋翳周與秦大運且如此蒼穹寧匪仁惻愴竟何道存亡任大鈞君子有所思行紫閣連終南青冥天倪色憑崖望咸陽宫闕羅北極萬井驚畫出九衢如絃直渭水清銀河橫天流不息朝野盛文物衣冠何翕赩廄馬散連山軍容威絶域伊臯運元化衛霍輸筋力歌鐘樂未休榮去老還逼圓光過滿缺太陽移中昃不散東海金何爭西輝匿無作牛山悲惻愴淚沾臆東海有勇婦代關中有貞女又作賢梁山感杞妻慟哭為之傾金石忽暫開都由激深情東海有勇婦何慙蘇子卿學劍越處子超騰若流星捐軀報夫讎萬死不顧生白刃曜素雪蒼天感精誠十步兩躩一作跳躍三呼一交兵斬首掉國門蹴踏五藏行豁此伉儷憤粲然大義明北海李史君飛章奏天庭捨罪警風俗流芳播滄瀛志在列女籍竹帛已光榮淳于免詔獄漢主為緹縈津妾一棹歌脫父於嚴刑十子若不肖不如一女英豫讓斬空衣有心竟無成要離殺慶忌壯夫素所輕妻子亦何辜焚之買虛聲豈如東海婦事立獨揚名黃葛篇黃葛生洛溪黃花自綿羃青煙蔓長條繚繞幾百尺閨人費素手採緝作絺絺巾縫為絶國衣逺寄日南客蒼梧大火落暑服莫輕擲此物雖過時是妾手中跡李太白文集卷三
