front:
  text: 欽定四庫全書李太白文集巻一
  hash: sha256:2b618ee2dd4fca8f8654ccec1227eff4c75de39b625dca352098f20c9cf668b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0012_WYG_001-1a, image: WYG1066/WYG1066-0221a.png}
body:
  text: 唐李白撰歌詩五十九首古風上古風五十九首大雅久不作吾衰竟誰陳王風委蔓草戰國多荆榛龍虎相啖食兵戈逮狂秦正聲何微芒哀怨起騷人揚馬激頽波開流蕩無垠廢興雖萬變憲章亦巳淪自從一作蹉跎建安來綺麗不足珍聖代復元古垂衣貴清真羣才屬休明乗運共躍鱗文質相炳煥衆星羅秋旻我志在刪述垂輝映千春希聖如有立絶筆於獲麟蟾蜍薄太清蝕此瑶臺月圓光虧中天金魄遂淪没螮蝀入紫微大明夷朝暉浮雲隔兩耀萬象昬隂霏蕭蕭長門宫昔是今巳非桂蠧花不實天霜下嚴威沉歎終永夕感我涕沾衣秦皇掃六合虎視何雄哉揮劒決浮雲諸侯盡西來明斷自天啓一作雄圖發英斷大略駕羣才收兵鑄金人函谷正東開銘功㑹稽嶺騁望琅邪臺刑徒七十萬起土驪山隈尚採不死藥茫然使心一作人哀連弩射海魚長鯨正崔嵬額鼻象五嶽揚波噴雲雷鬐鬛蔽青天何由覩蓬萊徐市載秦女樓船幾時回但見三泉下金棺葬寒灰鳯飛九千仞五章備綵珍銜書且虚歸空入周與秦横絶歴四海所居未得鄰吾營紫河車千載落風塵藥物祕海嶽採鉛青溪濱時登大樓山舉首望仙真羽駕滅去影飈車絶回輪尚恐丹液遲志願不及申徒霜鏡中髪羞彼鶴上人桃李何處開此花非我春唯應清都境長與韓衆親太白何蒼蒼星辰上森列去天三百里邈爾與世絶中有緑髪翁披雲一作千春卧松雪不笑亦不語𡨕棲在巖穴我來逢真人長跪問寳訣粲然忽自哂一作啓玉齒授以錬藥說銘骨傳其語竦身已電滅仰望不可及蒼然五情熱吾將營丹砂永與世人别代馬不思越越禽不戀燕情性有所習土風固其然昔别鴈門關今戍龍庭前驚沙亂海日飛雪迷胡天蟣蝨生虎鶡心魂逐旌旃苦戰功不賞忠誠難可宣誰憐李飛將白首没三邊客有鶴上仙飛飛凌太清揚言碧雲裏自道安期名兩兩白玉童雙吹紫鸞笙去影忽不見回風送天聲舉首逺望之一作我欲一問之飄然若流星願飡金光草夀與天齊傾一作五鶴西北來飛飛凌太清仙人緑雲上自道安期名兩兩白玉童雙吹紫鸞笙飄然下倒景倐忽無留行遺我金光草服之四體輕將隨赤松去對博坐蓬瀛莊周夢蝴蝶蝴蝶為莊周一體更變易萬事良悠悠乃一作那知蓬萊水復作清淺流青門種𤓰人舊日東陵侯富貴固一作茍如此營營何所求齊有倜儻生魯連特髙妙明月出海底一朝開光曜却秦振英聲後世仰末照意輕千金贈顧向平原笑吾亦澹蕩人拂衣可同調黄河走東溟白日落西海逝川與流光飄忽不相待春容捨我去秋髪已衰改人生非寒松年貌一作顔色豈長在吾當乗雲螭吸景駐光彩一作誰能學天飛三秀與君採松栢本孤直難為桃李顔昭昭嚴子陵垂釣滄波間身將客星隱心與浮雲閑長揖萬乗君還歸富春山清風灑六合邈然不可攀使我長歎息冥棲巖石間君平既棄世世亦棄君平觀變窮太易探元一作𤣥化羣生寂寞綴道論一作真道空簾閉幽情一作清騶虞不虚一作復來鸑鷟有時鳴安知天漢上白日懸髙名海客去巳久誰人一作能測沉冥胡關饒風沙蕭索一作颯竟終古木落秋草黄登髙望戎虜荒城空大漠邉邑無遺堵白骨横千霜嵯峨蔽榛莽借問誰陵虐天驕毒威武赫怒我聖皇勞師事鼙鼓陽和變殺氣發卒騷中土三十六萬人哀哀淚如雨且悲就行役安得營農圃不見征戍兒豈知關山苦一本此下添爭鋒徒死節秉鉞皆庸豎戰士塗蒿萊將軍獲圭組四句李牧今不在一作衛霍今不在邉人飼豺虎燕昭延郭隗遂築黄金臺劇辛方趙至一作往鄒衍復齊來奈何青雲士棄我如塵埃珠玉買歌笑糟糠養賢才方知黄鶴舉千里獨徘徊金華牧羊兒乃是紫煙客我願從之逰未去髪已白不知繁華一作朱顔子擾擾何所迫崑山採瓊蘂一作㽔可以錬精魄天津三月時千門桃與李朝為斷腸花暮逐東流水前水復一作非後水古今相續流新一作今人非舊人年年橋上逰鷄鳴海色動謁帝羅公侯月落西上陽一作上陽西餘輝半城樓衣冠照雲日朝下散皇州鞍馬如飛龍黄金絡馬頭行人皆辟易志氣横嵩丘入門上髙堂列鼎錯珍羞香風引趙舞清管隨齊謳七十紫鴛鴦雙雙戲庭幽行樂爭晝夜自言度千秋功成身不退自古多愆尤黄犬空歎息緑珠成釁讎何如鴟夷子散髪棹一作弄扁舟西上一作嶽蓮花山迢迢見明星素手把芙蓉虚歩躡太清霓裳曵廣帶飄拂昇天行邀我登雲臺髙揖衛叔卿恍恍與之去駕鴻凌紫冥俯視洛陽川茫茫走胡兵流血塗野草豺狼盡冠纓昔我逰齊都登華不注峯兹山何峻秀緑翠如芙蓉蕭颯古仙人了知是赤松借予一白鹿自挾兩青龍含笑凌倒景欣然願相從泣與親友别欲語再三咽勗君青松心努力保霜雪世路多險艱白日欺紅顔分手各千里去去何時還在世復幾時倐如飄風度空聞紫金經白首愁相誤撫己忽自笑沉吟為誰故名利徒煎熬安得閑余歩終留赤玉舄東上蓬山一作萊路秦帝如我求蒼蒼但煙霧郢客吟白雪遺響飛青天徒勞歌此曲舉世誰為傳試為巴人唱和者乃數千吞聲何足道歎息空悽然秦水别隴首幽咽多悲聲胡馬顧朔雪躞蹀長嘶鳴感物動我心緬然含歸情昔視秋蛾飛今見春蠶生嫋嫋桑枯一作結葉萋萋柳垂榮急節謝流水羇心揺懸旌揮涕且復去惻愴何時平秋露白如玉團團下庭緑我行忽見之寒早悲嵗促生猶鳥過目胡乃自結束景公一何愚牛山淚相續物苦不知足登一作得隴又望蜀人心若波瀾世路有一作多屈曲三萬六千日夜夜當秉燭大車揚飛塵亭午暗阡陌中貴多黄金連雲開甲宅路逢鬭雞者冠蓋何輝赫鼻息干虹蜺行人皆怵惕世無洗耳翁誰知堯與跖世道日交喪澆風散淳源不采芳桂枝反棲惡木根所以桃李樹吐花竟不言大運有興没羣動爭飛奔歸來廣成子去入無窮門碧荷生幽泉朝日豔且鮮秋花冒緑水宻葉羅青煙秀色空絶世馨香誰為傳坐看飛霜滿凋此紅芳年結根未得所願託華池邊燕趙有秀色綺樓青雲端眉目豔皎月一笑傾城歡常恐碧草晚坐泣秋風寒纎手怨玉琴清晨起長歎焉得偶君子共乗雙飛鸞容顔若飛電時景如飄風草緑霜已白日西月復東華鬢不耐秋颯然成衰蓬古來賢聖人一一誰成功君子變猿鶴小人為沙蟲不及廣成子乗雲駕輕鴻三季分戰國七雄成亂麻王風何怨怒世道終分拏至人洞元象髙舉凌紫霞仲尼亦一作欲浮海吾祖之流沙聖賢共淪没臨岐胡咄嗟𤣥風變太古道喪無時還擾擾季葉一作市井人雞鳴趨四關但識金馬門誰一作詎知蓬萊山白首死羅綺笑歌無休一作時閑渌酒哂丹液青娥凋素顔一作萋萋千金骨風塵凋素顔大儒揮金槌琢之一作發塜詩禮間蒼蒼三珠樹冥目焉能攀鄭客西入關行行未能已白馬華山君相逢平原里璧遺鎬池君明年祖龍死秦人相謂曰吾屬可去矣一往桃花源千春隔流水蓐收肅金氣西陸弦海月秋蟬號階軒感物憂不歇良辰竟何許大運有淪忽天寒悲風生夜久衆星没惻惻不忍言哀歌達明發北溟有巨魚身長數千里仰噴三山雪横吞百川水憑陵隨海運烜赫因風起吾觀摩天飛九萬方未已羽檄如流星虎符合專城喧呼救邊急羣鳥皆夜鳴白日曜紫㣲三公運權衡天地皆得一澹然四海清借問此何為荅言楚徴兵一作征楚兵渡瀘及五月將赴雲南征怯卒非戰士炎方難逺行長號别嚴親日月慘光晶泣盡繼以血心摧兩無聲困獸當猛虎窮魚餌奔鯨千去不一囘投軀豈全生如何舞干戚一使有苗平醜女來效嚬還家驚四鄰夀陵失本歩笑殺邯鄲人一曲一作東西斐然子雕蟲喪天真棘刺造沐猴三年費精神功成無所用楚楚且華一作榮身大雅思文王頌聲久崩淪安得郢中質一揮成風斤一作承風一運斤抱玉入楚國見疑古所聞良寳終見棄徒勞三獻君直木忌先伐芳蘭哀自焚盈滿天所損沉冥道為羣東海汎碧水一作流西關乗紫雲魯連及柱史可以躡清芬燕臣昔慟哭五月飛秋霜庶女號蒼天震風撃齊堂精誠有所感造化為悲傷一本此下添而我竟何辜逺身金殿旁浮雲蔽紫闥白日難回光羣沙穢明珠衆草淩孤芳古來共歎息流淚空沾裳孤蘭生幽園衆草共蕪没雖照陽春暉復悲髙秋月飛霜早淅瀝緑豔恐休歇若無清風吹香氣為誰發登髙望四海天地何漫漫霜被羣物秋風飄大荒寒榮華東流水萬事皆波瀾白日掩徂暉浮雲無定端梧桐巢鷰雀枳棘棲鴛鸞且復歸去來劒歌行一作悲路難一本自第四句後云殺氣落喬木浮雲蔽層巒孤鳯鳴天霓遺聲何辛酸逰人悲舊國撫心亦盤桓倚劒歌所思曲終涕洄瀾鳯飢不啄粟所食唯琅玕焉能與羣雞蹙一作刺促爭一飡朝鳴崑丘樹夕飲砥柱湍歸飛海路逺獨宿天霜寒幸遇王子晉結交青雲端懷恩未得報感别空長歎朝弄紫泥海一作朝駕碧鸞車夕披丹霞裳揮手折若木拂此西日光雲卧一作舉逰八極玉顔已干霜飄飄入無倪稽首祈上皇呼我逰太素玉杯賜瓊漿一飡歴萬嵗何用還故鄊永隨長風去天外恣飄揚揺裔雙白鷗鳴飛滄江流宜與海人狎豈伊雲鶴儔寄影宿沙月㳂芳戲春洲吾亦洗心者忘機從爾逰周穆八荒意漢皇萬乗尊淫樂心不極雄豪安足論西海宴王母北宫邀上元瑶水聞遺歌玉杯竟空言靈跡成蔓草徒悲千載魂緑蘿紛葳蕤繚繞松栢枝草木有所託嵗寒尚不移奈何夭桃色坐歎葑菲詩玉顔豔紅彩雲髪非素絲君子恩已畢賤妾將何為八荒馳驚飊萬物盡凋落浮雲蔽頽陽洪波振大壑龍鳯脫罔罟飄颻將安託去去乗白駒空山詠場藿一百四十年國容何赫然隠隠五鳳樓峨峨横三川王侯象星月賓客如雲煙一本首六句云帝京信佳麗國容何赫然劒㦸擁九關歌鍾沸三川蓬萊象天構珠翠誇雲仙鬭雞金宫一作城裏蹴踘瑶臺邉一作走馬蘭臺邉舉動揺白日指揮回青天當塗何翕忽失路長棄捐獨有揚執㦸閉關草太𤣥桃花開東園含笑誇白日偶䝉春風榮生一作矜此豔陽質豈無佳人色但恐花不實宛轉龍火飛零落早相失詎知南山松獨立自蕭飋秦皇按寳劒赫怒振威神逐日巡海右驅石架滄津徴卒空九㝢作橋傷萬人但求蓬島藥豈思農鳸春力盡功不贍千載為悲辛美人出南國灼灼芙蓉姿皓齒終不發芳心空自持由來紫宫女共妬青蛾眉歸去瀟湘沚沉吟何足悲宋國梧䑓東野人得燕石一作宋人枉千金去國買燕石誇作天下珍却哂趙王璧趙璧無緇磷燕石非貞真流俗多錯誤豈知玉與珉殷后亂天紀楚懐亦已昏夷羊滿中野緑葹盈髙門比干諌而死屈平竄湘源虎口何婉孌女嬃空嬋姢彭咸久淪没此意與誰論青春流驚湍朱明一作火驟回薄不忍看秋蓬飄揚竟何託光風滅蘭蕙白露灑葵藿一作委蕭藿美人不我期草木日零落戰國何紛紛兵戈亂浮雲趙倚兩虎鬭晉為六卿分姦臣欲竊位樹黨自相羣果然田成子一旦弑齊君倚劒登髙臺悠悠送春目蒼榛蔽層丘瓊草隠深谷鳳皇鳴西海欲集無珍木鸒斯得匹一作所居一作棲蒿下盈萬族晉風日已頽窮途方慟哭一本首四句以下云翩翩衆鳥飛翺翔在珍木羣花亦便姢榮耀非一族歸來愴途窮日暮還慟哭齊瑟彈一作揮東吟秦絃弄西音慷慨動顔魄使人成荒淫彼美佞邪子婉孌來相尋一笑雙白璧再歌千黄金珍色不貴道詎惜飛光沉安識紫霞客瑶臺鳴玉一作素琴越客採明珠提攜出南隅清輝照海月美價傾鴻一作皇都獻君君按劒懐寳空長吁魚目復相哂寸心増煩紆羽族禀萬化小大各有依啁啁亦何辜六翮掩不揮願銜衆禽翼一向黄河飛飛者莫我顧歎息將安歸我行巫山渚尋古登陽臺天空綵雲滅地逺清風來神女去巳久襄王安在哉荒淫竟淪没樵牧徒悲哀惻惻泣路岐哀哀悲素絲路岐有南北素絲易一作有變移一本下添萬事固如此人生無定期田竇相傾奪賔客互盈虧世塗多翻覆交道方嶮巘斗酒以下同谷風刺輕薄交道方嶮巇斗酒強然諾寸心終自疑張陳竟火滅蕭朱亦星離衆鳥集榮柯窮魚守空一作枯池嗟嗟失懽客勤問何所規一作悲又作勤問何所窺李太白文集巻一
