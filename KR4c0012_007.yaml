body:
  text: 李太白文集巻七唐李白撰歌詩四十一首贈一贈孟浩然襄漢吾愛孟夫子風流天下聞紅顔棄軒冕白首卧松雲醉月頻中聖迷花不事君高山安可仰從此揖清芬贈從兄襄陽少府皓一作晤結髮未識事所交盡豪雄却秦不受賞擊晉一作救趙寧為功託身白刃裏殺人紅塵中當朝揖高義舉世欽英風小節豈足言退耕舂陵東歸來無産業生事如轉蓬一朝狐一作烏裘敝百鎰黄金空彈劒徒激昂出門悲路窮吾兄青雲士然諾聞諸公所以陳片言片言貴情通棣華儻不接甘與秋草同贈張公洲革處士列子居鄭圃不將衆庶分革侯遁南浦常恐楚人聞抱甕灌秋蔬心閑遊天雲每將瓜田叟耕種漢水濵一作濆時登張公洲入獸不亂羣井無桔橰事門絶刺繡文長揖二千石遠辭百里君斯為真隱者吾黨慕清芬淮海對雪贈傅靄一作淮南對雪贈孟浩然朔雪落呉一作潮天從風渡溟渤海樹一作木成陽春江沙皓明月飄颻四荒外想像千花發瑶草生階墀玉塵散庭闕興從剡溪起思繞梁山發寄君郢中歌曲罷心斷絶一云剡溪興空在郢路歌未歇寄君梁父吟曲盡心斷絶贈徐安宜白田見楚老歌詠徐安宜製錦不擇地操刀良在兹清風動百里惠化聞京師浮人若雲歸耕種滿郊岐川光淨麥隴日色明桑枝訟息但長嘯賓來或解頤青槐拂戸牖白一作碧水流園池遊子滯安邑懷恩未忍辭繄君樹桃李嵗晩託深期贈任城盧主簿潛魯中海鳥知天風竄身魯門東臨觴不能飲矯翼思凌空鍾鼔不為樂煙霜誰與同歸飛未忍去流淚謝鴛鴻早秋贈裴十七仲堪遠海動風色吹愁一作秋落天涯南星變大火熱氣餘丹霞光景不可迴六龍轉天車荆人泣美玉魯叟悲匏瓜功業若夢裏一作中撫一作推琴發長嗟裴生信一作實英邁崛起多才華歴抵海岱豪結交魯朱家一作歴遊趙魏豪結交列如麻良圖竟未展意欲飛丹砂破産且救人遺身不為家復攜兩少女一作妾豔色驚荷花雙謌入青雲但惜白日斜窮一作滄溟出寳貝大澤饒龍蛇明主儻一作必見收烟霄路非賖知飛萬里道勿使嵗寒嗟一作時命若不㑹歸應錬丹砂贈范金鄉二首君子枉清盼不知東走迷離家未幾月絡緯鳴中閨桃李君不言攀花願成蹊那能吐芳信惠好相招攜我有結綠珍久藏濁水泥時人棄此物乃與燕珉一作石齊拂拭欲贈之申眉路無梯遼東慙白豕楚客羞山雞徒有獻芹心終流泣玉一作血啼祗應自索漠畱舌示山妻范宰不買名絃歌對前楹為邦黙自化日覺氷壺清百里雞犬靜千廬機杼鳴浮人少蕩析愛客多逢迎遊子覩嘉政因之聽頌聲贈瑕丘王少府皎皎鸞鳯姿飄飄神仙氣梅生亦何事來作南昌尉清風佐鳴琴寂寞道為貴一作為誰貴一見過所聞操持難與羣毫揮魯邑訟目送瀛洲雲我隱屠釣下爾當玉石分無由接高論空此仰清芬東魯見狄博通去年別我向何處有人傳道游江東謂言挂席度滄海却來應是無長風見京兆韋叅軍量移東陽二首呉中潮水還歸海流人却到呉相逢問愁苦淚盡日南珠聞說金華渡東連五百灘全勝若耶好莫道此行難猿嘯千谿合松風五月寒他年一攜手揺艇入新安贈丹陽横山周處士惟長周子横山隱開門臨城隅連峯入戸牖勝槩凌方壺時作白紵詞放歌丹陽湖水色傲溟渤川光秀菰蒲當其得意時心與天壤俱閑雲隨舒巻安識身有無抱石恥獻玉沈泉笑探珠羽化如可作相攜上清都一作攜手上清都玉真公主別館苦雨贈衞尉張卿二首長安愁坐金張館繁陰晝不開空烟送雨色蕭颯望中來翳翳昏墊苦沈沈憂恨催清秋何以慰白酒盈吾杯吟詠思管樂此人已成灰獨酌聊自勉誰貴經綸才彈劒謝公子無魚良可哀苦雨思白日浮雲何由巻稷卨和天人陰陽仍驕蹇秋霖劇倒井昬霧横絶巘欲往咫尺塗遂成山川限潨潨奔澑瀉浩浩驚波轉泥沙塞中途牛馬不可辨飢從漂母食閑綴羽林一作陵簡園家逢秋蔬藜藿不滿眼蠨蛸結思幽蟋蟀傷褊淺厨竈無青烟刀机生綠蘚投筯解鷫鸘換酒醉北堂丹徒布衣者慷慨未可量何時黄金盤一斛薦㯽榔功成拂衣去揺曳滄洲旁贈韋祕書子春谷口鄭子真躬耕在巖石高名動京師天下皆藉藉其人竟不起雲卧從所適茍無濟代心獨善亦何益惟君家世者偃息逢休明談天信浩蕩說劒紛縱横謝公不徒然起來為蒼生祕書何寂寂無乃羈豪英且復歸碧山安能戀金闕舊宅樵漁池蓬蒿已應没却顧女几峯胡顔見雲月徒為風塵苦一官已白髮氣同萬里合訪我來瓊都披雲覩青天捫蝨話良圖畱侯將綺季出處未云殊終與安社稷功成去五湖贈韋侍御黄裳二首太華生長松亭亭凌霜雪天與百尺高豈為微飈折桃李賣揚豔路人行且迷春光掃地盡碧葉成黄泥願君學長松慎勿作桃李受屈不改心然後知君子見君乗驄馬知上太山道此地果摧輪全身以為寳我如豐年玉棄置秋田草但朂冰壺心無為歎衰老贈薛校書我有呉趨曲無人知此音姑蘇成蔓草麋鹿空悲吟未誇觀濤作空鬱釣鼇心舉手謝東海虚行歸故林贈何七判官昌浩有時忽惆悵匡坐至夜分平明空嘯咤思欲解世紛心隨長風去吹散萬里雲羞作濟南生九十誦古文不然拂劒起沙漠收竒勲老死田陌間何因揚清芬夫子今管樂英才冠三軍終與同出處豈將沮溺羣讀諸葛武侯傳書懷贈長安崔少府叔封昆季漢道昔云季羣雄方戰爭霸圖各未立割據資豪英赤伏起頽運卧龍得孔明當其南陽時隴畝躬自耕魚水三顧合風雲四海生武侯立岷蜀壯士吞咸京何人先見許但有崔州平余亦草間人一作士頗懷拯物情晩途值子玉華髮同衰榮託意在經濟結交為弟兄無令管與鮑千載獨知名贈郭將軍將軍少年出武威一云將軍豪蕩有天威入掌銀臺護紫微平明拂劍朝天去薄暮垂鞭醉酒歸愛子臨風吹玉笛美人騰一作向又作嬌月舞羅衣疇昔雄豪如夢裏相逢且欲醉春輝一云今日相逢俱失路何年灞上弄春輝駕去溫泉宫後贈楊山人少年落托楚漢間風塵蕭瑟多苦顔自言介蠆一作管葛竟誰許長吁莫錯還閉關一朝君王垂拂拭剖心輸丹雪胷臆忽䝉白日迴景光直上青雲生羽翼幸陪鸞輦出鴻都身騎飛龍天馬駒王公大人借顔色金章紫綬來相趨當時結交何紛紛片言道合唯有君待吾盡節報明主然後相攜一作攜手滄洲卧白雲溫泉侍從歸逢故人漢帝長楊苑誇胡羽獵歸子雲叨侍從獻賦有光輝激賞揺天筆承恩賜御衣逢君奏明主他日共翻飛贈裴十四朝見裴叔則朗如行玉山黄河落天走東海萬里寫入胷懷間身騎白黿不敢度金高南山買君顧徘徊六合無相知飄若浮雲且西去贈崔侍御黄河三尺鯉本在孟津居㸃額不成龍歸來伴一作作凡魚故人東海客一見借吹嘘風濤儻相因更欲凌崑墟何當赤草使再往召相如上李邕大鵬一日同風起摶揺直上九萬里假令風歇時下來猶能簸却滄溟水世人見我恒殊調聞余大言皆冷笑宣父猶能畏後生丈夫未可輕年少述德兼陳情上哥舒大夫天為國家孕英才森森矛㦸擁靈臺浩蕩深謀噴江海縱横逸氣走風雷丈夫立身有如此一呼三軍皆披靡衞青漫作大將軍白起真成一豎子雪讒詩贈友人四言嗟余沈迷猖蹶已久五十知非古人常有立言補過庶存不朽包荒匿瑕蓄此頑醜月出致譏貽愧皓首感悟遂晩事往日遷白璧何辜青蠅屢前羣輕折軸下沈黄泉衆毛飛骨上淩青天萋菲暗成貝錦粲然泥沙聚埃珠玉不鮮洪炎爍山發自纎烟滄波蕩日起於微涓交亂四國播于八埏拾塵掇蜂疑聖猜賢哀哉悲夫誰察余之貞堅彼婦人之猖狂不如鵲之彊彊彼婦人之婬昬不如鶉之奔奔坦蕩一作皎皎君子無悅簧言擢髮續罪罪乃孔多傾海流惡惡無以過人生實難逢此織羅積毁銷金沈憂作歌天未喪文其如余何妲己滅紂襃女惑周天維蕩覆職此之由漢祖吕氏食其在傍秦皇太后毐亦婬荒螮蝀作昬遂掩太陽萬乘尚爾匹夫何傷辭殫意窮心切理直如或妄談昊天是殛子野善聽離婁至明神靡遁響鬼無逃形不我遐棄庶昭忠誠贈參寥子白鶴飛天書南荆訪高士五雲在峴山果得參寥子骯髒辭故園昂藏入君門天子分玉帛百官接話言毫墨時灑落探元有竒作著論窮天人千春祕麟閣長揖不受官拂衣歸林巒余亦去金馬藤蘿同所歡相思在何處桂樹青雲端贈饒陽張司戸璲燕魏太原朝飲蒼梧泉夕棲碧海烟寧知鸞鳯意遠託椅桐前慕藺豈曩古攀嵇是當年愧非黄石老安識子房賢功業嗟落日容華棄徂川一語已道意三山期著鞭蹉跎人間世寥落壺中天獨見遊物祖探元窮化先何當共攜手相與排冥一作罝筌贈清漳明府姪我李百萬葉柯條布中州天開青雲器日為蒼生憂小邑且割雞大刀佇烹牛雷聲動四境惠與清漳流絃歌詠唐堯脫落隱簪組心和得天真風俗由一作獨太古牛羊散阡陌夜寢不扃戸問此何以然賢人宰吾土舉邑樹桃李垂陰亦流芬河堤繞淥水桑柘連青雲趙女不冶容提籠晝成羣繰絲鳴機杼百里聲相聞訟息鳥下階高卧披道帙蒲鞭挂簷枝示恥無撲抶琴清月當戸人寂風入室長嘯無一言陶然上皇逸白玉壺冰水壺中見底清清光洞毫髮皎潔照羣情趙北美佳政燕南播高名過客覽行謡因之頌德聲一作得頌聲贈臨洺縣令皓弟時被訟停官陶令去彭澤茫然太古心大音自成曲但奏無弦琴釣水路非遠連鼇意何深終期龍伯國與爾相招尋贈郭季鷹河東郭有道於世若浮雲盛德無我位清光獨映君恥將雞並食長與鳯為羣一擊九千仞相期凌紫氛鄴中贈王大勸入高鳯石門山幽居一身竟無託遠與孤蓬征千里失所依復將落葉并中途偶良朋問我將何行欲獻濟時䇿此心誰見明君王制六合海塞無交兵壯士伏草間沈憂亂縱横飄飄不得意昨發南都城紫鷰櫪上嘶青萍匣中鳴投軀寄天下長嘯尋豪英恥學琅邪人龍蟠事躬耕富貴吾自取建功及春榮我願執爾手爾方達我情相知同一已豈唯弟與兄抱子弄白雲琴歌發清聲臨別意難盡各希存令名贈華州王司士陜西淮水不絶波瀾高盛德未泯生英髦知君先負廟堂器今日還須贈寳刀贈盧徵君昆弟明主訪賢逸雲泉今已空二盧竟不起萬乘高其風河上喜相得壺中趣每同滄洲即此地觀化遊無窮木落海水清鼇背覩方蓬與君弄倒影攜手凌星虹贈新平一作豐少年韓信在淮陰少年相欺凌屈體若無骨壯心有所憑一遭龍顔君嘯吒從此興千金荅漂母萬古共嗟稱而我竟胡一作何為寒苦坐相仍長風入短袂内一作兩手如懷冰故友不相恤新交寧見矜摧殘檻中虎羈紲韝上鷹何時騰風雲搏擊申所能贈崔侍御長劒一杯酒男兒方寸心洛陽因劇孟託一作訪宿話胷襟但仰山嶽秀不知江海深長安復攜手再顧重千金君乃輶軒佐余叨翰墨林高風摧秀木虛彈落驚禽不取回舟興而來命駕尋扶揺應借便一作力桃李願成陰笑吐張儀舌愁為莊舄吟誰憐明月夜腸斷聽秋砧走筆贈獨孤駙馬都尉朝天躍馬歸香風吹人花亂飛銀鞍紫鞚照雲日左顧右盼生光輝是時僕在金門裏待詔公車謁天子長揖䝉垂國士恩壯心剖出酬知已一別蹉跎朝市間青雲之交不可攀儻其公子重迴顧何必侯嬴長抱關李太白文集巻七
