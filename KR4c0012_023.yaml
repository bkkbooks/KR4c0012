body:
  text: 李太白文集巻二十三唐李白撰歌詩六十二首閨情寄逺十二首三鳥别王母銜書來見過腸斷若剪絃其如愁思何遥知玉牕裡纎手弄雲和奏曲有深意青松交女蘿寫水山井中同泉豈殊波秦心與楚恨皎皎為誰多青樓何所在乃在碧雲中寳鏡挂秋水一作月羅衣輕春風新粧坐落日悵望金一作錦屏空念此一作剪綵送短書願因一作同雙飛鴻本作一行書殷勤道相憶一行復一行滿紙情何極瑶臺有黄鶴為報青樓人朱顔凋落盡白髪一何新自知未應還一作老離居一作君經三春桃李今若為當牕發光彩莫使香風飄留與一作取紅芳待玉筯落春一作清鏡坐愁湖陽水聞一作且與隂麗華風烟接鄰里青春已復過白日忽相催但恐荷一作飛花晚令人意已摧相思不惜夢日夜向陽臺逺憶巫山陽花明渌江暖躊躇未得往淚向南雲滿春風復無情吹我夢魂斷不見眼中人天長音信短陽臺隔楚水春草生黄河一作隂雲隔楚水轉蓬落渭河相思無日夜浩蕩若流波流波向海去欲見終無因一作定繞珠江濱遥將一㸃淚逺寄如花人昔一作妾在舂陵東君居漢江島百里望花光往來成白道一作日日採蘼蕪上山成白道一為雲雨别此地生秋草秋草秋蛾飛相思愁落暉何由一相見滅燭解羅衣一本暉下添昔時攜手去今時流淚歸遥知不得意玉筯㸃羅衣憶昨東園桃李紅碧枝與君此時初别離金瓶落井無消息令人行歎復坐思坐思行歎成楚越春風玉顔畏銷歇碧牕紛紛下落花青樓寂寂空明月兩不見但相思空留錦字表心素至今緘愁不忍窺長短春草緑縁階如有情巻葹心獨苦抽却死還生覩物知妾意希君種後庭閑時當採掇念此莫相輕魯縞如玉霜筆一作剪題月支書寄書白鸚鵡西海畏離居行數雖不多字字有委曲天末如見之開緘淚相續千里若在眼萬里若在心相思千萬里一書直千金美人在時花滿堂美人去後餘空牀牀中繡被巻不寢一作更不巻至今三載聞餘香一作猶聞香香亦竟不滅人亦竟不來相思黄葉盡一作落白露濕一作㸃青苔此首一作贈逺愛君芙蓉嬋姢之艶色若可餐兮難再得憐君氷玉清迥之明心情不極兮意已深朝共琅玕之綺食夜同鴛鴦之錦衾恩情婉孌忽為别使人莫錯亂愁心亂愁心涕如雪寒燈厭夢魂欲絶覺來相思生白髪盈盈漢水若可越可惜凌波步羅襪美人美人兮歸去來莫作朝雲飛陽臺長信宫月皎昭陽殿霜清長信宫天行乗玉輦飛鷰與君同更有歡娯處一作别有留情處承恩樂未窮誰憐團扇妾獨坐怨秋風長門怨二首天回北斗挂西樓金屋無人螢火流月光欲到長門殿别作深宫一段愁桂殿長愁不記春黄金四屋起秋塵夜懸明鏡青天上獨照長門宫裡人春怨白馬金羈遼海東羅帷繡被卧春風落月低軒窺燭盡飛花入户笑牀空代贈逺一作寄逺妾本洛陽人狂夫幽燕客渴飲易水波猶來多感激胡馬西北馳香駿揺緑絲鳴鞭從此去逐北蕩邊陲昔去有好言不言乆離别燕支多美女走馬輕風雪見此不記人恩情雲雨絶啼流玉筯盡坐恨金閨切織錦作短書腸隨回文結相思欲有寄恐君不見察焚之揚其灰手跡自此滅陌上贈美人一云小放歌行一首在第三此是第二篇駿馬驕行踏落花垂鞭直拂五雲車美人一笑褰珠箔遥指紅一作青樓是妾家閨情流水去絶國浮雲辭故關水或戀前浦雲猶歸舊山恨君流一作龍沙去棄妾漁陽間玉筯夜垂一作日夜流雙雙落朱顔黄鳥坐相悲緑楊誰更攀織錦心草草挑燈淚斑斑窺鏡不自識况乃狂夫還代别情人清水本不動桃花發岸傍桃花弄水色波蕩揺春光我恱子容艶子傾我文章風吹緑琴去曲度紫鴛鴦昔作一水魚今成兩枝鳥哀哀長雞鳴夜夜達五曉起折相思樹歸贈知寸心覆水不可收行雲難重尋天涯有度鳥莫絶瑶華音代秋情幾日相别離門前生穭葵寒蟬聒梧桐日夕長鳴悲白露濕螢火清霜零兔絲空掩紫羅袂一作空閨掩羅袂長啼無盡時對酒蒲萄酒金叵羅呉姬十五細馬䭾青黛畫眉紅錦靴道字不正嬌唱歌玳瑁筵中懐裡醉芙蓉帳底奈君何怨情新人如花雖可寵故人似玉猶來重花性飄揚不自持玉心皎潔終不移故人昔新今尚故還見新人有故時請看陳后黄金屋寂寂珠簾生網絲湖邊採蓮婦小姑織白紵未解將人語大嫂採芙蓉溪湖千萬重長兄行不在莫使外人逢願學秋胡婦貞心比古松怨情美人巻珠簾深坐嚬蛾眉但見淚痕濕不知心恨誰代寄情人楚詞體君不來兮徒蓄怨積思而孤吟雲陽一去以逺隔巫山渌水之沉沉留餘香兮染繡被夜欲寢兮愁人心朝馳余馬於青樓怳若空而夷猶浮雲深兮不得語却惆悵而懐憂使青鳥兮銜書恨獨宿兮傷離居何無情而兩絶夢雖往而交疎横流涕而長嗟折芳洲之瑶華送飛鳥以極目怨夕陽之西斜願為連根同死之秋草不作飛空之落花學古思邊銜悲上隴首腸斷不見君流水若有情幽哀從此分蒼茫愁邊色惆悵落日曛山外接逺天天際復有雲白雁從中來飛鳴苦難聞足繫一書札寄言歎離羣離羣心斷絶十見花成雪胡地無春輝征人行不歸相思杳如夢珠淚濕羅衣思邊一作春怨去年何時君别妾南園緑草飛蝴蝶今嵗何時妾憶君西山白雪暗秦雲玉關去此三千里欲寄音書那可聞口號呉王舞人半醉風動荷花水殿香姑蘇臺上宴呉王西施醉舞嬌無力笑倚東牕白玉牀折荷有贈涉江翫秋水愛此紅蕖鮮攀荷弄其珠蕩漾不成圎佳人綵雲裡欲贈隔逺天相思無因見悵望涼風前代美人愁鏡二首明明金鵲鏡了了玉臺前拂拭皎氷月光輝何清圎紅顔老昨日白髪多去年鈆粉坐相誤照來空凄然美人贈此盤龍之寳鏡燭我金縷之羅衣時將紅袖拂明月為惜普照之餘輝影中金鵲飛不滅臺下青鸞思獨絶藁砧一别若箭弦去有日來無年狂風吹却妾心斷玉筯併墮菱花前贈段七娘羅襪凌波生網塵那能得計訪情親千盃緑酒何辭醉一面紅粧惱殺人别内赴徴三首王命三徵去未還明朝離别出呉關白玉髙樓看不見相思須上望夫山出門妻子强牽衣問我西行幾日歸來時儻佩黄金印莫見蘇秦不下機翡翠為一作髙樓金作梯誰人獨宿倚門啼一作巻簾愁坐待鳴雞夜泣寒燈連曉月行行淚盡楚關西秋浦寄内我今尋陽去辭家千里餘結荷見水宿却寄大雷書雖不同辛苦愴離各自居我自入秋浦三年北信疎紅顔愁落盡白髪不能除有客自梁苑手攜五色魚開魚得錦字歸問我何如江山雖道阻意合不為殊自代内贈寳刀截流水無有斷絶時妾意逐君行纒綿亦如之别來門前草春盡秋轉碧掃盡還更生萋萋滿行跡鳴鳳始相得雄驚雌各飛遊雲落何山一往不見歸估客發大樓一作東海知君在秋浦梁苑空錦衾陽臺夢行雨妾家三作相失勢去西秦猶有舊歌管凄清聞四鄰曲度入紫雲啼無眼中人女弟争笑弄悲羞淚盈巾妾似井底桃開花向誰笑君如天上月不肯一回照窺鏡不自識别多憔悴深安得秦吉了為人道寸心秋浦感主人歸鷰寄内霜朽楚關木始知殺氣嚴寥寥金天廓婉婉緑紅潛胡鷰别主人雙雙語前簷三飛四回顧欲去復相瞻豈不戀華屋終然謝珠簾我不及此鳥逺行嵗已淹寄書道中歎淚下不能緘送内尋廬山女道士李騰空二首君尋騰空子應到碧山家水舂雲母碓風掃石楠花若戀幽居好相邀弄紫霞多君相門女學道愛神仙素手掬青靄羅衣曳紫烟一往屏風疊乗鸞著玉鞭一作不著鞭贈内三百六十日日日醉如泥雖為李白婦何異太常妻在尋陽非所寄内聞難知慟哭行啼入府中多君同蔡琰流淚請曹公知登呉章嶺昔與死無分崎嶇行石道外折入青雲相見若悲歎哀聲那可聞南流夜郎寄内夜郎天外怨離居明月樓中音信疎北雁春歸看欲盡南來不得豫章書越女詞五首長干呉兒女眉目艶星月屐上足如霜不著鵶頭襪呉兒多白晳好為蕩舟劇賣眼擲春心折花調行客耶溪採蓮女見客棹歌迴笑入荷花去佯羞不肯來東陽素足女㑹稽素舸郎相看月未墮白地斷肝腸鏡湖水如月耶溪女如雪新粧蕩新波光景兩竒絶浣沙石上女玉面耶溪女青蛾紅粉粧一雙金齒屐兩足白如霜示金陵子一作金陵子詞金陵城東誰家子一作金陵子竊聽琴聲碧一作夜牕裡落花一片天上來隨人直渡西江水楚歌呉語嬌不成似能未能最有情謝公正要東山妓攜手林泉處處行出妓金陵子呈盧六四首安石東山三十春傲然攜妓出風塵樓中見我金陵子何似陽臺雲雨人南國新豐酒東山小妓歌對君君不樂花月奈愁何東道烟霞主西江詩酒筵相逢不覺醉日墮厯陽川小妓金陵歌楚聲家僮丹砂學鳳鳴我亦為君飲清酒君心不肯向人傾巴女詞巴水急如箭巴船去若飛十月三千里郎行幾歲歸哀傷哭晁卿衡日本晁卿辭帝都征帆一片遶蓬壺明月不歸沉碧海白雲愁色滿蒼梧自溧水道哭王炎三首宣州作白楊雙行行白馬悲路傍晨興見曉月更似發雲陽溧水通呉關逝川去未央故人萬化盡閉骨茅山岡天上墜玉棺泉中掩龍章名飛日月上義與風雲翔逸氣竟莫展英圖俄夭傷楚國一老人來嗟龔勝亡有言不可道雪泣惜蘭芳王公希代寳棄世一何早弔死不及哀殯宫已秋草悲來欲脫劒挂向何枝好哭向茅山雖未摧一生淚盡丹陽道王家碧瑶樹一樹忽先摧海内故人泣天涯弔鶴來未成霖雨用先夭濟川材一罷廣陵散鳴琴更不開哭宣城善釀紀叟紀叟黄泉裡還應釀老春夜臺無曉日沽酒與何人一作題戴老酒店云戴老黄泉下還應釀大春夜臺無李白沽酒與何人宣城哭蔣徵君華敬亭埋玉樹知是蔣徵君果得相如草仍餘封禪文池臺空有月詞賦舊凌雲獨挂延陵劒千秋在古墳李太白文集巻二十三
