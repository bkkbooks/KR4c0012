body:
  text: 李太白文集卷十六唐李白撰歌詩三十首酬答下答王十二寒夜獨酌有懷再入吳中昨夜吳中雪子猷佳興發萬里浮雲卷碧山青天中道流孤月孤月滄浪一作波河漢清北斗錯落長庚明懷余對酒夜霜白玉牀金井氷崢嶸人生飄忽百年內且須酣暢萬古情君不能狸膏金距學鬭雞坐令鼻息吹虹霓君不能學哥舒橫行青海夜帶刀西屠石堡取紫袍吟詩作賦北忩裏萬言不直一杯水世人聞此一作之皆掉頭有如東風射馬耳魚目亦笑我請一作謂與明月同驊騮拳局不能食蹇驢得志鳴春風折楊黃花合流俗晉君聽琴枉清角巴一作幾人誰肯和陽春楚地猶來賤竒璞黃金散盡交不成白首為儒身被輕一談一笑失顔色蒼蠅貝錦喧謗聲曾參豈是殺人者讒言三及慈母驚與君論心握君手榮辱於余亦何有孔聖猶聞傷鳯麟董龍更是何雞狗一生傲岸苦不諧恩疏媒勞志多乖嚴陵髙揖漢天子何必長劔拄頤事玉階達亦不足貴窮亦不足悲韓信羞將絳灌比禰衡恥逐屠沽兒君不見李北海英風豪氣今何在君不見裴尚書土墳三尺蒿棘一作下居少年早欲五湖去見此彌將鍾鼎疏酬裴侍御對雨感時見贈金陵雨色秋來寒風嚴清江爽孤髙繡衣人瀟灑青霞賞平生多感激忠義非外奬禍連積怨生事及徂川往楚邦有壯士鄢郢翻掃蕩申包哭秦庭泣血將安仰鞭尸辱已及堂上羅宿莽頗似今之人蟊賊陷忠讜渺然一水隔何由稅歸鞅日夕聽猿愁懷賢盈夢想酬崔侍御嚴陵不從萬乘遊歸臥空山釣碧流自是客星辭帝坐元非太白醉揚州贈李十二攝監察御史崔成甫附我是瀟湘放逐臣君辭明主漢江濱天外常求太白老金陵捉得酒仙人玩月金陵城西孫楚酒樓達曙歌吹日晚乘醉著紫綺裘烏紗巾與酒客數人棹歌秦淮往石頭訪崔四侍御昨玩西城月青天垂玉鈎朝沽金陵酒歌吹孫楚樓忽憶繡衣人乘船往石頭草裹烏紗巾倒披紫綺裘兩岸拍手笑疑是王子猷酒客十數公崩騰醉中流謔浪掉海客喧呼傲陽侯半道逢吳姬卷簾出揶揄我憶君到此不知狂與羞月下一見君三杯便回橈捨舟共連袂行上南渡橋興發歌渌水秦客為之搖一作謳雞鳴復相招清宴逸雲霄贈我數百字字字凌風飈繫之衣裘上相憶每長謡江上答崔宣城太華三芙蓉明星玉女峯尋仙下西嶽陶令忽相逢問我將何事湍波歷幾重貂裘非季子鶴氅似王恭謬忝燕臺召而陪郭隗蹤水流知入海雲去或從龍樹繞蘆洲月山鳴鵲鎮鍾還期如可訪台嶺蔭長松答族姪僧中孚贈玉泉仙人掌茶并序余聞荆州玉泉寺近清溪諸山山洞往往有乳窟窟中多玉泉交流中有一作見白蝙蝠大如鴉按仙經蝙蝠一名仙鼠千嵗之後體白如雪一作銀棲則倒懸蓋飲乳水而長生也其水邊處處有茗草羅生枝葉如碧玉唯玉泉真公常采而飲之年八十餘嵗顔色如桃花而此茗清香滑熟異於他者所以能還童振枯壯一作扶人夀也余遊金陵見宗僧中孚示余茶數十片拳然重疊其狀如手號為仙人掌茶蓋新出乎玉泉之山曠古未覿因持之見遺兼贈詩要余答之遂有此作後之髙僧大隱知仙人掌茶發乎中孚禪子及青蓮居士李白也常聞玉泉山山洞多乳窟仙鼠如白鴉倒懸深一作清溪月茗生此中石玉泉流不歇根柯灑芳津採服潤肌骨楚老卷緑葉枝枝相接連曝成仙人掌似拍洪崖肩舉世未見之其名定誰傳宗英乃禪伯投贈有佳篇清鏡燭無鹽顧慙西子妍朝坐有餘興長吟播諸天酬裴侍御留岫師彈琴見寄君同鮑明逺邀彼休上人鼓琴亂白雪秋變江上春瑶草緑未衰攀翻寄情親相思兩不見流淚空盈巾張相公出鎮荆州尋除太子詹事余時流夜郎行至江夏與張公相去千里公因太府丞王昔使車寄羅衣二事及五月五日贈余詩余答以此詩流夜郎至江夏張衡殊不樂應有四愁詩慙君錦繡段贈我慰相思鴻鵠復矯翼鳯皇憶故池榮樂一如此商山老紫芝醉後答丁十八以詩譏豫捶碎黃鶴樓黃鶴髙樓巳捶碎黃鶴仙人無所依黃鶴上天訴玉帝却放黃鶴江南歸神明太守再雕飾新圖粉壁還芳菲一州笑我為狂客少年往往來相譏君平簾下誰家子云是遼東丁令威作詩掉我驚逸興白雲繞筆忩前飛待取明朝酒醒罷與君爛漫尋春暉答裴侍御先行至石頭驛以書見招期月滿泛洞庭君至石頭驛寄書黃鶴樓開緘識逺意速此南行舟風水無定準湍波或一作成滯留憶昨新一作初月生西簷若瓊鈎今來何所似破鏡懸清秋恨不三五明平湖泛澄流此歡竟莫遂狂殺王子猷巴陵定近逺持贈解人憂答髙山人兼呈權顧二侯虹霓掩天光哲后起康濟應運生夔龍開元掃氛翳太微廓金鏡端拱清遐裔輕塵集嵩嶽虛點盛明意謬揮紫泥詔獻納青雲際讒惑英主心恩疏佞臣計倣徨庭闕下歎息光隂逝未作仲宣詩先流賈生涕挂帆秋江上不為雲羅制山海向東傾百川無盡勢我於鴟夷子相去千餘嵗運濶英達稀同風遙執袂登艫望逺水忽見滄浪枻髙士何處來虛舟渺安繫衣貌本淳古文章多佳麗延引故鄉人風義未淪替顧侯達語默權子識通蔽曾是無心雲俱為此留滯雙萍易飄轉獨鶴思凌厲明晨去瀟湘共謁蒼梧帝答杜秀才五松山見贈五松山南陵銅坑西五六里宣城昔獻長楊賦天開雲雨歡當時待詔承明裏皆道揚雄才可觀勑賜飛龍二天馬黃金絡頭白玉鞍浮雲蔽日去不返總為秋風摧紫蘭角巾東出商山道採秀行歌詠芝草路逢園綺笑向人而君解來一何好聞道金陵龍虎盤還同謝朓望長安千峯夾水向秋浦五松名山當夏寒銅井炎爐歊九天赫如鑄鼎荆山前陶公矍爍呵赤電回祿睢盱揚紫煙此中豈是久留處便欲燒丹從列仙愛聽松風且髙臥颼飀吹盡炎氛過登崖獨立望九州陽春欲奏誰相和聞君往年遊錦城章仇尚書倒屣迎飛箋絡驛奏明主天書降問回恩榮骯髒不能就圭組至今空揚髙道名夫子工文絶世竒五松新作天下推吾非謝尚邀彥伯異代風流各一時一時相逢樂在今袖拂白雲開素琴彈為三峽流泉音從茲一别武陵去去後桃花春水深至陵陽山登天柱石酬韓侍御見招隱黃山韓衆騎白鹿西往華山中玉女千餘人相隨在雲空見我傳祕訣精誠與天通何意到陵陽遊目送飛鴻天子昔避狄與君亦乘驄擁兵五陵下長䇿遏胡戎時泰解繡衣脫身若飛蓬鸞鳯翻羽翼啄粟坐樊籠海鶴一笑之思歸向遼東黃山過石柱巘崿上攢叢因巢翠玉樹忽見浮丘公又引王子喬吹笙舞松風朗詠紫霞篇請開蘂珠宫步綱繞碧落倚樹招青童何日可攜手遺形入無窮酬崔十五見招爾有鳥迹書相招琴溪飲手迹尺素中如天落雲錦讀罷向空笑疑君在我前長吟字不滅懷袖且三年遊宴上遊南陽白水登石激作襄陽朝涉白水源暫與人俗疏島嶼佳境色江天涵清虛目送去海雲心間遊川魚長歌盡落日乘月歸田廬遊南陽清泠泉惜彼落日暮愛此寒泉清西耀逐水流蕩漾遊子情空歌望雲月曲盡長松聲尋魯城北范居士失道落蒼耳中見范置酒摘蒼耳作魯中鴈度秋色逺日靜無雲時客心不自得浩漫將何之忽憶范野人間園養幽姿茫然起逸興但恐行來遲城壕失往路馬首迷荒陂不惜翠雲裘遂為蒼耳欺入門且一笑把臂君為誰酒客愛秋蔬山盤薦霜梨他筵不下筯此席忘朝飢酸棗垂北郭寒瓜蔓東籬還傾四五酌自詠猛虎詞近作十日歡逺為千載期風流自簸蕩謔浪偏相冝酣來上馬去却笑髙陽池魯東門泛舟二首日落沙明天倒開波搖石動水縈回輕舟泛月尋溪轉疑是山隂雪後來水作青龍盤石堤桃花夾岸魯門西若教月下乘舟去何啻風流到剡溪秋獵孟諸夜歸置酒單父東樓觀妓傾暉速短炬走海無停川冀餐圓丘草欲以還頽年此事不可得微生若浮煙俊發跨名駒雕弓控鳴弦鷹豪魯草白狐兔多肥鮮邀遮相馳逐遂出城東田一掃四野空喧呼鞍馬前歸來獻所獲炮炙冝霜天出舞兩美人飄颻若雲仙留歡不知疲清曉方來旋遊太山六首一作天寶元年四月從故御道上太山四月上太山石平御道開六龍過萬壑澗谷隨縈回馬迹繞碧峯于今滿青苔飛流灑絶巘水急一作色松聲哀北眺崿嶂竒傾崖向東摧洞門閉石扇地底興雲雷登髙望蓬瀛想像金銀臺天門一長嘯萬里清風來玉女四五人飄颻下九垓含笑引素手遺我流霞杯稽首再拜之自愧非仙才曠然小宇宙棄世何悠哉清曉騎白鹿直上天門山山際逢羽人方瞳好容顔捫蘿欲就語却掩青雲關遺我鳥迹書飄然落巖間其字乃上古讀之了不間感此三歎息從師方未還平明登日觀舉手開雲關精神四飛揚如出天地間黃河從西來窈窕入逺山慿崖覽八極目盡長空間偶然值青童緑髮雙雲鬟笑我晚學仙蹉跎凋朱顔躊躇忽不見浩蕩難追攀清齋三千日裂素寫道經吟誦有所得衆神衛我形雲行信長風颯若羽翼生攀崖上日觀伏檻窺東溟海色動逺山天雞已先鳴銀臺出倒景白浪翻長鯨安得不死藥髙飛向蓬瀛日觀東北傾兩崖夾雙石海水落眼前天光遙空碧千峯爭攢聚萬壑絶凌歷緬彼鶴上仙去無雲中迹長松入霄漢逺望不盈尺山花異人間五月雪中白終當遇安期於此鍊玉液朝飲王母池暝投天門闕獨抱緑綺琴夜行青山月山明月露白夜靜松風歇仙人遊碧峯處處笙歌發寂聽娛清輝玉真連翠微想像鸞鳯舞飄颻龍虎衣捫天摘匏瓜恍惚不憶歸舉手弄清淺誤攀織女機明晨坐相失但見五雲飛秋夜與劉碭山泛宴喜亭池明宰試舟楫張燈宴華池文招梁苑客歌動郢中兒月色望不盡空天交相冝令人欲泛海只待長風吹攜妓登梁王棲霞山孟氏桃園中碧草已滿地與栁梅爭春謝公自有東山妓金屏笑坐如花人今日非昨日明日還復來白髮對緑酒強歌心已摧君不見梁王池上月昔照梁王樽酒中梁王已去明月在黃鸝愁醉啼春風分明感激眼前事莫惜醉臥桃園東觀魚潭觀魚碧潭上木落潭水清日暮紫鱗躍圎波處處生涼煙浮竹盡秋月照沙明何必滄浪去茲焉可濯纓李太白文集卷十六
