body:
  text: 李太白文集卷二十五唐李白撰表為吳王謝責赴行在遲滯表臣某言伏蒙聖恩追赴行在臣誠惶誠恐頓首臣聞胡馬矯首嘶北風以局顧越禽歸飛戀南枝而刷羽所以流波思其舊浦落葉墜於本根在物尚然矧於臣子臣位叨盤石辜負明時才闕總戎謬當強冦駑拙有素天實知之伏惟陛下重紐乾綱再清國步慜臣不逮賜臣生全歸見白日死無遺恨然臣年過耳順風瘵日加鋒鏑殘骸劣有餘喘雖決力上道而心與願違貴貪尺寸之程轉增犬馬之戀非有他故以疾淹留今大舉天兵掃除戎羯所在郵驛徴發交馳臣逐便水行難於陸進瞻望丹闕心魂若飛慙墜履之還收喜遺簪之再御不勝涕戀屏營之至為宋中丞請都金陵表臣某言臣誠惶誠恐頓首頓首臣聞社稷無常奉明者守之君臣無定位暗者失之所以父作子述重光疊輝天未絶晉人惟戴唐以功德有厚薄運數有修短功髙而福祚長永德薄而政教陵遲三后之姓於今為庶非一朝也伏惟陛下欽六聖之光訓擁千載之鴻休有國之本羣生屬望粵自明兩光岐之陽昔有周太王之興發迹於此天啓有類豈人事歟皇朝百五十年金革不作逆胡竊號剝亂中原雖平嵩丘填伊洛不足以掩宫城之骸骨決洪河灑秦雍不足以蕩犬羊之羶臊毒浸區宇憤盈穹旻此乃猛士奮劍之秋謀臣運籌之日夫不拯橫流何以彰聖德不斬巨猾無以興神功十亂佐周而克昌四凶及虞而乃去去元凶者非陛下而誰且道有興廢代有中季漢當三七莽亦為災赤伏再起丕業終光非陛下至神至聖安能勃然中興乎以臣料人事得失敢獻疑於陛下臣猶望愚夫千慮或冀一得何者賊臣楊國忠蔽塞天聰屠割黎庶女弟席寵傾國弄權九土泉貨盡歸其室怨氣上激水旱荐臻重罹暴亂百姓力屈即欲平殄蝥賊恐難應期且圖萬全之計以成一舉之策今自河以北為胡所凌自河之南孤城四壘大盜蠶食割為洪溝宇宙嶢杌昭然可覩臣伏見金陵舊都地稱天險龍盤虎踞開扄自然六代皇居五福斯在雄圖霸迹隱軫由存咽喉控帶縈錯如繡天下衣冠士庶避地東吳永嘉南遷未盛於此臣又聞湯及盤庚五遷其邑典謨訓誥不以為非衛文徙居楚丘風人流詠伏惟陛下因萬人之蕩析乘六合之譸張去扶風萬有一危之近邦就金陵太山必安之成策茍利於物斷在宸衷況齒革羽毛之所生楩柟豫章之所出元龜大貝充牣其中銀坑鐵冶連綿相屬剗銅陵為金穴煮海水為鹽山以征則兵強以守則國富橫制八極克復兩京俗畜來蘇之歡人多徯后之望陛下西以峨嵋為壁壘東以滄海為溝池守海陵之倉獵長洲之苑雖上林五柞復何加焉上皇居天帝運昌之都儲精真一之境有虞則北閉劍閣南扄瞿塘蚩尤共工五兵莫向二聖髙枕人何憂哉飛章問安往復巴峽朝發白帝暮宿江陵首尾相應率然之舉不勝屏營瞻雲望日之至為宋中丞自薦表臣某聞天地閉而賢人隱雲雷屯而君子用臣伏見前翰林供奉李白年五十有七天寶初五府交辟不求聞達亦由子真谷口名動京師上皇聞而悅之召入禁掖既潤色於鴻業或間草於王言雍容揄揚特見褒賞為賤臣詐詭遂放歸山間居製作言盈數萬屬逆胡暴亂避地廬山遇永王東巡脅行中道奔走却至彭澤具已陳首前後經宣慰大使崔渙及臣推覆清雪尋經奏聞臣聞古之諸侯進賢受上賞蔽賢受明戮若三適稱美必九錫先榮垂之典謀永以為訓臣所管李白實審無辜懷經濟之才抗巢由之節文可以變風俗學可以究天人一命不霑四海稱屈伏惟陛下大明廣運至道無偏收其希世之英以為清朝之寶昔四皓遭髙皇而不起翼惠帝而方來君臣離合亦各有數豈使此人名揚宇宙而枯稿當年傳曰舉逸人而天下歸心伏惟陛下回太陽之髙暉流覆盆之下照特請拜一京官獻可替否以光朝列則四海豪俊引領知歸不勝慺慺之至敢陳薦以聞代壽山答孟少府移文書淮南小壽山謹使東峯金衣雙鶴銜飛雲錦書于維揚孟公足下曰僕包大塊之氣生洪荒之間連翼軫之分野控荆衡之逺勢盤薄萬古邈然星河憑天霓以結峯倚斗極而橫嶂頗能攢吸霞雨隱居靈仙産隋侯之明珠蓄卞氏之光寶罄宇宙之美殫造化之奇方與昆崘抗行閬風接境何人間巫廬台霍之足陳耶一昨於山人李白處奉見吾子移文責僕以多奇叱僕以特秀而盛談三山五嶽之美謂僕小山無名無德而稱焉觀乎斯言何太謬之甚也吾子豈不聞乎無名為天地之始有名為萬物之母假令登封禋祀曷足以大道譏耶然能損人費物庖殺致祭暴殄草木鐫刻金石使載圖典亦未足為貴乎且達人莊生常有餘論以為斥鷃不羡於鵬鳥秋毫可並於太山由斯而談何小大之殊也又怪於諸山藏國寶隱國賢使吾君榜道燒山披訪不獲非通談也夫皇王登極瑞物昭至蒲萄翡翠以納貢河圖洛書以應符設天網而掩賢窮月竁以率職天不祕寶地不藏珍風威百蠻春養萬物王道無外何英賢珍玉而能伏匿於巖穴耶所謂榜道燒山此則王者之德未廣矣昔太公大賢傅説明德棲渭川之水藏虞虢之巖卒能形諸兆朕感乎夢想此則天道暗合豈勞乎搜訪哉果投竿詣麾捨築作相佐周文讚武丁總而論之山亦何罪乃知巖穴為養賢之域林泉非祕寶之區則僕之諸山亦何負於國家矣近者逸人李白自峨眉而來爾其天為容道為貌不屈已不干人巢由以來一人而已乃虬蟠龜息遁乎此山僕嘗弄之以緑綺卧之以碧雲嗽之以瓊液餌之以金砂既而童顔益春真氣愈茂將欲倚劍天外挂弓扶桑浮四海橫八荒出宇宙之寥廓登雲天之眇茫俄而李公仰天長吁謂其友人曰吾未可去也吾與爾達則兼濟天下窮則獨善一身安能餐君紫霞蔭君青松乘君鸞鶴駕君虯龍一朝飛騰為方丈蓬萊之人耳此則未可也乃相與卷其丹書匣其瑶瑟申管晏之談謀帝王之術奮其智能願為輔弼使寰區大定海縣清一事君之道成榮親之義畢然後與陶朱留侯浮五湖戲滄洲不足為難矣即僕林下之所隱容豈不大哉必能資其聰明輔以正氣借之以物色發之以文章雖煙花中貧沒齒無恨其有山精木魅雄虺猛獸以驅之四荒磔裂原野使影迹絶滅不干户庭亦遣清風掃門明月侍坐此乃養賢之心實亦勤矣孟子孟子無見深責耶明年青春求我於此巖也上安州李長史書白嶔崎厯落可笑人也雖然頗嘗覽千載觀百家至於聖賢相似厥衆則有若似於仲尼紀信似於髙祖牢之似於無忌宋玉似於屈原而遙觀君侯竊疑魏洽便欲趨就臨然舉鞭遲疑之間未及回避且理有疑誤而成過事有形似而類真惟大雅含𢎞方能恕之也白少頗周慎忝聞義方入暗室而無欺屬昏行而不變今小人履疑誤形似之迹君侯流愷悌矜捨之恩戢秋霜之威布冬日之愛睟容有穆怒顔不彰雖將軍息恨於長孫一作孺之前此無慙德司空受揖於元淑之際彼未為賢一言見寃九死非謝白孤劍誰託悲歌自憐迫於恓惶席不暇暖寄絶國而何仰若浮雲而無依南徙莫從北遊失路言客汝海近還鄖城昨遇故人飲以狂藥一酌一笑陶然樂酣困河朔之清觴飫中山之醇酎屬早日初眩晨霾未收乏離朱之明昧王戎之視青白其眼瞢而前行亦何異抗莊公之輪怒螳螂之臂御者趨召明其是非入門鞠躬精魄飛散昔徐邈緣醉而賞魏王却以為賢無鹽因醜而獲齊君待之逾厚白妄人也安能比之上挂國風相鼠之譏下懷周易履虎之懼慜以固陋禮而遣之幸容寧越之辜深荷王公之德銘刻心骨退思狂愆五情氷炭罔知所措晝愧於影夜慙於魄啓處不惶戰局無地伏惟君侯明奪秋月和均韶風掃塵辭場振發文雅陸機作太康之傑士未可比肩曹植為建武之雄才惟堪捧駕天下豪俊翕然趨風白之不敏竊慕餘論何圖叔夜潦倒不切於事情正平猖狂自貽於恥辱一忤容色終身厚顔敢沐芳負荆請罪門下儻免以訓責恤其愚蒙如能伏劍結纓謝君侯之德敢一夜力撰春遊救苦寺詩一首十韻石巖寺詩一首八韻上楊都尉詩一首三十韻辭旨狂野貴露下情輕干視聽幸乞詳覽與賈少公書宿昔惟清勝白綿疾疲􅚿去期恬退才微識淺無足濟時雖中原橫潰將何以救之王命崇重大總元戎辟書三至人輕禮重嚴期迫切難以固辭扶力一行前觀進退且殷源廬嶽十載時人觀其起與不起以卜江左興亡謝安髙卧東山蒼生屬望白不樹矯抗之迹恥振玄邈之風混遊漁商隱不絶俗豈徒販賣雲壑要射虛名方之二子實有慙德徒塵忝幕府終無能為唯當報國薦賢持以自免斯言若謬天實殛之以足下深知具申中欵惠子知我夫何間然勾當小事但增悚惕為趙宣城與楊右相書某啓辭違積年伏戀軒屏首冬初寒伏惟相公尊體起居萬福某蒙恩才朽齒邁徒延聖日少忝末吏本乏逺圖中年廢缺分歸園壑昔相公秉國憲之日一拔九霄拂刷前恥升騰晚官恩貸稠疊實戴丘山落羽再振枯鱗旋躍運以大風之舉假以磨天之翔衣繡霜臺舍香華省宰劇慙強項之名酌貪礪清心之節三典列郡寂無成功但宣布王澤式酬天奬伏惟相公開張徽猷寅亮天地入夔龍之室持造化之權安石髙枕蒼生是仰某嗚躍無已剪拂因人銀章朱紱坐榮官達身荷宸眷目識龍顔既齊飛於鵷鷺復寄迹於門館皆相公大造之力也而鐘鳴漏盡夜行不息止足之分實愧古人犬馬戀主迫於西汜所冀枯松晚歲無改節於風霜老驥餘年期盡力於蹄足上答明主下報相公慺慺之誠屏息於此伏惟相公收遺簪於少昊念亡弓於楚澤衰當益壯結草知歸瞻望恩光無忘景刻與韓荆州書白聞天下談士相聚而言曰生不用萬户侯但願一識韓荆州何令人之景慕一至於此耶豈不以有周公之風躬吐握之事使海內豪俊奔走而歸之一登龍門則聲譽十倍所以龍盤鳳逸之士皆欲收名定價於君侯願君侯不以富貴而驕之寒賤而忽之則三千賔中有毛遂使白得穎脫而出即其人焉白隴西布衣流落楚漢十五好劍術遍干諸侯三十成文章厯抵卿相雖長不滿七尺而心雄萬夫王公大臣許與氣義此疇曩心迹安敢不盡於君侯為君侯制作侔神明德行動天地筆參於造化學究於天人幸願開張心顔不以長揖見拒必若接之以髙宴縱之以清談請日試萬言倚馬可待今天下以君侯為文章之司命人物之權衡一經品題便作佳士而君侯何惜階前盈尺之地不使白揚眉吐氣激昻青雲耶昔王子師為豫章未下車即辟荀慈明既下車又辟孔文舉山濤作冀州甄拔三十餘人或為侍中尚書先代所美而君侯亦薦一嚴協律入為祕書郎中間崔宗之房習祖黎昕許瑩之徒或以才名見知或以清白見賞白每觀其銜恩撫躬忠義奮發白以此感激知君侯推赤心於諸賢腹中所以不歸他人而願委身國士儻急難有用敢效微軀且人非堯舜誰能盡善白謨猷籌畫安能自矜至於制作積成卷軸則欲塵穢視聽恐雕蟲小伎不合大人若賜觀芻蕘請給以紙墨兼人書之然後退歸間軒繕寫呈上庶青萍結緑長價於薛卞之門幸惟下流大開奬飾惟君侯圖之上安州裴長史書白聞天不言而四時行地不語而百物生白人焉非天地也安得不言而知乎敢剖心析肝論舉身之事便當談笑以明其心而粗陳其大綱一快憤悶惟君侯察焉白本家金陵世為右姓遭沮渠蒙遜難奔流咸秦因官寓家少長江漢五嵗誦六甲十歲觀百家軒轅以來頗得聞矣常橫經籍詩書制作不倦迄于今三十春矣以為士生則桑弧蓬矢射乎四方故知大丈夫必有四方之志乃仗劍去國辭親逺遊南窮蒼梧東涉溟海見鄉人相如大誇雲夢之事云楚有七澤遂來觀焉而許相公家見招妻以孫女便憩于此至移三霜焉曩昔東遊維揚不逾一年散金三十餘萬有落魄公子悉皆濟之此則是白之輕財好施也又昔與蜀中友人吳指南同遊於楚指南死於洞庭之上白􅎭服慟哭若喪天倫炎月伏尸泣盡而繼之以血行路聞者悉皆傷心猛虎前臨堅守不動遂權殯於湖側便之金陵數年來觀筋骨尚在白雪泣持刃躬申洗削裹骨徒步負之而趨寢興擕持無輟身手遂丐貸營葬於鄂城之東故鄉路遙魂魄無主禮以遷窆式昭朋情此則是白存交重義也又昔與逸人東巖子隱於岷山之陽白巢居數年不迹城市養奇禽千計呼皆就掌取食了無驚猜廣漢太守聞而異之詣廬親覩因舉二人以有道並不起此則白養髙忘機不屈之迹也又前禮部尚書蘇公出為益州長史白於路中投刺待以布衣之禮因謂羣寮曰此子天才英麗下筆不休雖風力未成且見專車之骨若廣之以學可以相如比肩也四海明識具知此談前此郡督馬公朝野豪彥一見盡禮許為奇才因謂長史李京之曰諸人之文猶山無煙霞春無草樹李白之文清雄奔放名章俊語絡繹間起光明洞徹句句動人此則故交元丹親接斯議若蘇馬二公愚人也復何足盡陳儻賢賢也白有可尚夫唐虞之際於斯為盛有婦人焉九人而已是知才難不可多得白野人也頗工於文惟君侯顧之無按劍也伏惟君侯貴而且賢鷹揚虎視齒若編貝膚如凝脂昭昭乎若玉山上行朗然映人也而髙義重諾名飛天京四方諸侯聞風暗許倚劍慷慨氣干虹霓月費千金日宴羣客出躍駿馬入羅紅顔所在之處賔朋成市故時人歌曰賔朋何喧喧日夜裴公門願得裴公之一言不須驅馬將華軒白不知君侯何以得此聲於天壤之間豈不由重諾好賢謙以得也而晚節改操棲情翰林天才超然度越作者屈佐鄖國時惟清哉稜威雄雄下熠羣物白竊慕髙義已經十年雲山間之造謁無路今也運會得趨末塵承顔接辭八九度矣常欲一雪心迹﨑嶇未便何圖謗詈忽生衆口攢毁將欲投杼下客震於嚴威然自明無辜何憂悔吝孔子曰畏天命畏大人畏聖人之言過此三者鬼神不害若使事得其實罪當其身則將浴蘭沐芳自屏於烹鮮之地惟君侯死生不然投山竄海轉死溝壑豈能明目張膽託書自陳耶昔王東海問犯夜者曰何所從來答曰從師受學不覺日晚王曰吾豈可鞭撻寧越以立威名想君侯通人必不爾也願君侯惠以大遇洞開心顔終乎前恩再辱英眄白必能使精誠動天長虹貫日直度易水不以為寒若赫然作威加以大怒不許門下逐之長途白即膝行於前再拜而去西入秦海一觀國風永辭君侯黃鵠舉矣何王公大人之門不可以彈長劍乎李太白文集卷二十五
