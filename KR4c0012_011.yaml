body:
  text: 李太白文集卷十一唐李白撰歌詩四十首寄下淮隂書懷寄王宗成一首再至淮南一作王宋城沙墩至梁苑二十五長亭大舶夾雙櫓中流鵝鸛鳴雲天掃空碧川嶽涵餘清飛鳬從西來適與佳興并眷言王喬舄婉孌故人情復此親懿㑹而增交道榮㳂洄且不定飄忽悵徂征暝投淮隂宿欣得漂母迎斗酒烹黃雞一餐感素誠豫為楚壯士不是魯諸生有德必報之千金恥為輕緬書羈孤意逺寄棹歌聲聞王昌齡左遷龍標遙有此寄揚州花落一作楊花落盡子規啼聞道龍標過五溪我寄愁心與明月隨風直到夜郎西寄王屋山人孟大融我昔東海上勞山餐紫霞親見安期公食棗大如瓜中年謁漢主不愜還歸家朱顔謝春暉白髮見生涯所期就金液飛步登雲車願隨夫子天壇上閒與仙人掃落花憶舊遊寄譙郡元參軍金陵憶昔洛陽董糟丘為余天津橋南造酒樓黃金白璧買歌笑一醉纍月輕王侯海內賢豪青雲客就中與君一作與君一見心莫逆回山轉海不作難傾情倒意無所惜我向淮南攀桂枝君留洛北愁夢思不忍别還相隨相隨迢迢訪仙城三十六曲水回縈一溪初入千花明萬壑度盡松風聲銀鞍金絡到平地漢東太守來相迎紫陽之真人邀我吹玉笙餐霞樓上動仙樂嘈然宛似鸞鳯鳴袖長管催欲輕舉漢中太守醉起舞一作漢東太守酣歌舞手持錦抱覆我身我醉橫眠枕其股當筵意氣凌九霄星離雨散不終朝分飛楚關山水遙余既還山尋故巢君亦歸家度渭橋君家嚴君勇貔虎作尹并州遏戎虜五月相呼度太行摧輪不道羊腸苦行來北涼嵗月深感君貴義輕黃金瓊杯綺食青玉桉使我醉飽無歸心時時出向城西曲晉祠流水如碧玉浮舟弄水簫鼓鳴微波龍鱗莎草緑興來攜妓恣經過其若楊花似雪何紅一作鮮糚欲醉冝斜日一作如花落百尺清潭寫翠娥翠娥嬋娟初月輝美人更唱舞羅衣清風吹歌入空去歌曲自繞行雲飛此時行一作歡樂難再遇西遊因獻長楊賦北闕青雲不可期東山白首一作髮還歸去渭橋南頭一作渦水橋南一遇君鄼臺之北又離羣問余别恨今多少落花春暮爭紛紛一作鶯飛求友滿芳樹落花送客何紛紛言一作情亦不可盡情一作言亦不可極呼兒長跪緘此辭寄君千里遙相憶月夜江行寄崔員外宗之飄飄江風起蕭颯海樹秋登艫美清夜挂席移輕舟月隨碧山轉水合青天流杳如一作然星河上但覺雲林幽歸路方浩浩徂川去悠悠徒悲蕙草歇復聽菱歌愁岸曲迷後浦沙明瞰前洲懷君不可見望逺增離憂宿白鷺洲寄楊江寧朝别朱雀門暮棲白鷺洲波一作沙光搖海月星影入城樓望美金陵宰如思瓊樹憂徒令魂作夢翻覺夜成秋緑水解人意為余西北流因聲玉琴裏蕩漾寄君愁新林浦阻風寄友人一云金陵阻風雪書懷寄楊江寧潮水定可信天風難與期清晨西北轉薄暮東南吹以此難挂席佳期益相思一本云以此難挂席洄㳂頗淹遲使索金陵書又叨賢宰知絃歌止過客惠化聞京師海月破圓一作團景菰蔣生緑池昨日北湖梅開花已滿枝一作昨日北湖花初開未滿枝今朝一作看白門栁夾道垂青絲嵗物忽如此我來定一作復幾時紛紛江上雪草草客中悲明發新林浦一作板橋浦空吟謝朓詩寄韋南陵氷余江上乘興訪之遇尋顔尚書笑有此贈南船正東風北船來自緩江上相逢借問君語笑一作聲未了風吹斷聞君攜妓訪情人應為尚書不顧身堂上三千珠履客甕中百斛金陵春恨我阻此樂淹留楚一作此江濱月色醉逺客山花開欲燃春風狂殺人一日劇三年乘興嫌太遲焚却子猷船夢見五栁枝已堪挂馬鞭何日到彭澤長一作狂歌陶令前題情深樹寄象公腸斷枝上猿淚添山下樽白雲見我去亦為我飛翻北山獨酌寄韋六巢父將許由未聞買山隱道存跡自髙何憚去人近紛吾下茲嶺地閒喧亦泯門橫羣岫開水鑿衆泉引屏髙而在雲竇深莫能準川光晝昏凝林氣夕凄緊於焉摘朱果兼得養𤣥牝坐月觀寶書拂霜弄瑶軫傾壺事幽酌顧影還獨盡念君風塵遊傲爾令自哂一作安知世上人名利空蠢蠢寄當塗趙少府炎晚登髙樓望木落雙江清寒山饒積翠秀色連州城目送楚雲盡心悲胡鴈聲相思不可見回首故人情寄東魯二稚子在金陵作吳地桑葉緑吳蠶巳三眠我家寄東魯誰種龜隂田春事巳不及江行復茫然南風吹歸心飛墮酒樓前樓東一株桃枝葉拂青煙此樹我所種别來向三年桃今與樓齊我行尚未旋嬌女字平陽折花倚桃邊折花不見我淚下如流泉小兒名伯禽與姊亦齊肩雙行桃樹下撫背復誰憐念此失次第肝腸日憂煎裂素寫逺意因之汶陽川獨酌青溪江石上寄權昭夷秋浦我攜一樽酒獨上江祖石自從天地開更長幾千尺舉杯向天笑天回日西照永願坐此石長垂嚴陵釣寄謝山中人可與爾同調禪房懷友人岑倫南遊羅浮兼泛桂海自春徂秋不返僕旅江外書情寄之潯陽嬋娟羅浮月搖艷桂水雲美人竟獨往而我安能羣一朝語笑隔萬里歡情分沉吟綵霞沒夢寐瓊芳歇歸鴻度三湘遊子在百越邊塵染衣劔白日凋華髮春氣變楚關秋聲落吳山草木結悲緒風沙凄苦顔朅來巳永久頽思如循環飄飄限江裔想像空留滯離憂每醉心别淚徒盈袂坐愁青天末出望黃雲蔽目極何悠悠梅花南嶺頭空長滅征鳥水闊無還舟寶劔終難託金囊非易求歸來儻有問桂樹山之幽廬山謡寄盧侍御虛舟我本楚狂人鳯歌笑一本作哭孔丘手持緑玉杖一作枝朝别黃鶴樓五嶽尋仙不辭逺一生好入名山遊廬山秀出南斗傍屏風九疊雲錦張影落明湖青黛光金闕前開二峯帳銀河倒挂一作㵼三石梁香爐瀑布遙相望回崖沓嶂崚一作何蒼蒼翠影紅霞映朝日一作照千里鳥飛不到吳天長登髙壯觀天地間大江茫茫去不還黃雲萬里動風色白波九道流雪山好為廬山謡興因廬山發閒窺石鏡清我心謝公行處蒼苔沒一作緑蘿開處懸明月早服還丹無世情琴心三疊道初成遙見仙人綵雲裏手把芙蓉朝玉京先期汗漫九垓上願接盧敖遊太清下尋陽城泛彭蠡寄黃判官浪動灌嬰井尋陽一作吾知江上風開帆入天鏡直向彭湖東落景轉疏雨晴雲散逺空名山發佳興一作返景照疏雨輕煙淡逺空中流得佳興清賞亦何窮石鏡挂遙月香爐滅彩虹一作瀑布灑青壁遙山挂彩虹相思俱對此舉目與君同書情寄從弟邠州長史昭自笑客行久我行定幾時緑楊巳可折攀取最長枝翩翩一作翻翻弄春色延佇寄相思誰言貴此物意願一作厚重瓊蕤昨夢見惠連朝吟謝公詩東風引碧草不覺生華池臨玩忽云夕杜䳌夜鳴悲懷君芳嵗歇庭樹落紅滋寄上吳王三首淮王愛八公攜手緑雲中小子添枝葉亦攀丹桂叢謬以詞賦重而將枚馬同何日背淮水東之觀土風坐嘯廬江靜閒聞進玉觴去時無一物東壁挂胡床英明廬江守聲譽廣平籍掃灑黃金臺招邀青雲客客曽與天通出入清禁中襄王憐宋玉願入蘭臺宫寄王漢陽南湖秋月白王宰夜相邀錦帳郎官醉羅衣舞女驕笛聲喧沔鄂歌曲上雲霄别後空愁我相思一水遙春日歸山寄孟六浩然朱紱遺塵境青山謁梵筵金繩開覺路寶筏渡迷川嶺樹攢飛栱嵒花覆谷泉塔形標海日樓勢出江煙香氣三天下鍾聲萬壑連荷秋珠已滿松密蓋初圓鳥聚疑聞法龍參若護禪愧非流水韻叨入伯牙絃流夜郎永華寺寄潯陽羣官流夜郎朝别凌煙樓賢豪滿行舟暝投永華寺賓散豫獨醉願結九江流添成萬行淚寫意寄廬嶽何當來此地天命有所懸安得苦愁思流夜郎至西塞驛寄裴隱上峽揚帆借天風水驛苦不緩平明及西塞巳先投沙伴回巒引羣峯橫蹙楚山斷砯衝萬壑㑹震沓百川滿龍怪濳溟波候時救炎旱我行望雷雨安得霑枯散鳥去天路長人悲春光短空將澤畔吟寄爾江南管自漢陽病酒歸寄王明府回江夏去嵗左遷夜郎道琉璃硯水長枯槁今年勑放巫山陽蛟龍筆翰生輝光聖主還聽子虛賦相如却欲論文章願掃鸚鵡洲與君醉百場嘯起白雲飛七澤歌吟緑水動三湘莫惜連船沽美酒千金一擲買春芳望漢陽栁色寄王宰漢陽江上栁望客引東枝樹樹花如雪紛紛亂若絲春風傳我意草木度前知一作草本發前墀寄謝絃歌宰西來定未遲江夏寄漢陽輔録事誰道此水廣狹如一匹練江夏黃鶴樓青山漢陽縣大語猶可聞故人難可見君草陳琳檄我書魯連箭報國有壯心龍顔不回眷西飛精衛鳥東海何由填鼓角徒悲鳴樓船習征戰抽劔步霜月夜行空庭遍長呼結浮雲埋沒顧榮扇他日觀軍容投壺接髙宴早春寄王漢陽聞道春還未相識走傍寒梅訪消息昨夜東風入武陽一作昌陌頭楊栁黃金色碧水浩浩雲茫茫美人不來空斷腸預拂青山一片石與君連日醉壺觴江上寄巴東故人漢水波浪逺巫山雲雨飛東風吹客夢西落此中時覺後思白帝佳人與我違瞿塘饒賈客音信莫令希江上寄元六林宗霜落江始寒楓葉緑未脫客行悲清秋永路苦不達滄波眇川汜白日隱天末停棹依林巒驚猿相叫聒夜分河漢轉起視溟漲闊涼風何蕭蕭流水鳴活活浦沙淨如洗海月明可掇蘭交空懷思瓊樹詎解渴勗哉滄洲心嵗晚庶不奪幽賞頗自得興逺與誰豁寄從弟宣州長史昭爾佐宣城郡守官清且閒常誇雲月好邀我敬亭山五落洞庭葉三江遊未還相思不可見歎息損朱顔涇溪東亭寄鄭少府諤宣城我遊東亭不見君沙上行將白鷺羣白鷺閒時散飛去又如雪㸃青山雲欲往涇溪不辭逺龍門蹙波虎眼轉杜鵑花開春巳闌歸向陵陽釣魚晚宣城九日聞崔四侍御與宇文太守遊敬亭余時登響山不同此賞醉後寄崔侍御二首九日茱萸熟插鬢傷早白登髙望山海滿目悲古昔逺訪投沙人因為逃名客故交竟誰在獨有崔亭伯重陽不相知載酒任所適手持一枝菊調笑二千石日暮岸幘歸傳呼隘阡陌彤襜雙白鹿賓從何輝赫夫子在其間遂成雲霄隔良辰與美景兩地方虛擲晚從南峯歸蘿月下水壁却登郡樓望松色寒轉碧咫尺一作望美不可親棄我如遺舄九卿天上落五馬道傍來列㦸朱門曉褰帷碧嶂開登髙望逺海召客得英才紫絲歡情洽黃花逸興催山從圖上見溪即一作向鏡中回遙羡重陽作應過戲馬臺寄崔侍御宛溪霜夜聽猿愁去國長為不繫舟獨憐一鴈飛南海却羡雙溪解北流髙人屢解陳蕃榻過客難登謝朓樓此處别離同落葉朝朝分散敬亭秋涇溪南藍山下有落星潭可以卜築余泊舟石上寄何判官昌浩藍岑竦天壁突兀如鯨額奔蹙橫澄潭勢吞落星石沙帶秋月明水搖寒山碧佳境冝緩棹清輝能留客恨君阻歡遊使我自驚惕所期俱卜築結茅錬金液早過漆林渡寄萬巨西經大藍山南來漆林渡水色倒空青林煙橫積素漏流昔吞翕沓浪競奔注潭落天上星龍開水中霧巉巗注公柵突兀陳焦墓嶺峭紛上干川明屢回顧因思萬夫子解渴同瓊樹何日覩清光相觀詠佳句遊敬亭寄崔侍御一本作登古城望府中奉寄崔侍御其不同處悉重出我家敬亭下輒繼謝公作一作我登謝公樓輒繼敬亭作相去數百年風期宛如昨登髙素秋月一作髙城素秋日下望青山郭府中鴻鷺羣一作俯視鴛鷺羣飲啄自鳴躍夫子雖蹭蹬瑶臺雪中鶴獨立窺浮雲其心在寥廓時來一顧我笑飯葵與藿一作時來顧我笑一飯與葵藿世路如秋風相逢盡蕭索腰間玉巨劔意許無遺諾一作願為經冬柏不逐天霜落壯士不可輕一作疏相期在雲閣一作相隨集雲閣三山望金陵寄殷淑三山懷謝朓水淡一作緑水望長安蕪沒河陽縣秋江正北看盧龍霜氣冷鳷鵲月光寒耿耿憶瓊樹天涯寄一歡自金陵泝流過白璧山玩月達天門寄句容王主簿滄江泝流歸白璧見秋月秋月照白璧晧如山隂雪幽人停宵征賈客忘早發進帆天門山回首牛渚沒川長信風來日出宿霧歇故人在咫尺新賞成胡越寄君青蘭花惠好庶不絶李太白文集卷十一
