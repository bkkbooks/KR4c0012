body:
  text: 李太白文集巻二十唐李白撰歌詩四十七首閑適與元丹丘方城寺談𤣥作蜀中一作仙城山寺茫茫大夢中唯我獨先覺騰轉風火來假合作容貌滅除昏疑盡領略入精要澄慮觀此身因得通寂照朗悟前後際始知金仙妙幸逢禪居人酌玉坐相召彼我俱若喪雲山豈殊調清風生虛空明月見談笑怡然青蓮宫永願恣遊眺尋髙鳳石門山中元丹丘楚漢尋幽無前期乗興不覺逺蒼崖𣺌難涉白日忽欲晚未窮三四山已厯千萬轉寂寂聞猿愁行行見雲收髙松來好月空谷宜清秋谿深古雪在石斷寒泉流峰巒秀中天登眺不可盡丹丘遥相呼顧我忽而哂遂造窮谷間始知静者閑留歡達永夜清曉方言還安州般若寺水閣納涼喜遇薛員外乂安州翛然金園賞逺近含晴光樓臺成海氣草木皆天香忽逢青雲士共解丹霞裳水退池上熱風生松下涼吞討破萬象搴窺臨衆芳而我遺有漏與君用無方心垢都已滅永言題禪房魯中都東樓醉起作魯中昨日東樓醉一作東城飲還應一作歸來倒接䍦阿誰扶上馬不省下樓時對酒醉題屈突明府㕔呉中陶令八十日長歌歸去來故人建昌宰借問幾時迴風落呉江雪紛紛入酒杯山翁今已醉舞袖為君開月下獨酌四首長安花間一作下一壺酒獨酌無相親舉盃邀明月對影成三人月既不解飲影徒隨我身暫伴月將影行樂須及春我歌月徘徊我舞影凌亂醒時同交歡醉後各分散永結無情遊相期邈雲漢天若不愛酒酒星不在天地若不愛酒地應無酒泉天地既愛酒愛酒不愧天巳聞清比聖復道濁如賢賢聖既已飲何必求神仙三盃通大道一斗合自然但得醉中趣勿為醒者傳三月咸陽時一作城千花晝如錦一作好鳥吟清風落花散如錦又作園鳥語成歌庭花笑如錦誰能春獨愁對此徑須飲窮通與脩短造化夙所稟一樽齊死生萬事固難審醉後失天地兀然就孤枕不知有吾身此樂最為甚窮愁千萬端一作有千端美酒三百杯一作唯數杯愁多酒雖少酒傾愁不來所以知酒聖一作聖賢酒酣心自開辭粟卧首陽一作餓伯夷屢空飢一作悲顔回當代不樂飲虛名安用哉蟹螯即金液糟丘是蓬萊且須飲美酒乗月醉髙臺春歸終南山松龍舊隠我來南山陽事事不異昔却尋溪中水還望巖下石薔薇縁東牕女蘿遶北壁别來能幾日草木長數尺且復命酒樽獨酌陶永夕冬夜醉宿龍門覺起言志洛陽醉來脫寳劒旅憩髙堂眠中夜忽驚覺起立明燈前開軒聊直望曉雪河氷壯哀哀歌苦寒鬱鬱獨惆悵傅說板築臣李斯鷹犬人飈起匡社稷寧復長艱辛而我胡為者歎息龍門下富貴未可期殷憂向誰寫去去淚滿襟舉聲梁甫吟青雲當自致何必求知音尋山僧不遇作金陵石徑入丹壑松門閉青苔閑階有鳥跡禪室無人開窺牕見白拂挂壁生塵埃使我空歎息欲去仍徘徊香雲隔山起花雨從天來已有空樂好况聞青猿哀了然絶世事此地方悠哉過汪氏别業二首遊山誰可遊子明與浮丘疊嶺礙河漢連峰横斗牛汪生面北阜池館清且幽我來感意氣椎炰列珍羞掃石待歸月開池漲寒流酒酣益爽氣為樂不知秋疇昔未識君知君好賢才隨山起館宇鑿石營池臺星火五月中景風從南來數枝石榴發一丈荷花開恨不當此時相過醉金罍我行值木落月苦清猿哀永夜達五更呉歈送瓊盃酒酣欲起舞四座歌相催日出逺海明軒車且徘徊更遊龍潭去枕石拂莓苔待酒不至玉壺繫青絲沽酒來何遲山花向我笑正好銜盃時晚酌東牕下流鶯復在兹春風與醉客今日乃相宜獨酌春草如有意羅生玉堂隂東風吹愁來白髪坐相侵獨酌勸孤影閑歌面芳林長松爾何知一作本無情蕭瑟為誰吟手舞石上月膝横花間琴過此一壺外悠悠非我心一本云春草變緑野新鶯有佳音落日不盡歡恐為愁所侵獨酌勸孤影閑歌面芳林清風尋空來碧松與共吟手舞石上月膝横花下琴過此一壺外悠悠非我心友人㑹宿滌蕩千古愁留連百壺飲良宵宜清談皓月一作然未能寢醉來卧空山天地即衾枕春日獨酌二首東風扇淑氣水木榮春暉白日照緑草落花散且飛孤雲還空山衆鳥各已歸彼物皆有託吾生獨無依對此石上月長歌醉芳菲我有紫霞想緬懐滄洲間且對一壺酒澹然萬事閑横琴倚髙松把酒望逺山長空去鳥沒落日孤雲還但悲光景晚宿昔成秋顔金陵江上遇蓬池隱者時於落星石上以紫綺裘換酒為歡心愛名山遊身隨名山逺羅浮麻姑臺此去或未返遇君蓬池隠就我石上飯空言不成歡强笑惜日晚緑水向雁關黄雲蔽龍山歎息兩客鳥徘徊呉越間一語一執手留連夜將乆解我紫綺裘且換金陵酒酒來笑復歌興酣樂事多水影弄月色清光奈愁何明晨挂帆席離恨滿滄波月夜聽盧子順彈琴閑夜坐明月幽人彈素琴忽聞悲風調宛若寒松吟白雪亂纎手渌水清虛心鍾期乆已歿世上無知音青溪半夜聞笛秋浦羌笛梅花引呉溪隴水清一作情寒山秋浦月一作空山滿明月腸斷玉關情一作聲日夕山中忽然有懐廬山乆卧名一作青山雲遂為名一作青山客山深一作春雲更好賞弄終日夕月銜樓間峰泉漱階下石素心自此得真趣非外借鼯啼桂方秋風滅籟歸寂緬思洪崕術欲往滄海一作島隔雲車來何遲撫己空歎息夏日山中嬾揺白羽扇躶袒青林中脫巾挂石壁露頂灑松風山中與幽人對酌兩人對酌山花開一盃一盃復一盃我醉欲眠卿且去明朝有意抱琴來春日醉起言志處世若大夢胡為勞其生所以終日醉頺然卧前楹覺來眄庭前一鳥花間鳴借問此何時春風語流鸎感之欲歎息對酒還自傾浩歌待明月曲盡已忘情廬山東林寺夜懐我尋青蓮宇獨往謝城闕霜清東林鍾水白虎溪月天香生虛空天樂鳴不歇宴坐寂不動大千入毫髪湛然㝠真心曠劫斷出沒尋雍尊師隱居羣峭碧磨天逍遥不記年撥雲尋古道倚樹聽流泉花暖青牛卧松髙白鶴眠語來江色暮獨自下寒烟與史郎中飲聽黄鶴樓上吹笛江夏一為遷客去長沙西望長安不見家黄鶴樓中吹玉笛江城五月落梅花對酒勸君莫拒盃春風笑人來桃李如舊識傾花向我開流鸎啼碧樹明月窺金罍昨來朱顔子今日白髪催棘生石虎殿鹿走姑蘇臺自古帝王宅城闕閉黄埃君若不飲酒昔人安在哉醉題王漢陽㕔我似鷓鴣鳥南遷嬾北飛時尋漢陽令取醉月中歸嘲王厯陽不肯飲酒厯陽地白風色寒雪花大如手笑殺陶淵明不飲盃中酒浪撫一張琴虛栽五株栁空負頭上巾吾於爾何有獨坐敬亭山宣城衆鳥髙飛盡孤雲獨去閑相看兩不厭只有敬亭山自遣對酒不覺暝落花盈我衣醉起步溪月鳥還人亦稀訪戴天山道士不遇犬吠水聲中桃花帶露濃樹深時見鹿溪午不聞鍾野竹分青靄飛泉挂碧峰無人知所去愁倚兩三松秋日與張少府楚城韋公藏書髙齋作日下空亭暮城荒古跡餘地形連海盡天影落江虛舊賞人雖隔新知樂未疎綵雲思作賦丹壁間藏書查擁隨流葉萍開出水魚夕來秋興滿回首意何如懐思秋夜獨坐懐故山去長安後小隱慕安石逺遊學子平天書訪江海雲卧起咸京入侍瑶池宴出陪玉輦行誇胡新賦作諌獵短書成但奉紫霄顧非邀青史名莊周空說劒墨翟恥論兵拙薄遂疎絶歸閑事耦耕顧無蒼生望空愛紫芝榮寥落暝霞色微茫舊壑情秋山緑蘿月今夕為誰明憶崔郎中宗之遊南陽遺吾孔子琴撫之潸然感舊昔在南陽城唯餐獨山蕨憶與崔宗之白水弄素月時過菊潭上縱酒無休歇汛此黄金花頺然清歌發一朝摧玉樹生死殊飄忽留我孔子琴琴存人已沒誰傳廣陵散但哭邙山骨泉尸何時明長歸狐兔窟憶東山二首不向東山乆薔薇幾度花白雲他自散明月落誰家我今攜謝妓長嘯絶人羣欲報東山客開關掃白雲望月有懐清泉映疎松不知幾千古寒月揺輕波流光入牕户對此空長吟思君意何深無因見安道興盡愁人心對酒憶賀監二首并序太子賓客賀公於長安紫極宫一見余呼余為謫仙人因解金龜換酒為樂沒後對酒悵然有懐而作是詩四明有狂客風流一作霞衣賀季真長安一相見呼我謫仙人昔好盃中物翻一作今為松下塵金龜換酒處却憶淚沾巾狂客歸四明山隂道士迎敕賜鏡湖水為君臺沼榮人亡餘故宅空有荷花生念此杳如夢凄然傷我情重憶一首欲向江東去定將誰舉杯稽山無賀老却棹酒船回春滯沅湘有懐山中沅湘春色還風暖烟草緑古之傷心人於此腸斷續予非懐沙客但美採菱曲所願歸東山寸心於此足落日憶山中雨後烟景緑晴天散餘霞東風隨春歸發我枝上花花落時欲暮見此令人嗟願遊名山去學道飛丹砂憶秋浦桃花舊遊時竄夜郎桃花春水生白石今出沒揺蕩女蘿枝半挂青天月不知舊行徑初拳幾枝蕨三載夜郎還於兹鍊金骨李太白文集巻二十
