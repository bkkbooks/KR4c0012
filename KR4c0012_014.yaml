body:
  text: 李太白文集卷十四唐李白撰歌詩四十八首送中送裴十八圖南歸嵩山二首何處可為别長安青綺門胡姬招素手延一作留客醉金樽臨當上馬時我獨一作因與君言風吹一作驚芳蘭折日沒鳥雀喧舉手指飛鴻此情難具論同歸無早晚潁水有清源君思潁水緑忽復歸嵩岑歸時莫洗耳為我洗其心洗心得真情洗耳徒買名謝公終一起相與濟蒼生同王昌齡送族弟襄歸桂陽二首一作同王昌齡崔國輔送李舟歸郴州秦地見碧草楚謡對清樽把酒爾何思鷓鴣啼南園余欲羅浮隱猶懷明主恩躊躇紫宫戀孤負滄洲言終然無心雲海上同飛翻相期乃不淺幽桂有芳根爾家何在瀟湘川青莎白石長江邊昨夢江花照江日幾枝正發東窗前覺來欲往心悠然魂隨越鳥飛南天秦雲連山海相接桂水橫煙不可涉送君此去令人愁風帆茫茫隔河洲春潭瓊草緑可折西寄長安明月樓送外甥鄭灌從軍三首六博爭雄好彩來金盤一擲萬人開丈夫賭命報天子當斬胡頭衣錦回丈八蛇矛出隴西彎弧拂箭白猿啼破胡必用龍韜䇿積甲應將熊耳齊月蝕西方破敵時及瓜歸日未應遲斬胡血變黃河水梟首當懸白鵲旗送于十八應四子舉落第還嵩山吾祖吹槖籥天人信森羅歸根復太素羣動熙元和炎炎四真人摛辨若濤波交流無時寂楊墨日成科夫子聞洛誦誇才才故多為金好踊躍久客方蹉跎道可束賣之五寶溢山河勸君還嵩丘開酌眄庭柯三花如未落乘興一來過送别潯陽五溪水沿洄直入巫山裏勝境由來人共傳君到南中自稱美送君别有八月秋颯颯蘆花復益愁雲帆望逺不相見日暮長江空自流送族弟綰一作琯從軍安西漢家兵馬乘北風鼓行而一作向西破犬戎爾隨漢將一作爾揮長劔出門去剪虜若草收竒功君王按劔望邊色旄頭巳落胡天空胸奴繫頸數應盡明年應一作驅入蒲萄宫送梁公昌從信安王北征入幕推英選捐書事逺戎髙談百戰術鬱作萬夫雄起舞蓮華劔行歌明月宫將飛天地陳兵出塞垣通祖席留丹景征麾拂綵虹旋應獻凱入麟閣佇深功送白利從金吾董將軍西征長安西羌延國討白起佐軍威劔決浮雲氣弓彎明月輝馬行邊草緑旌卷曙霜飛抗手凛相顧寒風生鐵衣送張秀才從軍六駮食猛武恥從駑馬羣一朝長鳴去矯若龍行雲壯士懷逺略志存解世紛周粟猶不顧齊圭安肯分抱劔辭髙堂將投霍冠軍長䇿掃河洛寧親歸汝墳當令千古後麟閣著竒勳送崔度還吳度故人禮部員外國輔之子幽燕幽燕沙雪地萬里盡黃雲朝吹歸秋鴈南飛日幾羣中有孤鳯雛哀鳴九天聞我乃重此鳥綵章五色分胡為雜凡禽雞鶩輕賤君舉手捧爾足疾心若火焚拂羽淚滿面送之吳江濆去影忽不見躊躇日將曛送祝八之江東賦得浣紗石峽西西施越溪女明豔光雲海未一作來入吳王宫殿時浣紗古石一作石古今猶在桃李新開映古一作杏查菖蒲猶短出平沙昔時紅粉照流水今日青苔覆落花君去西秦適東越碧山清江幾超忽若到天涯思故人浣紗石上窺明月送侯十一梁宋朱亥巳擊晉侯嬴尚隱身時無魏公子豈貴抱關人余亦不火食遊梁同在陳空餘湛盧劔贈爾託交親魯中送二從弟赴舉之西京再至魯中一作送族弟鍠魯客向西笑君門若夢中霜凋逐臣髮日憶明光宫復羡二龍去才華冠世雄平衢騁髙足逸翰凌長風舞袖拂秋月歌筵聞早鴻送君日千里良會何由同奉餞髙尊師如貴道士傳道籙畢歸北海齊州道隱不可見靈書藏洞天吾師四萬劫歷世遞相傳别杖留青竹行歌躡紫煙離心無逺近長在玉京懸金陵送張十一再遊東吳金陵張翰黃花句風流五百年誰人今繼作夫子世稱賢再動遊吳棹還浮入海船春光白門栁霞色赤城天去國難為别思歸各未旋空餘賈生淚相顧共悽然送紀秀才遊越海水不滿眼觀濤難稱心即知蓬萊石却是巨鼇簮送爾遊華頂令余發舄吟仙人居射的道士住山隂禹穴尋溪入雲門隔嶺深緑蘿秋月夜相憶在鳴琴送長沙陳太守二首長沙陳太守逸氣凌青松英主賜玉馬本是天池龍湘水回九曲衡山望五峯榮君按節去不及一作得逺相從七郡長沙國南連湘水濱定王垂舞袖地窄不回身莫小二千石當安逺俗人洞庭鄉路逺遙羡錦衣春送楊燕之東魯關西楊伯起漢日舊稱賢四代三公族清風播人天夫子華隂居開門對玉蓮何事歷衡霍雲帆今始還君坐稍解顔為我一作君歌此篇我固侯門士謬登聖主筵一辭金華殿蹭蹬長江邊二子魯門東别來已經年因君此中去不覺淚如泉送蔡山人我本不棄世世人自棄我一乘無倪舟八極縱逺柂燕客期躍馬唐生安敢譏採珠勿驚龍大道可暗歸故山有松月遲爾玩清暉送蕭三十一之魯中兼問稚子伯禽六月南風吹白沙吳牛喘月氣成霞水國鬱一作敲蒸不可處時炎道逺無行車夫子如何涉江路雲帆嫋嫋金陵去髙堂倚門望伯魚魯中正是趨庭處我家寄在沙丘傍三年不歸空斷腸君行既識伯禽子應駕小車騎白羊送楊山人歸嵩山我有萬古宅嵩陽玉女峯長留一片月挂在東溪松爾去掇仙草昌蒲花紫茸一作君行到此峯飱霞駐衰容嵗晚或相訪青天騎白龍送殷淑三首海水不可解連江夜為潮俄然浦嶼濶岸去酒船遙惜别耐取醉鳴榔且長謡天明爾當去應有便風飄白鷺洲前月天明送客回青龍山後日早出海雲來流水無情去征帆逐吹開相看不忍别更進手中杯痛飲龍笻下燈青月復寒醉歌驚白鷺半夜起沙灘送岑徵君歸鳴臯山岑公相門子雅望歸安石奕世皆夔龍中台竟一作有三拆至人達機兆髙揖九州伯奈何天地間而作隱淪客貴道皆一作能全真潛輝臥幽鄰一作鱗探元入窅默觀化遊無垠光武有天下嚴陵為故人雖登洛陽殿不屈巢由身余亦謝明主今稱偃蹇臣登髙覽萬古思與廣成鄰蹈海寧受賞還山非問津西來一作終期一搖扇共拂元規塵送范山人歸泰山魯客抱白雞一作鶴别余往泰山初行若片雪一作雲杳在青崖間髙髙至天門海日一作日觀近可攀雲生望不及此去何時還送韓侍御之廣德令昔日繡衣何足榮今宵貰酒與君傾暫就東山賖月色酣歌一夜送泉明白雲歌送友人楚山秦山多白雲白雲處處長隨君君今還入楚山裏雲亦隨君渡湘水水上女蘿衣白雲早臥早行君早起送通禪師還南陵隱靜寺我聞隱靜寺山水多竒蹤巖種朗公橘門深杯渡松道人制猛虎振錫還孤峯他日南陵下相期谷口逢送友人青山橫北郭白水繞東城此地一為别孤蓬萬里征浮雲遊子意落日故人情揮手自茲去蕭蕭班馬鳴送别斗酒渭城邊爐頭醉不眠梨花千樹雪楊葉萬條煙惜别傾壺醑臨分贈馬鞭看君潁上去新月到家圓江上送女道士褚三清遊南嶽吳江女道士頭戴蓮花巾霓裳不濕雨特異陽臺神足下逺遊履凌波生素塵尋􅋖向南嶽應見魏夫人送友人入蜀見説蠶叢路﨑嶇不易行山從人靣起雲傍馬頭生芳樹籠秦棧春流繞蜀城升沉應巳定不必訪君平送趙雲卿白玉一杯酒緑楊三月時春風餘幾日兩鬢各成絲秉燭唯須飲投竿也未遲如逢渭川獵猶可帝王師送李青歸華陽川伯陽仙家子容色如青春日月祕靈洞雲霞辭世人化心養精魄隱几窅天真莫作千年别歸來城郭新送舍弟吾家白額駒逺别臨東道他日相思一夢君應得池塘生春草送别得書字水色南天逺舟行若在虛遷人發佳興吾子訪間居日落看歸鳥潭澄憐一作羡躍魚聖朝思賈誼應降紫泥書送麴十少府試發清秋興因為吳會吟碧雲斂海色流水折江心我有延陵劔君無陸賈金艱難此為别惆悵一何深送張秀才謁髙中丞并序潯陽余時繫潯陽獄中正讀留侯傳秀才張孟熊藴滅胡之䇿將之廣陵謁髙中丞余喜子房之風感激於斯人因作是詩以送之秦帝淪玉鏡一作六雄滅金虎留侯降氛氲感激黃石老經過滄海君壯士揮金槌報讐六合聞智勇冠終古蕭陳難與羣兩龍爭鬭時天地動風雲酒酣一作縱橫舞長劔倉卒解漢紛宇宙初倒懸鴻溝勢將分英謀信竒絶夫子揚清芬一作夫子稱卓絶超然繼清芬明月入紫微三光亂天文髙公鎮淮海談笑廓妖氛採爾幕中畫戡難光殊勳我無燕霜感玉石俱燒焚但灑一行淚臨岐竟何云尋陽送弟昌岠鄱陽司馬作桑落洲渚連滄江無雲煙尋陽非剡水忽見子猷船了見欲相近來遲杳若仙人乘海上月帆落湖中天一覩無二諾朝歡更勝昨爾則吾惠連吾非爾康樂朱紱白銀章上官佐鄱陽松門拂中道石鏡回清光搖扇及干越水亭風氣涼與爾期此亭期在秋月滿時過或未來兩鄉心巳斷吳山對楚岸彭蠡當中州相思定如此有窮盡年愁餞校書叔雲少年費白日歌笑矜朱顔不知忽巳老喜見春風還惜别且為歡徘徊桃李間看花飲美酒聽鳥臨晴山向晚竹林寂無人空閉關送王孝亷覲省廬江彭蠡將天合姑蘇在日邊寧親候海色欲動孝亷船窈窕晴江轉參差逺岫連相思無晝夜東注似長川同吳王送杜秀芝赴舉入京秀才何翩翩王許回也賢暫别廬江守將遊京兆天秋山冝落日秀木出寒煙欲折一枝桂還來鴈沼前李太白文集卷十四
