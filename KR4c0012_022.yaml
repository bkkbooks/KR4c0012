body:
  text: 李太白文集卷二十二唐李白撰歌詩五十三首詠物聽蜀僧濬彈琴蜀中蜀僧抱緑綺西下峩眉峰為我一揮手如聽萬壑松客心洗流水餘響入霜鍾不覺碧山暮秋雲暗幾重魯東門觀刈蒲魯中魯國寒事早初霜刈渚蒲揮鎌若轉月拂水生連珠此草最可珍何必貴龍鬚織作玉牀席欣承清夜娛羅衣能再拂不畏素塵蕪詠鄰女東窗海石榴魯女東窗下海榴世所稀珊瑚映渌水未足比光輝凊香隨風發落日好鳥歸願為東南枝低舉拂羅衣無由一攀折引領望金扉南軒松南軒有孤松柯葉自綿羃清風無間時蕭灑終日夕隂生古苔緑色染秋煙碧何當凌雲霄直上數千尺詠山樽二首前一首一作詠栁少府山癭木樽蟠木不凋飾且將斤斧疏樽成山嶽勢材是棟梁餘外與金罍並中涵玉醴虛慚君垂拂拭遂忝玳筵居擁腫寒山木嵌空成酒樽愧無江海量偃蹇在君門初出金門尋王侍御不遇詠壁上鸚鵡一作勑放歸山留别陸侍御不遇詠鸚鵡落羽辭金殿孤鳴託繡衣能言終見棄還向隴西飛紫藤樹紫藤挂雲木花蔓宜陽春密葉隱歌鳥香風留美人觀放白鷹二首八月邊風髙胡鷹白錦毛孤飛一片雪百里見秋毫寒冬十二月蒼鷹八九毛寄言燕雀莫相啅自有雲霄萬里髙觀博平王志安少府山水粉圖粉壁為空天丹青狀江海遊雲不知歸日見白鷗在博平真人王志安沈吟至此願挂冠松溪石磴帶秋色愁客思歸生曉寒題雍丘崔明府丹竈美人為政本忘機服藥求仙事不違葉縣已泥丹竈畢瀛州當伴赤松歸先師有訣神將助大聖無心火自飛九轉但能生羽翼雙鳬忽去定何依觀元丹丘坐巫山屏風昔遊三峽見巫山見畫巫山宛相似疑是天邊十二峰飛入君家綵屏裡寒松蕭颯如有聲陽臺微茫如有情錦衾瑶席何寂寂楚王神女徒盈盈髙咫尺如千里翠屏丹崖粲如綺蒼蒼逺樹圍荆門厯厯行舟泛巴水水石潺湲萬壑分煙光草色俱氲氛溪花笑日何年發江客聽猿幾嵗聞使人對此心緬邈疑入髙丘夢綵雲求崔山人百丈崖瀑布圖百丈素崖裂四山丹壁開龍潭中噴射晝夜生風雷但見瀑泉落如潨雲漢來聞君寫真圖島嶼備縈回石黛刷幽草曽青澤古苔幽緘儻相傳何必向天台見野草中有名白頭翁者醉入田家去行歌荒野中如何青草裡亦有白頭翁折取對明鏡宛將衰鬢同微芳似相誚流恨向東風流夜郎題葵葉慙君能衛足歎我逺移根白日如分照還歸守故園瑩禪師房觀山海圖真僧閉精宇滅迹含達觀列嶂圖雲山攢峰入霄漢丹崖森在目清晝疑卷幔蓬壺來軒窗瀛海入几案煙濤爭噴薄島嶼相凌亂征帆飄空中瀑水灑天半峥嶸若可陟想像徒盈歎杳與真心冥遂諧靜者玩如登赤城裏揭涉滄洲畔即事能娛人從兹得蕭散白鷺鷥白鷺下秋水孤飛如墜霜心間且未去獨立沙洲傍詠桂二首園花笑芳年池草豔春色猶不如槿花㛹娟玉階側芬榮何夭促零落在瞬息豈若瓊樹枝終歲長翕赩世人種桃李多在金張門攀折爭捷徑及此春風暄一朝天霜下榮耀難久存安知南山桂緑葉垂芳根清隂亦可託何惜樹君園白胡桃紅羅袖裏分明見白玉盤中看却無疑是老僧休念誦腕前推下水精珠巫山枕障巫山枕障畫髙丘白帝城邊樹色秋朝雲夜入無行處巴水橫天更不流庭前晚開花西王母桃種我家三千陽春始一花結實苦遲為人笑攀折唧唧長咨嗟宣城長史弟昭贈余琴溪中雙舞鶴詩以見志令弟佐宣城贈余琴溪鶴謂言天涯雪忽向窗前落白玉為毛衣黃金不肯博當風振六翮對舞臨山閣顧我如有情長鳴似相託何當駕此物與爾騰寥廓題詠題隨州紫陽先生壁神農好長生風俗久已成復聞紫陽客早署丹臺名喘息餐妙氣步虛吟真聲道與古仙合心將無化并樓疑出蓬海鶴似飛玉京松雪窗外曉池水階下明忽耽笙歌樂頓失軒冕情終願惠金液提攜凌太清題元丹丘山居故人栖東山自愛丘壑美青春卧空林白日猶不起松風清襟袖石潭洗心耳羡君無紛喧髙枕碧霞裡題元丹丘潁陽山居并序丹丘家于潁陽新卜别業其地北倚馬嶺連峰嵩丘南瞻鹿臺極目汝海雲巖映鬱有佳致焉白從之遊故有此作仙遊渡潁水訪隱同元君忽遺蒼生望獨與洪崖羣卜地初晦迹興言且成文却顧北山斷前瞻南嶺分遙通汝海月不隔嵩丘雲之子合逸趣而我欽清芬舉迹倚松石談笑迷朝曛終願狎青鳥拂衣棲江濆題瓜洲新河餞族叔舍人賁齊公鑿新河萬古流不絶豐功利生人天地同朽滅兩橋對雙閣芳樹有行列愛此如甘棠誰云敢攀折吳關倚此固天險自兹設海水落斗門潮平見沙泬我行送季父弭棹徒流恱楊花滿江來疑是龍山雪惜此林下興愴為山陽别瞻望清路塵歸來空寂蔑洗腳亭白道向姑孰洪亭臨道旁前有吳時井下有五丈牀樵女洗素足行人歇金裝西望白鳥洲蘆花似朝霜送君此時去回首淚成行勞勞亭天下傷心處勞勞送客亭春風知别苦不遣栁條青題金陵王處士水亭此亭蓋齊朝南苑又是陸機故宅王子耽玄言賢豪多在門好鵝尋道士愛竹嘯名園樹色老一作秀荒苑池光蕩華軒此堂見明月更憶陸平原掃地青玉簟為余置金樽醉罷一作後欲歸去花枝宿鳥喧何時復來此再一作更得洗囂煩題嵩山逸人元丹丘山居并序白久在廬霍元公近遊嵩山故交深情出處無間嵒信頻及許為主人欣然適會本意當冀長往不返欲便舉家就之兼書共遊因有此贈家本紫雲山道風未淪落况懷丹丘志沖賞歸寂寞朅來遊閩荒捫涉窮禹鑿夤緣泛潮海偃蹇陟廬霍憑雷躡天窗弄景憩霞閣且欣登眺美頗愜隱淪諾三山曠幽期四嶽聊所託故人契嵩潁髙義炳丹雘滅迹遺紛囂終言本峰壑自矜林湍好不羡市朝樂偶與真意并頓覺世情薄爾能折芳桂吾亦採蘭若拙妻好乘鸞嬌女愛飛鶴提攜訪神仙從此鍊金藥題江夏修靜寺此寺是李北海舊宅我家北海宅作寺南江濱空庭無玉樹髙殿坐幽人書帶留青草琴堂一作臺羃素塵平生種桃李寂滅不成春改九子山為九華山聨句并序青陽縣南有九子山山髙數千丈上有九峰如蓮華按圖徴名無所依據太史公南遊略而不書事絶古老之口復闕名賢之紀雖靈仙往復而賦詠罕聞豫乃削其舊號加以九華之目時訪道江漢憩於夏侯回之堂開簷岸幘坐眺松雪因與二三子聨句傳之將來妙有分二氣靈山開九華李白層標遏遲日半壁明朝霞髙霽積雪曜隂壑飛流噴陽崖韋權興權作瓘青熒玉樹色縹眇羽人家李白題宛溪館吾憐宛溪好百尺照心明一作久照心益明何謝新安水千尋見底清白沙留月色緑竹助秋聲却笑嚴湍上于今獨擅名題東溪公幽居杜陵賢人清且亷東溪卜築歲將淹宅近青山同謝朓門垂碧栁似陶潛好鳥迎春歌後院飛花送酒舞前簷客到但知留一醉盤中秖有水精鹽雜詠嘲魯儒魯叟談五經白髮死章句問以經濟䇿茫如墜煙霧足著逺遊履首戴方頭巾緩步從直道未行先起塵秦家丞相府不重褒衣人君非叔孫通與我本殊倫時事且未達歸耕汶水濱懼讒二桃殺三士詎假劒如霜衆女妬蛾眉雙花競春芳魏姝信鄭袖掩袂對懷王一惑巧言子朱顔成死一作損傷行將泣團扇戚戚愁人腸觀獵太守耀清威乘間弄晚輝江沙橫獵騎山火繞行圍箭逐雲鴻落鷹隨月兔飛不知白日暮歡賞夜方歸觀胡人吹笛胡人吹玉笛一半是秦聲十月吳山曉梅花落敬亭愁聞出塞曲淚滿逐臣纓却望長安道空懷戀主情軍行騮馬新跨一作誇白玉鞍戰罷沙場月色寒城頭鐵鼓聲猶震匣裡金刀血未乾從軍行百戰沙場碎鐵衣城南已合數重圍突營射殺呼延將獨領殘兵千騎歸平虜將軍妻平虜將軍婦入門二十年君心自不恱妾寵豈能專出解牀前帳行吟道上篇古人不唾井莫忘昔纒綿春夜洛城聞笛誰家玉笛暗飛聲散入春風滿洛城此夜曲中聞折栁何人不起故園情嵩山採菖蒲者神人多古貌雙耳下垂肩嵩嶽逢漢武疑是九疑仙我來採菖蒲服食可延年言終忽不見滅影入雲煙喻帝竟莫悟終歸茂陵田金陵聽韓侍御吹笛韓公吹玉笛倜儻流英音風吹繞鍾山萬壑皆龍吟王子停鳳管師襄掩瑶琴餘響渡江去天涯安可尋流夜郎聞酺不預北闕聖人歌太康南冠君子竄遐荒漢酺聞奏鈞天樂願得風吹到夜郎放後遇恩不霑天作雲與雷霈然德澤開東風日本至白雉越裳來獨棄長沙國三年未許回何時入宣室更問洛陽才宣城見杜鵑花蜀國曽聞子規鳥宣城還見杜鵑花一呌一回腸一斷三春三月憶三巴白田馬上聞鶯黃鸝啄紫椹五月鳴桑枝我行不記日誤作陽春時蠶老客未歸白田已繅絲一作吳人欲蚤絲驅馬又前去捫心空自悲一作嗤暖酒熱暖將來賓鐵文暫時不動聚白雲撥却白雲見青天掇頭裏許便乘仙三五七言秋風清秋月明落葉聚還散寒烏栖復驚相思相見知何日此時此夜難為情雜詩白日與明月晝夜尚一作常不間况爾悠悠人安得久世間傳聞海水上乃有蓬萊山玉樹生緑葉靈仙每登攀一食駐玄髮再食留紅顔吾欲從此去去之無時還李太白文集卷二十二
