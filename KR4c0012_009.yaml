body:
  text: 李太白文集卷九唐李白撰歌詩二十九首贈三贈張相鎬二首時逃難病在宿松山作後一首亦作書懷重寄張相公神器難竊弄天狼窺紫宸六龍遷一作駕白日四海一作九洛暗胡塵昊穹降元宰君子方經綸淡然養浩氣歘起持天鈞秀骨象山嶽英謀合鬼神佐漢解鴻門興唐一作功成思退身一作生唐為後身擁旄秉金鉞伐鼓乘朱輪虎將如雷霆一作電總戎向東巡諸侯拜馬首猛士騎鯨鱗澤被魚鳥悅令行草木春聖智一作逢聖不失時建功及良辰醜虜安足紀可貽幗與巾倒瀉溟海珠盡為入幕珍馮異獻赤伏鄧生歘來臻庶同昆陽舉再覩漢儀新昔為管將鮑中奔吳隔秦一生欲報主百代期榮親其事竟不就哀哉難重陳卧病古松滋蒼山空四鄰風雲激壯志枯槁驚常倫聞君自天來目張氣益振亞夫得劇孟敵一作七國空一作定無人捫蝨對桓公願得論悲辛大塊方噫氣何辭鼓青蘋斯言儻不合歸老漢江濱本家一作家本隴西人先為漢邊將功略蓋天地名飛青雲上苦戰竟不侯當年頗惆悵世傳埪峒勇氣激金風壯英烈遺厥孫百代神猶王十五觀竒書作賦凌相如龍顔惠殊寵麟閣憑天居一作侍從承明廬晚途未云已蹭蹬遭讒毁想像晉末時崩騰胡塵起衣冠陷鋒鏑戎虜盈朝市一作荆棘生朝市石勒窺神州劉聰劫天子撫劍夜吟嘯雄心日千里誓欲斬鯨鯢澄清洛陽水六合一作三台灑霖雨萬物一作六合無凋枯我揮一杯水自笑何區區因人恥成事貴欲决良圖滅虜不言功飄然陟一作向蓬壺唯有安期舄留之滄海隅贈閭丘宿松阮籍為太守乘驢上東平剖竹十日間一朝風化清偶來拂衣去誰測主人情夫子理宿松浮雲知古城掃地物莽然秋來百草生飛鳥還舊巢遷人返躬耕何慙宓子賤不減陶淵明吾知千載後却掩二賢名獄中上崔相渙尋陽胡馬渡洛水血流征戰場千門閉秋景萬姓危朝霜賢相燮元氣再欣海縣康台庭有䕫龍列宿粲成行羽翼三元聖發輝兩太陽應念覆盆下雪泣拜天光繫尋陽上崔相渙三首邯鄲四十萬同日陷長平能回造化筆或冀一人生毛遂不墮井曽參寧一作不殺人虛言誤公子投杼惑慈親白璧雙明月方知一玉真虛傳一片雨枉作陽臺神縱為夢裏相隨去不是襄王傾國人此一首恐非上崔相中丞宋公以吳兵三千赴河南軍次尋陽脫余之囚參謀幕府因贈之獨坐清天下専征出海隅九江皆渡虎三郡盡還珠組練明秋浦樓船入郢都風髙初選將月滿欲平胡殺氣橫千里軍聲動九區白猿慙劍術黃石借兵符戎虜行當翦鯨鯢立可誅自憐非劇孟何以佐良圖流夜郎贈辛判官昔在長安醉花栁五侯七貴同杯酒氣岸遙凌豪士前風流肯落他一作誰又作諸人後夫子紅顔我少年章臺走馬著金鞭文章獻納麒麟殿歌舞淹留玳瑁筵與君自謂長如此寧知草動風塵起函谷忽驚胡馬來秦宫桃李向胡開我愁遠謫夜郎去何日金雞放赦回贈劉都使東平劉公幹南國秀餘芳一鳴即朱紱五十佩銀章飲冰事戎幕衣錦華水鄉銅官幾萬人諍訟清玉堂吐言貴珠玉落筆回風霜而我謝明主銜哀投夜郎歸家酒債多門客粲成行髙談滿四座一日傾千觴所求竟無緒裘馬欲摧藏主人若不顧明發釣滄浪贈常侍御安石在東山無心濟天下一起振橫流功成復蕭灑大賢有舒卷季葉輕風雅匡復屬何人君為知音者傳聞武安將氣振長平瓦燕趙期洗清周秦保宗社登朝若有言為訪南遷賈贈易秀才少年解長劍投贈即分離何不斷犀象精光暗往時蹉跎君自惜竄逐我因誰地遠虞翻老秋深宋玊悲空摧芳桂色不屈古松姿感激平生意勞歌寄此辭經亂離後天恩流夜郎憶舊遊書懷贈江夏韋太守良宰江夏嶽陽天上白玉京十二樓五城仙人撫我頂結髮受長生誤逐世間樂頗窮理亂情九十六聖君浮雲挂空名天地賭一擲未能忘戰爭試涉霸王略將期軒冕榮時命乃大謬棄之海上行學劍翻自哂為文竟何成劍非萬人敵文竊四海聲兒戲不足道五噫出西京臨當欲去時慷慨淚沾纓歎君倜儻才標舉冠羣英開筵引祖帳慰此遠徂征鞍馬若浮雲送余驃騎亭歌鍾不盡意白日落昆明十月到幽州戈鋋若羅星君王棄北海掃地借長鯨呼吸走百川燕然可推傾心知不得意一作語却欲棲蓬瀛彎弧懼天狼挾矢不敢張攬涕黃金臺呼天哭昭王無人貴駿骨緑耳空騰驤樂毅儻再生于今亦奔亡蹉跎一作蒼忙不得意驅馬過貴鄉逢君聽絃歌肅穆坐華堂百里獨太古陶然卧羲皇徴樂昌樂館開筵列壺觴賢豪間青娥對燭儼成行醉舞紛綺席清歌繞飛梁歡娛未終朝秩滿一作解印歸咸陽祖道擁萬人供帳遙相望一别隔千里榮枯異炎凉炎凉幾度改九土中橫潰漢甲連胡兵沙塵暗雲海草木搖殺氣星辰無光彩白骨成丘山蒼生竟何罪函關壯帝居國命懸哥舒長㦸三十萬開門納凶渠公卿如犬羊忠讜醢與葅二聖出遊豫兩京遂丘墟帝子許専征秉旄控強楚節制非桓文軍師擁熊虎人心失去就賊勢騰風雨惟君固房陵誠節冠終古僕卧香爐頂餐霞潄瑶泉門開九江轉枕下五湖連半夜水軍來尋陽滿旌旃空名適自誤迫脅上樓船徒賜五百金棄之若浮烟辭官不受賞翻謫夜郎天夜郎萬里道西上令人老掃蕩六合清仍為負霜草日月無偏照何由訴蒼昊良牧稱神明深仁恤交道一忝青雲客三登黃鶴樓顧慙禰處士虛對鸚鵡洲焚一作樊山霸氣盡寥落天地秋一作彤襜冠白筆爽氣凌清秋江帶峨眉雪橫穿三峽流萬舸此中來連帆過揚州送此萬里目曠然散我一作煩愁紗忩倚天開水樹緑如髮一作水渌樹如髮窺日一作光畏銜山促酒喜見月吳娃與越豔窈窕誇鉛紅呼來上雲梯含笑出簾櫳對客小垂手羅衣舞春風賓跪請休息主人情未極覽君荆山作江鮑堪動色清水出芙蓉天然去雕飾逸興橫素襟無時不招尋朱門一作旄擁虎士列㦸何森森剪鑿竹石開縈流漲清深登樓一作臺坐一作入水閣吐論多英一作竒音片辭貴白璧一諾輕黃金謂我不愧君青鳥一作鸞明丹心五色雲間鵲飛鳴天上來傳聞赦書至却放夜郎回暖氣變寒谷炎烟生死灰君登鳯池去勿棄賈生才桀犬尚吠堯胸奴笑千秋中夜四五歎常為大國憂旌斾夾兩山黃河當中流連雞不得進飲馬空夷猶安得羿善射一箭落旄頭江夏使君叔席上贈史郎中鳯凰丹禁裏銜出紫泥書昔放三湘去今還萬死餘仙郎久為别客舍問何如涸轍思流水浮雲失舊居多慙華省貴不以逐臣踈復如竹林下而陪芳宴初希君生羽翼一化北溟魚流夜郎半道承恩放還兼欣剋復之美書懷示息秀才黃口為人羅白龍乃魚服得罪豈怨天以愚陷網目鯨鯢未剪滅豺狼屢翻覆悲作楚地囚何由秦庭哭遭逢二明主前後兩遷逐去國愁夜郎投身竄荒谷半道雪屯䝉曠如鳥出籠遙欣剋復美光武安可同天子巡劍閣儲皇守扶風揚袂正北辰開襟攬羣雄胡兵出月窟雷破關之東左掃因右拂旋收洛陽宫回輿入咸京席卷六合通叱咤開帝業一作宇手成天地功大駕還長安兩日忽再中一朝讓寶位劍璽傳無窮愧無秋毫力誰念矍鑠翁弋者何所慕髙飛仰冥鴻棄劍學丹砂臨爐雙玉童寄言息夫子嵗晚涉方蓬巴陵贈賈舍人賈生西望憶京華湘浦南遷莫怨嗟聖主恩深漢文帝憐君不遣到長沙博平鄭太守自廬山千里相尋入江夏北市門見訪却之武陵立馬贈别大梁貴公子氣蓋蒼梧雲若無三千客誰道信陵君救趙復存魏英威天下聞邯鄲能屈節訪博從毛薛夷門得隱淪而與侯生親仍要鼓刀者乃是袖鎚人好士不盡心何能保其身多君重然諾意氣遙相託五馬入市門金鞍照城郭都忘虎竹貴且與荷衣樂去去桃花源何時見歸軒相思無終極腸斷朗江一作陵猿江上贈竇長史漢求季布魯朱家楚逐伍胥去章華萬里南遷夜郎國三年歸及長風沙聞道青雲貴公子錦帆遊戲西江水人疑天上坐樓船水淨霞明兩重綺相約相期何太深棹歌搖艇月中尋不同珠履三千客别欲論交一片心贈王漢陽天落白玉棺一作天上墮玉棺王喬辭葉縣一去未千年漢陽復相見猶乘飛鳬舄尚識仙人面鬢髮何青青童顔皎如練吾曽弄海水清淺嗟三變果愜麻姑言時光速流電與君數杯酒可以窮歡宴白雲歸去來何事坐交戰贈漢陽輔録事二首聞君罷官意我抱漢川湄借問久踈索何如聽訟時天清江月白心靜海鷗知應念投沙客空餘弔屈悲鸚鵡洲橫漢陽渡水引寒煙沒江樹南浦登樓不見君君今罷官在何處漢口雙魚白錦鱗令傳尺素報情人其中字數無多少秪是相思秋復春江夏贈韋南陵冰胡驕馬驚沙塵起胡騶飲馬天津水君為張掖近酒泉我竄三巴九千里天地再新法令寬夜郎遷客帶霜寒西憶故人不可見東風吹夢到長安寧期此地忽相遇驚喜茫如墮烟霧玉簫金管喧四筵苦心不得申一一作長句昨日繡衣傾緑樽病如桃李竟何言昔騎天子大宛馬今乘欵段諸侯門賴遇南平豁方寸復兼夫子持清論有似山開萬里雲四望青天解人悶人悶還心悶苦辛長苦辛愁來飲酒二千石寒灰重暖生陽春山公醉後能騎馬别是風流賢主人頭陀雲月多僧氣山水何曽稱人意不然一作能鳴笳按鼓戲滄流呼取江南女兒歌棹謳我且為君槌碎黃鶴樓君亦為吾倒却鸚鵡洲赤壁爭雄如夢裏且須歌舞寬離憂贈别舍人弟臺卿之江南去國客行遠還山秋夢長梧桐落金井一葉飛銀牀覺罷把朝鏡鬢毛颯已霜良圖委蔓草古貌成枯桑欲道心下事時人疑夜光因為洞庭葉飄落之瀟湘一作流浪至瀟湘令弟經濟士一作才謫居我何傷一作出門見我傷潜虬隱尺一作斗水著論談興亡𤣥遇王子喬口傳不死方入洞過天地登真朝玊皇吾將撫爾背揮手遂翺翔一作携手凌蒼蒼贈盧司戶秋色無逺近出門盡寒山白雲遙相識待我蒼梧間借問盧耽鶴西飛幾嵗還贈從弟南平太守之遙二首時因飲酒過度貶武陵後詩故贈少年不得意落拓無安居願隨任公子欲釣吞舟魚常時飲酒逐風景壯心遂與功名踈蘭生谷底人不鋤雲在髙山空卷舒漢家天子馳駟馬赤車蜀道迎相如天門九重謁聖人龍顔一解四海春彤庭左右呼萬嵗拜賀明主收沉淪翰林秉筆回英眄麟閣崢嶸誰可見承恩初入銀臺門一作承恩侍從甘泉宫著書獨在金鑾殿龍駒雕鐙白玉鞍象牀綺食一作席黃金盤當時笑我微賤者却來請謁為交歡一朝謝病遊江海疇昔相知幾人在前門長揖後門關今日結交明日改愛君山嶽心不移隨君雲霧迷所為夢得池塘生春草使我長價登樓詩别後遙傳臨海作可見羊何共和之東平與南平今古兩步兵素心愛美酒不是顧専城謫官桃源去尋花幾處行秦人如舊識出尸笑相迎醉後贈王厯陽厯陽書秃千兔毫詩裁兩牛腰筆蹤起龍虎舞袖拂雲霄雙歌一作寄二胡姬更奏一作唱遠清朝舉酒挑朔雪從君不相饒贈厯陽褚司馬時此公為稚子舞北堂千萬夀侍奉有光輝先同稚子舞更著老萊衣因為小兒啼醉倒月下歸人間無此樂此樂世中希對雪醉後贈王厯陽有身莫犯飛龍鱗有手莫辮猛虎鬚君看昔日汝南市白頭仙人隱玉壺子猷聞風動忩竹相邀共醉杯中渌厯陽何異山隂時白雪飛花亂人目君家有酒我何愁客多樂酣秉燭遊謝尚自能鸜鵒舞相如免脫鷫鸘裘清晨興罷一作鼓棹過江去他日西看却月樓一作千里相思明月樓李太白文集卷九
