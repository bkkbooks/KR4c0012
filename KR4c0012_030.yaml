body:
  text: 李太白文集巻三十附録李白字太白隴西成紀人涼武昭王暠九世孫蟬聨珪組世為顯著中葉非罪謫居條支易姓與名然自窮蟬至舜五世為庻累世不大曜亦可歎焉神龍之始逃歸于蜀復指李樹而生伯陽驚姜之夕長庚入夢故生而名白以太白字之世稱太白之精得之矣不讀非聖之書恥為鄭衞之作故其言多似天仙之辭凡所著述言多諷興自三代已來風騷之後馳驅屈宋鞭撻揚馬千載獨步唯公一人故王公趨風列岳結軌羣賢翕習如鳥歸鳯盧黄門云陳拾遺横制頽波天下質文翕然一變至今朝詩體尚有梁陳宫掖之風至公大變掃地併盡今古文集遏而不行唯公文章横被六合可謂力敵造化歟天寳中皇祖下詔徵就金馬降輦步迎如見綺皓以七寳牀賜食御手調羮以飯之謂曰卿是布衣名為朕知非素蓄道義何以及此置于金鑾殿出入翰林中問以國政潛草詔誥人無知者醜正同列害能成謗格言不入帝用踈之公乃浪跡縱酒以自昬穢詠謌之際屢稱東山又與賀知章崔宗之等自為八仙之遊謂公謫仙人朝列賦謫仙之謌凡數百首多言公之不得意天子知其不可留乃賜金歸之遂就從祖陳留採訪大使彦允請北海髙天師授道籙於齊州紫極宫將東歸蓬萊仍羽人駕丹丘耳陽冰試絃歌於當塗心非所好公遐不棄我乗扁舟而相顧臨當挂冠公又疾亟草藁萬巻手集未修枕上授簡俾余為序論闗睢之義始愧卜商明春秋之辭終慙杜預自中原有事公避地八年當時著述十喪其九今所存者皆得之他人焉時寳應元年十一月乙酉也自盤古劃天地天地之氣艮于西南劔門上斷横江下絶岷峨之曲别為錦川蜀之人無聞則巳聞則傑出是生相如君平王褒揚雄降有陳子昻李白皆五百年矣白本隴西乃放形因家於緜身既生蜀則江山英秀伏羲造書契後文章濫觴者六經六經糟粕離騷離騷糠粃建安七子七子至白中有蘭芳情理宛約詞句妍麗白與古人爭長三字九言鬼出神入瞠若乎後耳白久居峨眉與丹丘因持盈法師達白亦因之入翰林名動京師大鵬賦時家藏一本故賔客賀公竒白風骨呼為謫仙子由是朝廷作歌數百篇上皇豫遊召白白時為貴門邀飲比至半醉令製出師詔不草而成許中書舍人以張垍讒逐游海岱間年五十餘尚無禄位禄位拘常人横海鵾負天鵬豈池籠榮之顥始名萬次名炎萬之日不逺命駕江東訪白遊天台還廣陵見之眸子烱然哆如餓虎或時束帶風流藴藉曽受道籙于齊有青綺冠帔一副少任俠手刄數人與友自荆徂揚路亡權窆廻棹方暑亡友糜潰白收其骨江路而舟又長揖韓荆州荆州延飲白悞拜韓讓之白曰酒以成禮荆州大悦白始娶于許生一女一男曰明月奴女既嫁而卒又合于劉劉訣次合于魯一婦人生子曰頗黎終娶于宋間携昭陽金陵之妓迹類謝康樂世號為李東山駿馬美妾所適二千石郊迎飲數斗醉則奴丹砂撫青海波滿堂不樂白宰酒則樂顥平生自負人或為狂白相見泯合有贈之作謂余爾後必著大名於天下無忘老夫與明月奴因盡出其文命顥為集顥今登第豈符言耶解携明年四海大盜宗室有潭者白䧟焉謫居夜郎罪不至此屢經昭洗朝廷忍白乆為長沙汨羅之儔路逺不存否極則泰白宜自寛吾觀白之文義有濟代命然千鈞之弩魏王大瓠用之有時議者柰何以白有叔夜之短儻黄祖過禰晉帝罪阮古無其賢所謂仲尼不假蓋於子夏經亂離白章句蕩盡上元末顥於絳偶然得之沉吟累年一字不下今日懐舊援筆成序首以贈顥作顥詶白詩不忘故人也次以大鵬賦古樂府諸篇積薪而録文有差互者兩舉之白未絶筆吾其再刋付男平津子掌其他事跡存於後序李翰林歌詩李陽冰纂為草堂集十巻史又别收歌詩十巻與草堂集互有得失因校勘排為二十巻號曰李翰林集今於三館中得李白賦序表讚書頌等亦排為十巻號曰李翰林别集翰林在唐天寳中賀秘監聞於明皇帝召見金鑾殿降步輦迎如見綺皓草和蕃書思若懸河帝嘉之七寳方丈賜食於前御手調羮於是置之金鑾殿出入翰林中其諸事跡草堂集序范傳正撰新墓碑亦略而詳矣史又撰李白傳一巻事又稍周然有三事近方得之開元中禁中初重木芍藥即今牡丹也開元天寳花木記云禁中呼木芍藥為牡丹得四本紅紫淺紅通白者上因移植於興慶池東沉香亭前㑹花方繁開上乗照夜車太真妃以步輦從詔選梨園弟子中尤者得樂一十六色李龜年以歌擅一時之名手捧檀板押衆樂前將欲歌之上曰賞名花對妃子焉用舊樂辭焉遽命龜年持金花牋宣賜翰林供奉李白立進清平調詞三章白欣然承詔㫖由若宿酲未解因援筆賦之其一曰雲想衣裳花想容春風拂檻露華濃若非羣玉山頭見㑹向瑶臺月下逢其二曰一枝紅艶露凝香雲雨巫山枉斷腸借問漢宫誰得似可憐飛燕倚新粧其三曰名花傾國兩相歡長得君王帶笑看解釋春風無限恨沉香亭北倚闌干龜年以歌辭進上命梨園弟子略約調撫絲竹遂促龜年以歌之太真妃持頗棃七寳杯酌西涼州蒲萄酒笑領歌辭意甚厚上因調玉笛以倚曲毎曲徧將換則遲其聲以媚之太真妃飲罷歛繡巾重拜上自是顧李翰林尤異於諸學士㑹髙力士終以脫靴為深恥異日太真妃重吟前辭力士曰始以妃子怨李白深入骨髓何飜拳拳如是耶太真妃因驚曰何翰林學士能欲辱人如斯力士曰以飛燕指妃子賤之甚矣太真妃頗深然之上嘗三欲命李白官卒為宫中所捍而止白嘗有知鑒客并州識汾陽王郭子儀於行伍間為脱其刑責而奬重之及翰林坐永王之事汾陽功成請以官爵贖翰林上許之因而免誅翰林之知人如此汾陽之報徳如彼白之從弟令問常目白曰兄心肝五臟皆錦繡耶不然何開口成文揮翰霧散爾爾傳中漏此三事今書於序中白有歌云吟詩作賦北牕裏萬言不及一杯水蓋歎乎有其時而無其位嗚呼以翰林之才名遇𤣥宗之知見而乃飄零如是宋中丞薦於聖真云一命不霑四海稱屈得非命歟白居易贈劉禹錫詩云詩稱國手徒為爾命壓人頭不柰何斯言不虚矣凡百有位無自輕焉撰集之次聊存梗槩而已時在饒霤州中咸平元年三月三日序嗚呼姑孰東南青山北址有唐髙士李白之墓嗚呼哀哉夫仁以安物公其懋焉義以濟難公其志焉識以辯理公其博焉文以宣志公其懿焉宜其上為王師下為伯友年六十有二不偶賦臨終歌而卒悲夫聖以立徳賢以立言道以恒世言以經俗雖曰死矣吾不謂其亡矣也有子曰伯禽天然長能持㓜能辯數梯公之徳必將大其名也巳矣銘曰立徳謂聖立言謂賢嗟君之道竒於人而侔於天哀哉君名白廣漢人性倜儻好縱横術善賦詩才調逸邁往往興㑹屬詞恐古之善詩者亦不逮尤工古歌少任俠不事産業名聞京師天寳初𤣥宗辟翰林待詔因為和蕃書并上宣唐鴻猷一篇上重之欲以綸誥之任委之為同列者所謗詔令歸山遂浪迹天下以詩酒自適又志尚道術謂神仙可致不求小官以當世之務自負流離軻竟無所成名有子名伯禽偶遊至此遂以疾終因葬於此文集亦無定巻家家有之代宗登極廣拔淹瘁時君亦拜拾遺聞命之後君亦逝矣嗚呼與其才不與其命悲夫全白㓜則以詩為君所知及此投弔荒墳將毁追想音容悲不能止邑有賢宰顧公遊秦志好為詩亦常慕效李君氣調因嗟盛才㝠寞遂表墓式墳乃題貞石冀傳於往來也貞元六年四月七日記沙門履文書墳去墓記一百二十歩騏驥䈥力成意在萬里外歴塊一蹶斃於空谷唯餘駿骨價重千金大鵬羽翼張勢欲摩穹昊天風不來海波不起塌翅别島空留大名人亦有之故左拾遺翰林學士李公之謂矣公名白字太白其先隴西成紀人絶嗣之家難求譜諜公之孫女捜於箱篋中得公之亡子伯禽手疏十數行紙壊字缺不能詳備約而計之涼武昭王九代孫也隋末多難一房被竄于碎葉流離散落隠易姓名故自國朝以來漏於屬籍神龍初濳還廣漢因僑為郡人父客以逋其邑遂以客為名髙卧雲林不求禄仕公之生也先府君指天枝以復姓先夫人夢長庚而告祥名之與字咸所取象受五行之剛氣叔夜心髙挺三蜀之雄才相如文逸瓌竒宏廓拔俗無類少以俠自任而門多長者車常欲一鳴驚人一飛冲天彼漸陸遷喬皆不能也由是慷慨自負不拘常調器度𢎞大聲聞于天天寳初召見於金鑾殿𤣥宗明皇帝降輦歩迎如見園綺論當世務草荅蕃書辯如懸河筆不停綴𤣥宗嘉之以寳牀方丈賜食於前御手和羮徳音褒美褐衣恩遇前無比儔遂直翰林専掌密命將處司言之任多陪侍從之遊他日泛白蓮池公不在宴皇歡既洽召公作序時公已被酒於翰苑中仍命髙將軍扶以登舟優寵如是既而上疏請還舊山𤣥宗甚愛其才或慮乗醉出入省中不能不言温室樹恐掇後患惜而遂之公以為千鈞之弩一發不中則當摧撞折牙而永息機用安能傚碌碌者蘇而復上哉脫屣軒冕釋羈韁鎻因肆情性大放宇宙間飲酒非嗜其酣樂取其昬以自富作詩非事於文律取其吟以自適好神仙非慕其輕舉將不可求之事求之欲耗壯心遣餘年也在長安時秘書監賀知章號公為謫仙人吟公烏栖曲云此詩可以哭鬼神矣時人又以公及賀監汝陽王崔宗之裴周南等八人為酒中八仙朝列賦謫仙歌百餘首俄屬戎馬生郊逺身海上往來於斗牛之分優游没身偶乗扁舟一日千里或遇勝境終年不移時長江逺山一泉一石無往而不自得也晩嵗渡牛渚磯至姑孰悅謝家青山有終焉之志盤桓利居竟卒於此其生也聖朝之髙士其往也當塗之旅人代宗之初捜羅俊逸拜公左拾遺制下於彤庭禮降於𤣥壤生不及禄殁而稱官嗚呼命歟傳正生唐代甲子相懸常於先大夫文字中見與公有潯陽夜宴詩則知與公有通家之舊早於人間得公遺篇逸句吟詠在口無何叨䝉恩奬亷問宣池按圖得公之墳墓在當塗邑因令禁樵採備洒掃訪公之子孫故申慰薦凡三四年乃獲孫女二人一為陳雲之室一乃劉勸之妻皆編户甿也因召至郡庭相見與語衣服村落形容朴野而進退閑雅應對詳諦且祖徳如在儒風宛然問其所以則曰父伯禽以貞元八年不禄而卒有兄一人出逰一十二年不知所在父存無官父殁為民有兄不相保為天下之窮人無桑以自蠶非不知機杼無田以自力非不知稼穡況婦人不任布裙糲食何所仰給儷于農夫救死而已久不敢聞於縣官懼辱祖考鄊閭逼迫忍恥來告言訖淚下余亦對之泫然因云先祖志在青山遺言宅兆頃屬多故殯於龍山東麓地近而非本意墳髙三尺日益摧圮力且不及知如之何聞之憫然將遂其請因當塗令諸葛縱㑹計在州得諭其事縱亦好事者學為歌詩樂聞其語便道還縣躬相地形卜新宅于青山之陽以元和十二年正月二十三日遷神于此遂公之志也西去舊墳六里南抵驛路三百歩北倚謝公山即青山也天寶十二載勑改名焉因告二女將改適於士族皆曰夫妻之道命也亦分也在孤窮既失身於下俚仗威力乃求援於他門生縱偷安死何面目見大父於地下欲敗其類所不忍聞余亦嘉之不奪其志復井稅免徭役而已今士大夫之葬必誌於墓有勲庸道徳之家兼樹碑于道余才術貧虛不能兩致今作新墓銘輒刋二石一寘于泉扃一表于道一作通路亦峴首漢川之義也庶芳聲之不泯焉文集二十巻或得之於時之文士或得之於宗族編緝斷簡以行于代銘曰嵩嶽降神是生輔臣蓬萊譴真斯為逸人晉有七賢唐稱八仙應彼星象唯公一焉晦以麴蘖暢於文篇萬象奔走乎筆端萬慮泯滅乎鐏前臥必酒甕行惟酒船吟風詠月席地摹天但貴乎適其所適不知夫所以然而然至今尚疑其醉在千日寧審乎夀終百年謝家山兮李公墓異代詩流同此路舊墳卑庳風雨侵新宅爽塏松栢林故鄊萬里且無嗣二女從民永於此猗歟琢石為二碑一藏幽隧一臨岐岸深谷髙變化時一存一毁名不虧李翰林名白字太白以詩著名召入翰林世稱才名占得翰林他人不復爭先其後以脅從得罪既免遂放浪江南死宣城葬當塗青山下李陽冰序詩集粗具行止敬嘗逰江表過其墓下愛其才壯其氣味其嗜酒知其取適作碑於墓且曰先生得天地秀氣耶不然何異於常之人耶或曰太白之精下降故字太白故賀監號為謫仙不其然乎故為詩格髙㫖逺若在天上物外神仙㑹集雲行鶴駕想見飄然之狀視塵中屑屑米粒蟲睫紛擾菌蠢羈絆蹂躪之比又嘗有知鍳客并州識郭汾陽於行伍間為免脫其刑責而奬重之後汾陽以功成官爵請贖翰林上許之因免誅其報也又常心許劒舞裴將軍予曽叔祖也嘗投書曰如白願出將軍門下其文髙其氣雄世稀其本懼失其傳故序傳之大和初文宗皇帝命翰林學士為三絶賛公之詩歌與將軍劒舞洎張旭長史草書為三絶夫天付上才必同靈氣賢傑相投龍虎兩合可為知者言非常人所知也夫古以名徳稱占其官謚者甚希前以詩稱者若謝吏部何水部陶彭澤鮑參軍之類唐朝以詩稱若王江寧宋考功韋蘇州王右丞杜員外之類以文稱者若陳拾遺蘇司業元容州蕭功曹韓吏部之類以徳行稱者元魯山陽道州以直稱者魏文貞狄梁公以忠烈稱者顔魯公段太尉以武稱者李衞公英公以學行文翰俱稱者虞秘監唐之得人於斯為盛翰林其以詩稱之一也予嘗過當塗訪翰林舊宅又於浮圖寺化城之僧得翰林自寫訪賀監不遇詩云東山無賀老却棹酒船回味之不足重之為寳用獻知者又於歴陽郡得翰林與劉尊師書一紙思髙筆逸又嘗逰上元蔣山寺見翰林讃志公云水中之月了不可取刀齊尺量扇迷陳語文簡事備誠為作者附於此云㑹昌三年二月中敬自淠水草堂南逰江左過公墓下四過青山兩發塗口徘徊不忍去與前濮州鄄城縣尉李劭同以公服拜其墓問其墓左人畢元宥實備洒掃留綿帛具酒饌祭公知公無孫有孫女二人一娶劉勸一娶陳雲皆農夫也且曰二孫女不拜墓已五六年矣因告邑宰李君都傑請免畢元宥力役俾專洒掃事嘻享名甚髙後事何薄謝公舊井新墓角落青山白雲共為蕭索巨竹拱木如公卓犖天長地久其名不朽此為祭文寫授元宥又為碑曰貴盡皆然名存則難故予重名不重官作李翰林碑十五字而已李太白文集巻三十
