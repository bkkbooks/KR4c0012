body:
  text: 李太白文集卷八唐李白撰歌詩三十四首贈二贈嵩山焦錬師并序洛陽嵩丘有神人焦錬師者不知何許婦人也又云生於齊梁時其年貌可稱五六十常胎息絶榖居少室廬逰行若飛倐忽萬里世或傳其入東海登蓬萊竟不能測其往也余訪道少室盡登三十六峯聞風有寄灑翰遙贈二室凌一作倚青天三花含一作明紫一作緑烟中有蓬海客宛疑麻姑仙道在喧莫染跡髙想已綿時餐金鵝藥一作金蛾蘂屢讀青苔篇八極恣遊憩九垓長周旋下瓢酌潁水舞鶴來伊川還歸空山上獨拂秋霞眠蘿月挂朝鏡松風鳴夜絃潜光隱嵩嶽錬魄棲雲幄霓衣何飄飄一作葳蕤鳯吹一作羽駕轉綿邈願同西王母下顧東方朔紫書儻可傳𡨕一作銘骨誓相學口號贈陽徴君此公時被徵陶令辭彭澤梁鴻入㑹稽我尋髙士傳君與古人齊雲卧留丹壑天書降紫泥不知楊伯起早晚向關西秋日錬藥院鑷白髮贈元六兄林宗木落識嵗秋瓶氷知天寒桂枝日已緑拂雪凌雲端弱齡接光景矯翼攀鴻鸞投分三十載榮枯同所歡長吁望青雲鑷白坐相看秋顔入曉鏡壯髮凋危冠窮與鮑生賈饑從漂母餐時來極天人道在豈吟歎樂毅方適趙蘇秦初說韓卷舒固在我何事空摧殘書情贈蔡舍人雄梁宋嘗髙謝太傅一作嘗聞謝安石攜妓東山門楚舞醉碧雲吳歌斷青猿暫因蒼生起談笑安黎元余亦愛此人丹霄冀飛翻遭逢聖明主敢進興亡言蛾眉積讒妬魚目嗤璵璠白璧竟何辜一作本無瑕青蠅遂成寃一朝去京國十載客梁園猛犬吠九關殺人憤精魂皇穹雪寃枉白日開氛昏泰階得䕫龍桃李滿中原倒海索明月凌山採芳蓀愧無橫草功虛負雨露恩跡謝雲臺閣心隨天馬轅夫子王佐才而今復誰論層飈振六翮不日思騰騫我縱五湖棹烟濤恣崩奔夢釣子陵湍英風緬猶存徒希客星隱弱植不足援千里一回首萬里一長歌黃鶴不復來清風奈愁何舟浮瀟湘月一作江橫羅剎石山倒洞庭波投汨笑古人臨濠得天和間時田畝中搔背牧雞鵝别離解相訪應在武陵多憶襄陽舊遊贈濟隂馬少府巨昔為大堤客曽上山公樓開忩碧嶂滿拂鏡滄江流髙冠佩雄劍長揖韓荆州此地别夫子今來思舊遊朱顔君未老白髮我先秋壯志恐蹉跎功名若雲浮一作有意未得言懷賢若沉憂歸心結逺夢落日懸春愁空思羊叔子墮淚峴山頭一作何時共擕手更醉峴山頭對雪獻從兄虞城宰昨夜梁園雪弟寒兄不知庭前看玉樹腸斷憶連枝訪道安陵遇蓋還為豫造真籙臨别留贈清水見白石仙人識青童安陵蓋夫子十嵗與天通懸河與微言談論安可窮能令二千石撫背驚神聰揮毫贈新詩髙價掩山東至今平原客感激慕清風學道北海仙傳書蘂珠宫丹田了玉闕白日思雲空為我草真籙天人慙妙工七元洞豁落八角輝星虹三災蕩琁璣蛟龍翼微躬舉手謝天地虛無齊始終黃金獻髙堂答荷難克充下笑世上事沉魂北羅酆昔日萬乘墳今成一科蓬贈言若可重實此輕華嵩雜言用投丹陽知已兼奉宣慰判官客從崑崙來遺我雙玉璞云是古之得道者西王母食之餘食之可以凌太虛愛之頗謂絶今昔求識江淮人猶乎比石如今雖在卞和手闕正憔悴了了知之亦何益恭聞士有調相如始從鎬京還復欲鎬京去能上秦王殿何時回光一相眄欲投君保君年幸君持取無棄捐無棄捐服之與君俱神仙贈崔郎中宗之金陵胡鷹一作鴈拂海翼翺翔鳴素秋驚雲辭沙朔飄蕩迷河洲一作胡鷹度日邊兩龍天地秋哀鳴沙塞寒風雪迷河洲有一作乃如飛蓬人去逐一作一去萬里遊登髙望浮雲髣佛如舊丘日從海旁沒水向天邊流長嘯倚孤劍目極心悠悠嵗晏歸去來富貴安所求仲尼七十說厯聘莫見收魯連逃千金圭組豈可一作不足酬時哉茍不㑹草木為我儔希君同携手長往南山幽贈崔咨議騄驥本天馬素非伏櫪駒長嘶向一作起清風倐忽凌九區何言西北至却是東南隅世道有翻覆前期一作程又作途難預圖希君一一作前又作相剪拂一作佛使猶可騁中衢贈升州王使君忠臣六代帝王國三吳佳麗城賢人當重寄天子借髙名巨海一邊靜長江萬里清應須救趙䇿未肯棄侯嬴贈别從甥髙五魚目髙泰山不如一璵璠賢甥即明月聲價動天門能成吾宅相不減魏陽元自顧寡籌略功名安所存五木思一擲如繩繫窮猿櫪中駿馬空堂上醉人喧黃金久已罄為報故交恩聞君隴西行使我驚心魂與爾共飄颻雪天各飛翻江水流或卷此心難具論貧家羞好客語拙覺辭繁三朝空錯莫對飯却慙寃自笑我非夫生事多契闊蓄積萬古憤向誰得開豁天地一浮雲此身乃毫末忽見無端倪太虛可包括去去何足道臨岐空復愁肝膽不楚越山河亦衾幬雲龍若相從明主㑹見收成功解相訪溪水桃花流贈裴司馬翡翠黃金縷繡成歌舞衣若無雲間月誰可比光輝秀色一如此多為衆女譏君恩移昔愛失寵秋風歸愁苦不窺鄰泣上流黃機天寒素手冷夜長燭復微十日不滿匹鬢蓬亂若絲猶是可憐人容華世中稀向君發皓齒顧我莫相違敘舊贈江陽宰陸調泰伯讓天下仲雍揚波濤清風蕩萬古跡與星辰髙開吳食東溟陸氏世英髦多君秉古節嶽立冠人曹風流少年時京洛事遊遨腰間延陵劍玉帶明珠袍我昔鬬雞徒連延五陵豪邀遮相組織呵嚇來煎熬君開萬叢人鞍馬皆辟易告急清憲臺脫余北門厄閒宰江陽邑剪棘樹蘭芳一本自陸氏世英髦以下云夫子時峻季嶽立冠人曹風流少年時京洛事遊遨驂驔紅陽燕玉劍明珠袍一諾許他人千金雙錯刀滿堂青雲士望美期丹霄我昔北門厄摧如一枝蒿有虎挾雞徒連延五陵豪邀遮來組織呵嚇相煎熬君披萬人叢脫我如貔牢此恥竟未刷且食綏山桃非天雨文章所祖記風騷蒼蓬老壯髮長䇿未逢遭别君幾何時君無相思否鳴琴坐髙樓渌水净忩牖政成聞雅頌人吏皆拱手投刃有餘地回車攝江陽錯雜非易理先威挫豪強下與此同城門何肅穆五月飛秋霜好鳥集珍木髙才列華堂時從府中歸絲管儼成行但苦隔逺道無由共銜觴江北荷花開江南楊梅熟正好飲酒時懷賢在心目掛席拾海月乘風下長川多酤新豐醁滿載剡溪船中途不遇人直到爾門前大笑同一醉取樂平生年贈從孫義興宰銘亞相李公重之以能政中丞李公免罷以移官天子思茂宰天枝得英才朗然清秋月獨出映吳臺落筆生綺繡操刀振風雷蠖屈雖百里鵬鶱望三台退食無外事琴堂向山開緑水寂以間白雲有時來河陽富竒藻彭澤縱名杯所恨不見之猶如仰昭回元惡昔滔天疲人散幽草驚川無恬鱗舉邑罕遺老誓雪㑹稽恥將奔宛陵道亞相素所重投刃應桑林獨坐傷激揚神融一開襟絃歌欣再理和樂醉人心蠧政除害馬傾巢有歸禽壺漿候君來聚舞共謳吟農夫棄蓑笠蠶女墮纓簪歡笑相拜賀則知惠愛深厯職吾所聞稱賢爾為最化洽一邦上名馳三江外峻節冠雲霄通方堪逺大能文變風俗好客留軒蓋他日一來遊因之嚴光瀨草創大還贈柳官迪天地為槖籥周流行太易造化合元符交構騰精魄自然成妙用孰知其指的羅絡四季間綿微一無隙日月更出沒雙光豈云隻姹女乘河車黃金充轅軛執樞相管轄摧伏傷羽翮朱鳥張炎威白虎守本宅相煎成苦老消爍凝津液髣佛明忩塵死灰同至寂鑄冶入赤色十二周律厯赫然稱大還與道本無隔白日可撫弄清都在咫尺北酆落死名南斗上生籍抑豫是何者身在方士格才術信縱橫世途自輕擲吾求仙棄俗君曉損勝益不向金闕遊思為玉皇客鸞車速風雷龍騎無鞭䇿一舉上九天相攜同所適贈崔司戶文昆季雙珠出海底俱是連城珍明月兩特達餘輝照傍人英聲振名都髙價動殊鄰豈以箕山故特以風期親惟昔不自媒擔簦西入秦攀龍九天上忝列嵗星臣布衣侍丹墀密勿草絲綸才微惠渥重讒巧生緇磷一去已十年今來復盈旬清霜入曉鬢白露生衣巾側見緑水亭開門列華茵千金散義士四座無凡賓欲折月中桂持為寒者薪路傍已竊笑天路將何因垂恩儻丘山報德有微身贈溧陽宋少府陟李斯未相秦且逐東門兔宋玉事襄王能為髙唐賦常聞緑水曲忽此相逢遇掃灑青天開豁然披雲霧威蕤紫鸞鳥巢在崑山樹驚風西北吹飛落南溟去早懷經濟䇿特受龍顔顧白玉棲青蠅君臣忽行路人生感分義貴欲呈丹素何日清中原相期廓天步戲贈鄭溧陽陶令日日醉不知五栁春素琴本無絃漉酒用葛巾清風北忩下自謂羲皇人何時到溧一作栗里一見平生親贈僧崖公昔在朗陵東學禪白眉空大地了鏡徹回旋寄輪風攬彼造化力持為我神通晚謁泰山君親見日沒雲中夜卧山月一作夜卧雪上月拂衣逃人羣授余金仙道曠劫未始聞冥機發天光獨朗謝垢氛虛舟不繫物觀化遊江濆江濆遇同聲道崖乃僧英說法動海嶽遊方化公卿手秉玉麈尾如登白樓亭微言注百川亹亹信可聽一風鼓羣有萬籟各自鳴啓開七忩牖託宿掣雷霆自云厯天台搏壁躡翠屏凌競石橋去恍惚入青冥昔往今來歸絶景無不經何日更携手乘杯向蓬瀛遊溧陽北湖亭望瓦屋山懷古贈同旅一作贈孟浩然朝登北湖亭遙望瓦屋山天清白露下始覺一作知秋風還遊子託主人仰觀眉睫間日一作目色送飛鴻邈然不可攀長吁相勸勉何事來吳關聞有貞義女振窮溧水灣清光了在眼白日如披顔髙墳五六墩崒兀棲猛虎遺跡翳九泉芳名動千古子胥昔乞食此女傾壺漿運開展宿憤入楚鞭平王凜冽天地間聞名若懷霜壯夫或未達十步九太行與君拂衣去萬里同翺翔醉後贈從甥髙鎮馬上相逢揖馬鞭客中相見客中憐欲邀擊筑悲歌飲正值傾家無酒錢江東風光不借人枉殺落花空自春黃金逐手快意盡昨日破産今朝貧丈夫何事空嘯傲不如燒却頭上巾君為進士不得進我被秋霜生旅鬢時清不及英豪人三尺童兒唾亷藺匣中盤劒裝䱜魚間在腰間未用渠且將換酒與君醉醉歸託宿吳鱄諸贈秋浦栁少府秋浦舊蕭索公庭人吏稀因君樹桃李此地忽芳菲搖筆望白雲開簾當翠微時來引山月縱酒酣清輝而我愛夫子淹留未忍歸贈崔秋浦三首吾愛崔秋浦宛然陶令風門前一作栽五楊栁井上一作夾二梧桐山鳥下聽事簷花落酒中懷君未忍去惆悵意無窮崔令學陶令一作君似陶彭澤北忩常晝眠抱琴時弄月一作待秋月取意任無絃見客但傾酒為官不愛錢東臯多種黍勸爾早耕田一作東臯春事起種黍早歸田河陽花作縣秋浦玊為人地逐名賢好風隨惠化春水從天漢落山逼畫屏新應念金門客投沙弔楚臣望九華山贈韋青陽仲堪昔在九江上遙望一作觀九華峰天河掛緑水秀出一作山九芙蓉我欲一揮手誰人可相從君為東道主於此卧雲松贈栁圓竹實滿秋浦鳯來何苦饑還同月下鵲三繞未安枝夫子即瓊樹傾柯拂羽儀懷君戀明德歸去日相思聞謝楊兒吟猛虎詞因有此贈同州隔秋浦聞吟猛虎詞晨朝來借問知是謝楊兒宿清溪主人夜到清溪宿主人碧巗裏簷楹掛星斗枕席響風水月落西山時啾秋夜猿起贈王判官時余歸隱居廬山屏風疊尋陽昔别黃鶴樓蹉跎淮海秋俱飄零落葉各散洞庭流中年不相見蹭蹬遊吳越何處我思君天台緑蘿月㑹稽風月好却繞剡溪回雲山海上出人物鏡中來一度浙江北十年醉楚臺荆門倒屈宋梁苑傾鄒枚苦笑我誇誕知音安在哉大盜割鴻溝如風掃秋葉吾非濟代人且隱屏風疊中夜天中望憶君思見君明朝拂衣去永與海鷗羣在水軍宴贈幕府諸侍御永王軍中月化五白一作百龍翻飛凌九天胡沙驚北海電掃洛陽川虜箭雨宫闕皇輿成播遷英王受廟略秉鉞清南邊雲旗卷海雪金㦸羅江烟聚散百萬人㢮張在一賢霜臺降羣彥水國奉戎旃繡服開宴語天人借樓船如登黃金臺遙謁紫霞仙卷身編蓬下冥機四十年寧知草間人腰下有龍泉浮雲在一决誓欲清幽燕願與四座公靜談金匱篇齊心戴朝恩不惜微軀捐所冀旄頭滅功成追魯連贈潘侍御論錢少陽繡衣柱史何昂藏鐵冠白筆橫秋霜三軍論事多引納階前虎士羅干將雖無二十五老者且有一翁錢少陽眉如松雪齊四皓調笑可以安儲皇君能禮此最下士九州拭目瞻清光贈武十七諤并序門人武諤深於義一作詩者也質本沉悍慕要離之風潛釣川海不數數於世間事聞中原作難西來訪余余愛子伯禽在魯許將冒胡兵以致之酒酣感激援筆而贈馬如一匹練明日過吳門乃是要離客西來欲報恩笑開燕匕首拂拭竟無言狄犬吠清洛天津成塞垣愛子隔東魯空悲斷腸猿林回棄白璧千里阻同奔君為我致之輕賫涉淮源精誠合天道不愧遠遊魂一作鄧攸魂李太白文集卷八
