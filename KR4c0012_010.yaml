body:
  text: 李太白文集巻十唐李白撰歌詩三十二首贈四贈宣城宇文太守兼呈崔侍御宣城白若白鷺鮮清如清唳蟬受氣有本性不為外物遷飲水箕山上食雪首陽巔迴車避朝歌掩口去盗泉岧嶤廣成子倜儻魯仲連卓絶二公外丹心無間然昔攀六龍飛今作百錬鈆懐恩欲報主投佩向北燕彎弓緑弦開滿月不憚堅閑騎駿馬獵一射兩虎穿回旋若流光轉背落雙鳶胡人三歎息兼知五兵權鎗鎗突雲將却掩我之妍多逢𠞰絶兒先著祖生鞭據鞍空矍鑠壮志竟誰宣蹉跎復來歸憂恨坐相煎無風難破浪失計長江邊危苦惜頺光金波忽三圓時遊敬亭上閑聽松風眠或弄宛溪月虛舟信洄㳂顔公三十萬盡付酒家錢興發毎取之聊向醉中仙過此無一事静談秋水篇君從九卿來水國有豐年魚鹽滿市井布帛如雲烟下馬不作威氷壺照清川霜眉邑中叟皆美太守賢時時慰風俗往往出東田竹馬數小兒拜迎白鹿前含笑問使君日一作早晚可迴旋遂一作還歸池上酌掩抑清風絃曾標横浮雲一作遊雲端下撫謝朓肩樓髙碧海出樹古青蘿懸光禄紫霞杯伊昔忝相傳良圖掃沙漠别夢繞旌旃富貴日成踈願言杳無縁登龍有直道倚玉阻芳筵敢獻繞朝䇿思同郭泰舩何言一水淺似隔九重天崔生何傲㟁縱酒復談𤣥身為名公子英才苦迍邅鳴鳯託髙梧凌風何翩翩安知慕羣客彈劍拂秋一作青蓮贈宣城趙太守恱趙得寳符盛山河功業存三千堂上客出入擁平原六國揚清風英聲何喧喧大賢茂遠業虎竹光南藩錯落千丈松虬龍盤古根枝下無俗草所植唯蘭蓀憶在南陽時始承國士恩公為柱下史脫繡歸田園伊昔簮白筆幽都逐遊魂持斧佐三軍霜清天北門差池宰兩邑鶚立重飛翻焚香入蘭臺起草多芳言䕫龍一顧重矯翼凌翔鵷赤縣揚雷聲强項聞至尊驚飈摧秀木跡屈道彌敦出牧厯三郡所居猛獸奔遷人同衛鶴謬上懿公軒自笑東郭履側慙狐白温閑吟步竹石精義忘朝昬顦顇成醜士風雲何足論獼猴騎土牛羸馬夾雙轅願借羲和景為人照覆盆溟海不震蕩何由縱鵬鯤所期要津日倜儻假騰騫贈從弟宣州長史昭淮南一作北望江南千里碧山對我行倦一作盡過之半落青天外宗英佐雄郡水陸相控帶長川豁中流千里瀉吴㑹君心亦如此包納無小大搖筆起風霜推誠結仁愛訟庭垂桃李賓館羅軒盖何意蒼梧雲飄然忽相㑹才将聖不偶命與時俱背獨立山海間空老聖明代知音不易得撫劍増感慨當結九萬期中途莫先退書懐贈南陵常賛府嵗星入漢年方朔見明主調笑當時人中天謝雲雨一去麒麟閣遂将朝市乖故交不過門秋草日上堦當時何特達獨與我心諧置酒凌歊臺歡娱未曽歇歌動白紵山舞迴天門月問我心中事為君前致辭君看我才能何似魯仲尼大聖猶不遇小儒安足悲雲南五月中頻喪渡濾師毒草殺漢馬張兵奪秦旗至今西二河流血擁僵屍将無七擒略魯女惜園葵咸陽天地樞累嵗人不足雖有數斗玉不如一盤粟賴得契宰衡持鈞慰風俗自顧無所用辭家方未歸霜驚壮士髪淚滿逐臣衣以此不安席蹉跎身世違終當滅衛謗不受魯人譏於五松山贈南陵常賛府為草當作蘭為木當作松蘭秋香風遠松寒不改容松蘭相因依蕭艾徒丰茸雞與雞並食鸞與鸞同枝㨂珠去沙礫但有珠相隨遠客投名賢真堪冩懐抱若惜方寸心待誰可傾倒虞卿棄趙相便與魏齊行海上五百人同日死田横當時不好賢豈傳千古名願君同心人於我少留情寂寂還寂寂出門迷所適長劍歸乎來一作歌歸來秋風思歸客自梁園至敬亭山見㑹公談陵陽山水兼期同遊因有此贈宣州作我隨秋風來瑶草恐衰歇中途寡名山安得弄雲月渡江如昨日黄葉向人飛敬亭愜素尚弭棹流清輝冰谷明且秀陵巒抱江城粲粲吴與史衣冠耀天京水國饒英竒濳光卧幽草㑹公真名僧所在即為寳開堂振白拂髙論横青雲雪山掃粉壁墨客多新文為余話幽棲且述陵陽美天開白龍潭月映清秋水黄山望石柱突兀誰開張一作白柱挿星漢西崖誰開張黄鶴久不來子安在蒼茫東南焉可窮山鳥絶飛處一作猨狖絶行處稠疊千萬峰相連入雲去聞此期振䇿歸來空閉關相思如明月可望不可攀何當移白足早晚凌蒼山且寄一書札令余解愁顔贈友人三首蘭生不當戸别是閑庭草夙被霜露欺紅榮已先老謬接瑶華枝結根君王池顧無馨香美叨沐清風吹餘芳若可佩卒嵗長相隨袖中趙匕首買自徐夫人玉匣閉霜雪經燕復厯秦其事竟不捷淪落歸沙塵持此願投贈與君同急難一作嵗寒荆卿一去後壮士多摧殘長號易水上為我揚波瀾鑿井當及泉張帆當濟川廉夫唯重義駿馬不勞鞭人生貴相知何必金與錢慢世薄功業非無胸中畫謔浪萬古賢以為兒童劇立産如廣費匡君懐長䇿但苦山北寒誰知道南宅嵗酒上逐風霜鬢兩邊白蜀主思孔明晉家望安石時來列五鼎談笑期一擲虎伏避胡塵漁謌遊海濱弊裘恥妻嫂長劍託交親夫子秉家義羣公難與鄰莫持西江水空許東溟臣他日青雲去黄金報主人陳情贈友人延陵有寳劍價重千黄金觀風厯上國暗許故人深歸來挂墳松萬古知其心懦夫感達節壮氣激素衿鮑生薦夷吾一舉致齊相斯人無良朋豈有青雲望臨財不茍取推分固辭讓後世稱其賢英風邈難尚論交但若此有道孰云喪多君騁逸藻掩映當時人舒文振頽波秉徳冠彛倫卜居乃此地共井為比鄰清琴弄雲月美酒娱冬春薄徳中見捐忽之如遺塵英豪未豹變自古多艱辛他人縱以踈君意宜獨親柰何成離居相去復㡬許飄風吹雲霓蔽目不得語投珠冀有報按劍恐相拒所思采芳蘭欲贈隔荆一作脩渚沉憂心若醉積恨淚如雨願假東壁輝餘光照貧女贈從弟洌楚人不識鳯重一作髙價求山雞獻主昔云是今來方覺迷自居漆園北久别咸陽西風飄落日去節變流鸎啼桃李寒未開幽關豈來蹊逢君發花萼若與青雲齊及此桑葉緑春蠶起中閨日出撥榖鳴田家擁鋤犁顧余乏尺土東作誰相携傅説降霖雨公輸造雲梯𦍑戎事未息君子悲塗泥報國有長䇿成功羞執珪無由謁明主杖䇿還蓬藜他年爾相訪知我在磻溪贈閭丘處士賢人有素業乃在沙塘陂竹影掃秋月荷衣落古池閑讀山海經散帙卧遙帷且躭田家樂遂曠一作廣林中期野酌勸芳酒園𬞞烹露葵如能樹桃李為我結茅茨贈錢徴君少陽一作送趙雲卿白玉一盃酒緑楊三月時春風餘㡬日兩鬢各成絲秉燭唯須飲投竿也未遲如逢渭水獵猶可帝王師贈宣州靈源寺沖濬公敬亭白雲起秀色連蒼梧下映雙溪水如天落鏡湖此中積龍象獨許濬公殊風韻逸江左文章動海隅觀一作了心同水月解領得明珠今日逢支遁髙談出有無贈僧朝美水客凌洪波長鯨湧溟海百川隨龍舟嘘噏竟安在中有不死者探得明月珠髙價傾宇宙餘輝照江湖苞巻金縷褐蕭然若空無誰人識此寳竊笑有狂夫了心何言説各勉黄金軀贈僧行融梁有湯惠休常從鮑照遊峨眉史懐一獨映陳公出卓絶二道人結交鳯與麟行融亦俊發吾知有英骨海若不隐珠驪龍吐明月大海乘虚舟隨波任安流詩賦栴檀閣縱酒鸚鵡洲待我適東越相携上白樓贈黄山胡公求白鷴并序聞黄山胡公有雙白鷴盖是家雞所伏自小馴狎了無驚猜以其名呼之皆就掌取食然此鳥耿介尤難畜之余平生酷好竟莫能致而胡公輟贈於我唯求一詩聞之欣然適㑹宿意因援筆三叫文不加㸃以贈之請以雙白璧買君雙白鷴白鷴白如錦白雪恥容顔照影玉潭裏刷毛琪樹間夜棲寒月静朝步落花閑我願得此鳥翫之坐碧山胡公能輟贈籠寄野人還登敬亭山南望懐古贈竇主簿敬亭一逥首目盡天南端仙者五六人常聞此遊盤谿流琴髙水石聳麻姑壇白龍降陵陽黄鶴呼子安羽化騎日月雲行翼鴛鸞下視宇宙間四溟皆波瀾决絶目下事從之復何難百嵗落半途前期浩漫漫強食不成味清晨起長歎願隨子明去錬火燒金丹贈汪倫白遊涇縣桃花潭村人汪倫常醖美酒以待白倫之裔孫至今寳其詩李白乘舟将欲行忽聞㟁上踏歌聲桃花潭水深千尺不及汪倫送我情經亂後将避地剡中留贈崔宣城雙鵝飛洛陽五馬渡江徼何意上東門胡鶵更長嘯中原走豺虎烈火焚宗廟太白晝經天頺陽掩餘照王城皆蕩覆世路成奔峭四海望長安嚬眉寡西笑蒼生疑落葉白骨空相弔連兵似雪山破敵誰能料我垂北溟翼且學南山豹崔子賢主人歡娱每相召胡床紫玉笛却坐青雲叫楊花滿州城置酒同臨眺忽思剡溪去水石逺清妙雪盡天地明風開湖山貌悶為洛生詠醉發吴越調赤霞動金光日足森海嶠獨散萬古意閑垂一溪釣猿近天上啼人移月邉棹無以墨綬苦來求丹砂要華髪長折腰将貽陶公誚獻從叔當塗宰陽氷當塗金鏡霾六國亡新亂天經焉知髙光起自有羽翼生蕭曹安􅒈屼耿賈摧欃槍吾家有季父傑出聖代英雖無三台位不借四豪名激昂風雲氣終協龍虎精弱冠燕趙來賢彥多逢迎魯連善談笑季布折公卿遙知禮數絶常恐不合并惕想結宵夢素心久已冥顧慙青雲器謬奉玉樽傾山陽五百年緑竹忽再榮髙歌振林木大笑喧雷霆落筆灑篆文崩雲使人驚吐辭又炳煥五色羅華星秀句滿江國髙才掞天庭宰邑艱難時浮雲空古城居人若薙草掃地無纎莖恵澤及飛走農夫盡歸耕廣漢水萬里長流玉琴聲雅頌播吴越還如泰階平小子别金陵來時白下亭羣鳯憐客鳥差池相哀鳴各抜五色毛意重泰山輕贈㣲所費廣斗水澆長鯨彈劍歌苦寒嚴風起前楹月銜天門曉霜落牛渚清長歎即歸路臨川空屏營寄上安陸白兆山桃花巖寄劉侍御綰安陸下作春歸桃花巖貽許侍御雲卧三十年好閑復愛仙蓬壺雖冥絶鸞鶴心悠然歸來桃花巖得憇雲忩眠一本云幼採紫房談早愛滄溟仙心跡頗相誤世事空徂遷歸來丹巖曲得憇青霞眠對嶺人共語飲潭猨相連時昇翠㣲上邈若羅浮巔兩岑抱東壑一嶂横西天樹雜日易隠崖傾月難圓芳草換野色飛蘿揺春烟入遠搆石室選幽開山田獨此林下意杳無區中縁永辭霜臺客一作繡衣客千載方來旋淮南卧病書懐寄蜀中趙徴君蕤淮南吴㑹一浮雲飄如遠行客一作萬里無主人一身獨為客功業莫從就嵗光屢奔迫良圖俄棄捐衰疾乃緜劇古琴藏虗匣長劍挂空壁楚懐奏鍾儀越吟比荘舄一作卧束恨已久興發思逾積國門遙天外鄉路遠山隔朝憶相如臺夜夢子雲宅旅情初結緝一作如結骨秋氣方寂厯風入松下清露出草間白故人不在此一作不可見而我一作幽夢誰與適寄書西飛鴻贈爾慰離析寄弄月溪吴山人嘗聞龎徳公家住洄湖水終身棲鹿門不入襄陽市夫君弄明月滅景清淮裏髙蹤邈難追可與古人比清揚杳莫覩白雲空望美待我辭人間携手訪松子秋山寄衛尉張卿及王徴君㑹稽何以折相贈白花青桂枝月華若夜雪見此令人思雖然剡溪興不異山隂時明發懐二子空吟招隠詩望終南山寄紫閣隠者長安出門見南山引領意無限秀色難為名蒼翠日在眼有時白雲起天際自舒巻心中與之然託興毎不淺何當造幽人滅跡棲絶巘夕霽杜陵登樓寄韋繇浮陽滅霽景萬物生秋容登樓送遠目伏檻觀羣峰原野曠超緬闗河紛錯重清輝映竹日一作水竹翠色明雲松蹈海寄遐想還山迷舊踪徒然迫晚暮未果諧心胸結桂空佇立折麻恨莫從一作采菊竟誰舉游蘭恨莫從思君達永夜長樂聞踈鐘秋夜宿龍門香山寺奉寄王方城十七丈奉國瑩上人從弟㓜成令問洛陽朝發汝海東暮棲龍門中水寒夕波急木落秋山空望極九霄逈賞幽萬壑通目浩沙上月心清松下一作裏風玉斗生一作横網戸銀河耿花宫興在趣方逸歡餘情未終一作咫尺世喧隔微㝠真理融鳯駕憶王子虎溪懐遠公桂枝坐蕭瑟一作銷歇棣華不復同流恨一作浪寄伊水盈盈焉可窮春日獨坐寄鄭明府鷰麥青青遊子悲河堤弱栁鬱金枝長條一拂春風去盡日飄揚無定時我在河南别離久那堪對此當忩牖情人道來竟不來何人共醉新豐酒寄淮南友人紅顔悲舊國青嵗歇芳洲不待金門詔空持寳劍遊海雲迷驛道江月隐鄉樓復作淮南客因逢桂樹留沙丘城下寄杜甫齊魯我來竟何事髙卧沙丘城城邊有古樹日夕連秋聲魯酒不可醉齊歌空復情思君若汶水浩蕩寄南征聞丹丘子於城北山營石門幽居中有髙鳯遺跡僕離羣遠懐亦有棲遁之志因叙舊以寄之春華一作弄滄江月秋色碧海雲離居盈寒暑對此長思君思君楚水南望君淮山北夢魂雖飛來㑹靣不可得疇昔在嵩陽同衾卧羲皇緑蘿笑簪紱丹壑賤巗廊晚途各分析乘興任所適僕在鴈門關君為峨眉客心懸萬里外影滯兩鄉隔長劍復歸來相逢洛陽陌陌上何喧喧都令心意煩迷津覺路失託勢隨風翻以兹謝朝列長嘯歸故園故園恣閑逸求古散縹帙久欲入一作尋名山㛰娶殊未畢人生信多故世事豈惟一念此憂如焚悵然若有失聞君卧石門宿昔契彌敦方從桂樹隠不羡桃花源髙鳯起遐曠幽人跡復存松風清瑶瑟溪月湛芳樽安居偶佳賞丹心期此論李太白文集巻十
