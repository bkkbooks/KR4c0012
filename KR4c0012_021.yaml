body:
  text: 李太白文集巻二十一唐李白撰歌詩四十五首感遇越中秋懐越水遶碧山周迴數千里乃是天鏡中分明畫相似一本首四句云蹈海思仲連遊山慕康樂攀雲窮千峰弄水涉萬壑下同愛此從㝠搜永懐臨湍遊一作林湍幽一為滄波客十見紅蕖秋觀濤壯天險望海令人愁路遐迫西照歲晚悲東流何必探禹穴誓將歸蓬丘不然五湖上亦可乗扁舟效古二首朝入天苑中謁帝蓬萊宫青山映輦道碧樹揺烟空謬題金閨籍得與銀臺通待詔奉明主抽毫頌清風歸時落日晩蹀躞浮雲驄人馬本無意飛馳自豪雄入門紫鴛鴦金井雙梧桐清歌弦古曲美酒沽新豐快意且為樂列筵坐羣公光景不可留生世如轉蓬早達勝晩遇羞比垂釣翁自古有秀色西施與東鄰蛾眉不可妬况乃効其嚬所以尹婕妤羞見邢夫人低頭不出氣塞黙少精神寄語無鹽子如君何足珍感寓二首寶劒雙蛟龍雪花照芙蓉精光射天地電騰不可衝一去别金匣飛沈失相從風胡殁已乆一作聖人歿已乆所以潛其鋒呉水深萬丈楚山邈千重雌雄終不隔神物㑹當逢咸陽二三月百鳥鳴花枝一作宫栁黄金枝玉劒誰家子西秦豪俠兒一作縁幘誰家子賣珠輕薄兒日暮醉酒歸白馬驕且馳意氣人所仰一作傾遊冶方及時子雲不曉事晚獻長楊詞賦達身已老草𤣥鬢若絲投閣良可歎但為此輩嗤擬古十二首青天何厯厯明星白如石黄姑與織女相去不盈尺銀河無鵲橋非時將安適閨人理紈素遊子悲行役瓶氷知冬寒霜露欺逺客客以秋葉飛飄颻不言歸别後羅帶長愁寛去時衣乗月託宵夢因之寄金徽髙樓入青天下有白玉堂明月看欲墮當牕懸清光遥夜一美人羅衣霑秋霜含情弄柔瑟彈作陌上桑弦聲何激烈風巻繞飛梁行人皆躑躅棲鳥去回翔但寫妾意苦莫辭此曲傷願逢同心者飛作紫鴛鴦長繩難繫日自古共悲辛黄金髙北斗不惜買陽春石火無留光還如世中人即事已如夢後來我誰身提壺莫辭貧取酒㑹四鄰仙人殊恍惚未若醉中真清都緑玉樹灼爍瑶臺春攀花弄秀色逺贈天仙人香風送紫蘂直到扶桑津恥掇世上豔所貴心之珍相思傳一笑聊欲示情親今日風日好明日恐不如春風笑於人何乃愁自居吹簫舞彩鳳酌醴鱠神魚千金買一醉取樂不求餘達士遺天地東門有二疏愚夫同瓦石有才知巻舒無事坐悲苦塊然涸轍魚運速天地閉胡風結飛霜百草死冬月六龍頽西荒太白出東方彗星揚精光鴛鴦非越鳥何為眷南翔惟昔鷹將犬今為侯與王得水成蛟龍爭池奪鳳皇北斗不酌酒南箕空簸揚世路今太行迴車竟何託萬族皆凋枯遂無少可樂曠野多白骨幽魂共銷鑠榮貴當及時春華宜照灼人非崐山玉安得長璀錯身沒期不朽榮名在麟閣月色不可掃客愁不可道玉露生秋衣流螢飛百草日月終銷毁天地同枯槁蟪蛄啼青松安見此樹老金丹寧誤俗昧者難精討爾非千歲翁多恨去世早飲酒入玉壺藏身以為寳生者為過客死者為歸人天地一逆旅同悲萬古塵月兔空𢷬藥扶桑已成一作以為薪白骨寂無言青松豈知春前後更歎息浮榮何足珍仙人騎綵鳳昨下閬風岑海水三清淺桃源一見尋遺我緑玉盃兼之紫瓊琴盃以傾美酒琴以閑素心二物非世有何論珠與金琴彈松裡風盃勸天上月風月長相知世人何倐忽渉江弄秋水愛此荷花鮮攀荷弄其珠蕩漾不成圎佳期綵雲重欲贈隔逺天相思無由見悵望涼風前去去復去去辭君還憶君漢水既殊流楚山亦此分人生難稱意豈得長為羣越鷰喜海日燕鴻思朔雲别乆容華晚琅玕不能飯日落知天昏夢長覺道逺望夫登髙山化石竟不返感興八首瑶姬天帝女精彩化朝雲宛轉入夢宵無心向楚君錦衾抱秋月綺席空蘭芬茫昧竟誰測虛傳宋玉文洛浦有宓妃飄颻雪争飛輕雲拂素月了可見清輝解珮欲西走含情詎相違香塵動羅襪渌水不沾衣陳王徒作賦神女豈同歸好色傷大雅多為世所譏裂素持作書將寄萬里懐眷眷待逺信竟嵗無人來征鴻務從陽又不為我棲委之在深篋塵魚壊其題何如投火中流落他人開不惜他人開但恐生是非芙蓉嬌緑波桃李誇白日偶䝉春風榮生此豔陽質豈無佳人色但恐花不實宛轉龍火飛零落互相失詎知凌寒松千載長守一十五遊神仙仙遂未曽歇吹笙吟松風汎瑟窺海月西山玉童子使我鍊金骨欲逐黄鶴飛相呼向蓬闕西國有美女結樓青雲端蛾眉豔曉月一笑傾城歡髙節奪明主烱心如凝丹常恐彩色晩不為人所觀安得配君子共成雙飛鸞朅來荆山客誰為珉玉分良寳絶見弃虛持三獻君直木忌先伐芬蘭哀自焚盈滿天所損沈㝠道所羣東海有碧水西山多白雲魯連及夷齊可以躡清芬嘉穀隠豐草草深苗且稀農夫既不異孤穗將安歸常恐委疇隴忽與秋蓬飛烏得薦宗廟為君生光輝寓言三首周公負斧扆成王何䕫䕫武王昔不豫剪爪投河湄賢聖遇讒慝不免人君疑天風拔大木禾黍咸傷萎管蔡扇蒼蠅公賦鴟鴞詩金縢若不啓忠信誰明之遥裔雙綵鳳婉孌三青禽往還瑶臺裏鳴舞玉山岑以歡秦娥意復得王母心區區精衛鳥銜木空哀吟長安春色歸先入青門道緑楊不自持從風欲傾倒海鷰還秦宫雙飛入簾櫳相思不可見託夢遼城東秋夕旅懐涼風度秋海吹我鄉思飛連山去無際流水何時歸日夕浮雲色心斷明月暉芳草歇柔艶白露催寒衣夢長銀漢落覺罷天星稀含歎想舊國泣下誰能揮感遇四首吾愛王子晉得道伊洛濱金骨既不毁玉顔長自春可憐浮丘公猗靡與情親舉手白日間分明謝時人二仙去已逺夢想空殷勤可歎東籬菊莖疎葉且微雖言異蘭蕙亦自有芳菲未汎盈樽酒徒沾清露輝當榮君不採飄落欲何依昔余聞常娥竊藥駐雲髪不自嬌玉顔方希鍊金骨飛去身莫返含笑坐明月紫宫誇蛾眉隨手㑹凋歇宋玉事楚王立身本髙潔巫山賦綵雲郢路歌白雪舉國莫能和巴人皆巻舌一惑登徒言恩情遂中絶寫懐翰林讀書言懐呈集賢院内諸學士長安晨趨紫禁中夕待金門詔觀書散遺帙探古窮至妙片言茍㑹心掩巻忽而笑青蠅易相㸃白雪難同調本是疎散人屢貽褊促誚雲天屬清朗林壑憶遊眺或時清風來閑倚欄一作簷下嘯嚴光桐廬溪謝客臨海嶠功成謝人君一作間從此一投釣尋陽紫極宫感秋作何處聞秋聲翛翛北牕竹迴薄萬古心攬之不盈掬静坐觀衆妙浩然媚幽獨白雲南山來就我簷下宿嬾從唐生决羞訪季主卜四十九年非一往不可復野情轉蕭散世道有飜覆陶令歸去來田家酒應熟江上秋懐餐霞卧舊壑散髪謝逺遊山蟬號枯桑始復知天秋朔雁别海裔越鷰辭江樓颯颯風巻沙茫茫霧縈洲黄雲結暮色白水揚寒流惻愴心自悲潺湲淚難收蘅蘭方蕭瑟長歎令人愁秋夕書懐一作秋日南遊書懐北風吹海雁南度落寒聲感此瀟湘客悽其流浪情海懐結滄洲一作逺心飛蒼梧霞一作遐想遥一作游赤城始探蓬壺事一作始採蓬壺術旋覺天地輕澹然吟一作思髙秋閑卧瞻太清蘿月掩一作隱空幕松霜皓一作雲散前楹滅見息羣動獵微窮至精桃花有源水可以保吾生避地司空原言懐舒州南風昔不競豪聖思經綸劉琨與祖逖起舞雞鳴晨雖有匡濟心終為樂禍人我則異於是潛光皖水濱卜築司空原北將天柱鄰雪霽萬里月雲開九江春俟乎泰階平然後託微身傾家事金鼎年皃何長新所願得此道終然保清真弄景奔日馭攀星戲河津一隨王喬去長年玉天賓南奔書懐一作自丹陽南奔道中作遥夜何漫漫一作何時旦空歌白石爛寗戚未匡齊陳平終佐漢欃槍掃河洛直割鴻溝半厯數方未遷雲雷屢一作起多難天人秉旄鉞虎竹光藩翰侍筆黄金臺傳觴青玉案不因秋風起自有思歸歎主將動讒疑王師忽離叛自來白沙上一作兵羅滄海上鼓噪丹陽岸賓御如浮雲從風各消散舟中指可掬城上骸争爨草草出近關行行昧前算南奔劇星火北冦無涯畔顧乏七寳鞭留連道邊翫太白夜食昴長虹日中貫秦趙興天兵茫茫九州亂感遇一作結明主恩頗髙祖逖言過江誓流水志在清中原拔劒擊前柱悲歌難重論上崔相百憂章四言時在潯陽獄共工赫怒天維中摧鯤鯨噴蕩揚濤起雷魚龍陷人成此禍胎火焚崐山玉石相磓仰希霖雨灑寳炎煨箭發石開戈揮日迴鄒衍慟哭燕霜颯來微誠不感猶贄一作縶夏臺蒼鷹搏攫丹棘崔㟴豪聖凋枯王風傷哀斯文未喪東岳豈頺穆逃楚難鄒脫呉災見機苦遲二公所咍驥不驟進麟何來哉星離一門草擲二孩萬憤結緝一作縎憂從中催金瑟玉壺盡為愁媒舉酒太息泣血盈盃台星再朗天網重恢屈法申恩棄瑕取材冶長非罪尼父無猜覆盆儻舉應照寒灰萬憤詞投魏郎中海水渤潏人罹鯨鯢蓊胡沙而四塞始滔天於燕齊何六龍之浩蕩遷白日於秦西九土星分嗷嗷悽悽南冠君子呼天而啼戀髙堂而掩泣淚血地而成泥獄户春而不草獨幽怨而沈迷兄九江兮弟三峽悲羽化之難齊穆陵關北愁愛子豫章天南隔老妻一門骨肉散百草遇難不復相提攜樹榛拔桂囚鸞寵雞舜昔授禹伯成耕犂徳自此衰吾將安栖好我者恤我不好我者何忍臨危而相擠子胥鴟夷彭越醢醯自古豪烈胡為此繄蒼蒼之天髙乎視低如其聽卑脫我牢狴儻辨美玉君收白珪荆州賊亂臨洞庭言懐作修虵横洞庭吞象臨江島積骨成巴陵遺言聞楚老水窮三苖國地窄三湘道嵗晏天峥嶸時危人枯槁思歸阻䘮亂去國傷懐抱郢路方丘墟章華亦傾倒風悲猿嘯苦木落鴻飛早日隠西赤沙月明東城草關河望已絶氛霧行當掃長呌天可聞吾將問蒼昊覽鏡書懐得道無古今失道還衰老自笑鏡中人白髪如霜草捫心空歎息問影何枯槁桃李竟何言終成南山皓田園言懐賈誼三年謫班超萬里侯何如牽白犢飲水對清流江南春懐青春幾何時黄鳥鳴不歇天涯失鄉一作歸路江外老華髪心飛秦塞雲影滯楚關月身世殊爛漫田園乆蕪沒嵗晏何所從長歌謝金闕李太白文集巻二十一
