body:
  text: 李太白文集卷十五唐李白撰歌詩三十八首送下洞庭醉後送絳州吕使君杲流澧州江夏昔别若夢中天涯忽相逢洞庭破秋月縱酒開愁容贈劔刻玉字延平兩蛟龍送君不盡意書及鴈回峯與諸公送陳郎將歸衡陽并序仲尼旅人文王明夷茍非其時聖賢低眉况僕之不肖者而遷逐枯稿固非其冝朝心不開暮髮盡白而登髙送逺使人增愁陳郎將義風凛然英思逸發來下曹城之榻去邀才子之詩動清興於中流泛素波而徑去諸公仰望不及連章祖之序慙起豫輒冠名賢之首作者嗤我乃為撫掌之資乎衡山蒼蒼入紫冥下看南極老人星回飈吹散五峯雪往往飛花落洞庭氣清嶽秀有如此郎將一家拖金紫門前食客亂浮雲世人皆比孟嘗君江上送行無白璧臨岐惆悵若為分江夏送倩公歸漢東并序謝安四十臥白雲於東山桓公纍徵為蒼生而一起常與支公遊賞貴而不移大人君子神冥契合正可乃爾僕與倩公一面不忝古人言歸漢東使我心痗夫漢東之國聖人所出神農之後季梁為大賢爾來寂寞無一物可紀有唐中興始生紫陽先生先生六十而隱化若繼迹而起者惟倩公焉蓄壯志而未就期老成於他日且能傾産重諾好賢攻文即惠休上人與江鮑往復各一時也僕平生述作罄其草而授之思親遂行流涕惜别今聖朝巳捨季布當徵賈生開顔洗目一見白日冀相視而笑於新松之山耶作小詩絶句以寫别李白辭路入漢東國川藏明月輝寧知喪亂後更有一珠歸送趙判官赴黔府中丞叔幕廓落青雲心結交黃金盡冨貴翻相忘令人忽自哂蹭蹬鬢毛斑盛時難再還巨源咄石生何事馬蹄間緑蘿長不厭却欲還東山君為魯曾子拜揖髙堂裏叔繼趙平原偏承明主恩風霜推一作摧獨坐旌節鎮雄藩虎士秉金鉞蛾眉開玉樽才髙幕下去義重林中言水宿五溪月霜啼三峽猿東風春草緑江上候歸軒送陸判官往琵琶峽水國秋風夜殊非逺别時長安如夢裏何日是歸期送梁四歸東平玉壺挈美酒送别強為歡大火南星月長郊北路難殷王期負鼎汶水起垂竿莫學東山臥參差老謝安江夏送友人雪點翠雲裘送君黃鶴樓黃鶴振玉羽西飛帝王州鳯無琅玕實何以贈逺遊徘徊相顧影淚下漢江流送郗昻謫巴中瑶草寒不死移植滄江濱東風灑雨露會入天地一作池春豫若洞庭葉隨波送逐臣思歸未可得書此謝情人江夏送張丞欲别心不忍臨行情更親酒傾無限月客醉幾重春藉草依流水攀花贈逺人送君從此去回首泣迷津賦得白鷺鷥送宋少府入三峽白鷺拳一足月明秋水寒人驚逺飛去直向使君灘送二季之江東初發強中作題詩與惠連多慙一日長不及二龍賢西塞當中路南風欲進船雲峯出逺海帆影挂清川禹穴藏書地匡山種杏田此行俱有適遲爾早歸旋江西送友人之羅浮南昌桂水分五嶺衡山朝九疑鄉關眇安西流浪將何之素色愁明湖秋渚晦寒姿疇昔紫芳意已過黃髮期君王縱疏散雲壑借巢夷爾去之羅浮我還憩峨眉中濶道萬里霞月遙相思如尋楚狂子瓊樹有芳枝宣州謝朓樓餞别校書叔雲一作陪侍御叔華登樓歌棄我去者昨日之日不可留亂我心者今日之日多煩憂長風萬里送秋鴈對此可以酣髙樓蓬萊文章建安骨中間小謝又清發俱懷逸興壯思飛欲上青天一作雲覽明月抽刀斷水水更流舉杯消愁愁更一作復愁人生一作男兒在世不稱意明朝散髮弄扁舟一作舉棹還滄洲宣城送劉副使入秦君即劉越石雄豪冠當時凄清橫吹曲慷慨扶風詞虎嘯俟騰躍雞鳴遭亂離千金市駿馬萬里逐王師結交樓煩將侍從羽林兒統兵捍吳越豺虎不敢窺大勳竟莫敘已過秋風吹秉鉞有季公凛然負英姿寄深且戎幕望重必台司感激一然諾縱橫兩無疑伏奏歸北闕鳴騶忽西馳列將咸出祖英寮惜分離斗酒滿四筵歌笑宛溪湄君攜東山妓我詠北門詩貴賤交不易恐傷中園葵昔贈紫騮駒今傾白玉巵同歡萬斛酒未足解相思此别又千里一作此外别千里秦吳渺天涯月明關山苦水劇隴頭悲借問幾時還春風入黃池無令長相思折斷緑楊枝涇川送族弟錞時盧校書草序常侍御為詩涇川三百里若耶羞見之錦石照碧山兩邊白鷺鷥佳境千萬曲客行無歇時上有琴髙水下有陵陽祠仙人不見我明月空相知問我何事來盧敖結幽期蓬山振雄筆繡服揮清詞江湖發秀色草木含榮滋置酒送惠連吾家稱白眉愧無海嶠作敢闕河梁詩見爾復幾朝俄然告將離中流漾綵鷁列岸叢金羈歎息蒼梧鳯分棲瓊樹枝清晨各飛去飄落天南垂望極落日盡秋深暝猿悲寄情與流水但有長相思五松山送殷淑秀色發江左風流奈若何仲文了不還獨立揚清波載酒五松山頽然白雲歌中天度落月萬里遙相過撫酒惜此月流光畏蹉跎明日别離去連峯鬱嵳峩送崔氏昆季之金陵一作秋夜崔八丈水亭送崔二放一作吳歌倚東樓行子期曉發秋風渡江來吹落山上月主人出美酒滅燭延清光二崔向金陵安得不盡觴水客弄歸棹雲帆卷輕霜扁舟敬亭下五兩先飄揚峽石入水花碧流日更長思君無嵗月西笑阻河梁登黃山陵歊臺送族弟溧陽尉濟充一作統泛舟赴華隂當塗鸞乃鳯之族翺翔紫雲霓文章輝一作耀五色雙在瓊樹棲一朝各飛去鳯與鸞俱啼炎赫五月中朱曦爍河堤爾從泛舟役使我心魂悽秦地無草木南雲喧鼓鼙君王減玉膳早起思鳴雞漕引救關輔疲人免塗泥宰相作霖雨農夫得耕犂靜者伏草間羣才滿金閨空手無壯士窮居使人低送君登黃山長嘯倚一作上天梯小舟若鳬鴈大舟若鯨鯢開帆散長風舒卷與雲齊日入牛渚晦蒼然夕煙迷相思在何所一作定何許杳在洛陽西送儲雍之武昌黃鶴西樓月長江萬里情春風三十度空憶武昌城送爾難為别銜杯惜未傾湖連張樂地山逐泛舟行諾謂楚人重詩傳謝朓清滄浪吾有曲寄入棹歌聲酬答上酬談少府襄漢一尉居倐忽梅生有仙骨三事或可羞胸奴哂千秋壯心屈黃綬浪迹寄滄洲昨觀荆峴作如從雲漢遊老夫當暮矣蹀足懼驊騮酬宇文少府見贈桃竹書筒桃竹書筒綺繡文良工巧妙稱絶羣靈心圓映三江月彩質疊成五色雲中藏寶訣峨眉去千里提攜長憶君五月東魯行答汶上翁魯中五月梅始黃一作禾黍緑蠶凋桑柘空魯人重織作機杼鳴簾櫳顧余不及仕學劔來山東舉鞭訪前塗獲笑汶上翁下愚一作宵人忽壯士未足論窮通我以一箭書能取聊城功終然不受賞羞與時人同西歸去直道落日昏隂虹此一作我去爾勿言甘心如轉蓬早秋單父南樓酬竇公衡白露見日滅紅顔隨霜凋别君若俯仰春芳辭秋條泰山嵳峩夏雲在疑是白波漲東海散為飛雨川上來遙帷却卷清浮埃知君獨坐青軒下此時結念同懷者我閉南樓著道書幽簾清寂若仙居曾無好事來相訪賴爾髙文一起豫山中答俗人一云答問問余何意一作事棲碧山笑而不答一作語心自間桃花流水窅一作宛然去别有天地非人間答友人贈烏紗帽領得烏紗帽全勝白接㒿山人不照鏡稚子道相宜酬張司馬贈墨吳中上黨碧松煙夷陵丹沙末蘭麝凝珍墨精光乃堪掇黃頭奴子雙鴉鬟錦囊養之懷袖間今日贈余蘭亭去興來灑筆會稽山答湖州迦葉司馬問白是何人青蓮居士謫仙人酒肆藏名三十春湖州司馬何須問金粟如來是後身答長安崔少府叔封遊終南翠微寺太宗皇帝金沙泉見寄長安河伯見海若傲然誇秋水小物暗逺圖寧知通方士一作寧識通方理多君紫霄意獨往蒼山裏地古寒雲一作雪深巖髙長風起初登翠微嶺復憩金沙泉踐苔朝霜滑弄波夕月圓飲彼石下流一作潭結蘿宿溪煙鼎湖夢渌水龍駕空一作何茫然早行子午間一作開又作峯却登山路逺一作却歎山路逺又作頗識關路逺拂琴聽霜猿滅燭乃星飯人煙無明異鳥道絶往返攀崖倒青天一作到青山下視白日晚既過一作遇石門隱還唱一作聞石潭歌涉雪搴紫芳一作采紫莖濯纓想一作掬清波此一作斯人不可見此地君自過為余謝風泉其如幽意何贈李十二左司郎中崔宗之附涼秋八九月白露空園庭耿耿意不暢捎捎一作悄悄風葉聲思見雄俊士共話今古情李侯忽來儀把袂苦不早清論既抵掌玄談又絶倒分明楚漢事厯厯王霸道擔囊無俗物訪古千里餘袖有七首劔懷中茂陵書雙眸光照人詞賦凌子虛酌酒絃素琴霜氣正凝潔平生心事中今日為君説我家有别業寄在嵩之陽明月出髙岑清溪澄素光雲散忩戶靜風吹松桂香子若同斯遊千載不相忘酬崔五郎中朔雲橫髙天萬里起秋色壯士心飛揚落日空歎息長嘯出原野凛然寒風生幸遭聖明時功業猶未成奈何懷良圖鬱悒獨愁坐一作空獨坐杖䇿尋英豪立談乃知我崔公生人秀緬邈青雲姿制作參造化託諷含神祇海嶽尚可傾吐諾終不移是時霜飈寒逸興臨華池起舞拂長劔四座皆揚眉因得窮歡情贈我以新詩又結汗漫期九垓逺相待舉身憩蓬壺濯足弄滄海從此凌倒景一去無時還朝遊明光宫暮入閶闔關但得長把袂何必嵩丘山以詩代書答元丹丘青鳥一作烏海上來今朝發何處口銜雲錦字一作書與我忽飛去鳥去凌紫煙書留綺忩前開緘方一作時一笑乃是故人傳故人深相勗憶我勞心曲離居在咸陽三見秦草緑置書雙袂間引領不暫間長望一作歎杳難見浮雲橫逺山金門答蘇秀才君還石門日朱火始改木春草如有情山中尚含緑折芳愧遙憶永路當自勗逺見故人心平生以此足巨海納百川麟閣多才賢獻書入金闕酌醴奉瓊筵屢忝白雲唱恭聞黃竹篇恩光煦拙薄雲漢希騰遷銘鼎儻云遂扁舟方渺然我留在金門君去臥丹壑未果三山期遙欣一丘樂玄珠寄罔象赤水非寥廓願狎東海鷗共營西山藥栖巖君寂蔑處世余龍蠖良辰不同賞永日應間居鳥吟簷間樹花落忩下書緣溪見緑篠隔岫窺紅蕖採薇行笑歌眷我情何已月出石鏡間松鳴風琴裏得心自虛妙外物空頽靡身世如兩忘從君老煙水酬坊州王司馬與閻正字對雪見贈陜右遊子東南來自宛適京國飄然無心雲倐忽復西北訪戴昔未偶尋嵇此相得愁顔發新歡終宴敘前識閻公漢庭舊沉鬱冨才力價重銅龍樓聲髙重門側寧期此相遇華館陪遊息積雪明逺峯寒城沍春色主人蒼生望假我青雲翼風水如見資投竿佐皇極酬中都小吏攜斗酒雙魚於逆旅見贈齊魯魯酒若琥珀一作琥珀色汶魚紫錦鱗山東豪吏有俊氣手攜一作持此物贈逺人意氣相傾兩相顧斗酒雙魚表情素酒來我飲之鱠作别離處雙鰓呀呷鰭鬛張撥剌銀盤欲飛去呼兒拂機霜刃揮紅肌花落白雪霏為君下筯一餐飽一作罷醉著金鞍上一作走馬歸酬張卿夜宿南陵見贈月出魯城東明如天上雪魯女驚莎雞鳴機應秋節當君相思夜火落金風髙河漢挂戶牖欲濟無輕舠我昔辭林丘雲龍忽相見客星動太微朝去洛陽殿爾來得茂彥七葉仕漢餘身為下邳客家有圯橋書傅説未夢時終當起巖野萬古騎辰星光輝照天下與君各未遇長䇿委蒿萊寶刀隱玉匣鏽澀空莓苔遂令世上愚輕我土與灰一朝攀龍去蛙黽安在哉故山定有酒與爾傾金罍酬岑勛見尋就元丹丘對酒相待以詩見招黃鶴東南來寄書寫心曲倚松開其緘憶我腸斷續不以千里遙命駕來相招中逢元丹丘登嶺宴碧霄對酒忽思我長嘯臨清飈蹇余未相知茫茫緑雲垂俄然素書及解此長渴飢䇿馬望山月途窮造階墀喜茲一會面若覩瓊樹枝憶君我逺來我歡方速至開顔酌美酒樂極忽成醉我情既不淺君意方亦深相知兩相得一顧輕千金且向山客笑與君論素心答從弟幼成過西園見贈一身自瀟灑萬物何囂喧拙薄謝明時棲間歸故園二季過舊壑四鄰馳華軒衣劔照松宇賓徒光石門山童薦珍果野老開芳樽上陳樵漁事下敘農圃言昨來荷花滿今見蘭苕繁一笑復一歌不知夕景昏醉罷同所樂此情難具論酬王補闕翼惠莊廟宋丞泚贈别學道三十春自言羲皇人軒蓋宛若夢雲松長相親偶將二公合復與三山鄰喜結海上契自為天外賓鸞翮我先鎩龍性君莫馴朴散不尚古時訛皆失真勿踏荒溪坡朅來浩然津薜帶何辭楚桃源堪避秦世迫且離别心在期隱淪酬贈非炯誡永言銘珮紳李太白文集卷十五
