body:
  text: 李太白文集卷四唐李白撰歌詩五十六首樂府三白馬篇龍馬花雪毛金鞍五陵豪秋霜切玉劍落日明珠袍鬬雞事萬乘軒蓋一何髙弓摧宜山虎手接太山猱酒後競風彩三杯弄寶刀殺人如剪草劇孟同遊遨發憤去函谷從軍向臨洮叱吒經百戰一作萬戰場胸奴盡波濤一作逃歸來使酒氣未肯拜一作下蕭曹羞入原憲室荒徑隱蓬蒿鳯笙篇仙人十五愛吹笙學得崑丘彩鳯鳴始聞錬氣餐金液復道朝天赴玉京玉京迢迢幾千里鳯笙去去無窮已欲歎離聲發絳脣更嗟别調流纎指此時惜别詎堪聞此地相看未忍分重吟真曲和清吹却奏仙歌響緑雲緑雲紫氣向函關訪道應尋緱氏山莫學吹笙王子晉一遇浮丘斷不還怨歌行一作長安見內人出嫁令子代為怨歌行十五入漢宫花顔笑一作如春紅君王選玉色待寢金一作錦屏中薦枕嬌夕月卷衣戀春一作香風寧知趙飛燕奪寵恨無窮沉憂能傷人緑鬢成霜蓬一朝不得意世事徒一作信為空鷫鸘換美酒舞衣罷雕龍寒苦不忍言為君奏絲桐腸斷絃亦絶悲心夜忡忡塞下曲六首五月天山雪無花秪有寒笛中聞折栁春色未曾看曉戰隨金鼓宵眠抱玉鞍願將腰下劍直為斬樓蘭天兵下北荒胡馬欲南飲橫戈從百戰直為銜恩甚握雪海上餐拂沙隴頭寢何當破月氏然後方髙枕駿馬如風飈鳴鞭出渭橋彎弓辭漢月插羽破天驕陳解星芒盡營空海霧銷功成畫麟閣獨有霍嫖姚白馬黃金塞雲砂繞夢思那堪愁苦節逺憶邊城兒螢飛秋窗滿月度霜閨遲摧殘梧桐葉蕭颯沙棠枝無時獨不見淚流空自知塞虜乘秋下天兵出漢家將軍分虎竹戰士卧龍沙邊月隨弓影胡霜拂劍花玉關殊未入少婦莫長嗟烽火動沙漠連照甘泉雲漢皇按劍起還召李將軍兵一作殺氣天上合鼓聲隴底聞橫行負勇氣一戰靜妖氛來日大難來日一身擕糧負薪道長食盡苦口焦脣今日醉飽樂過千春仙人相存誘我逺學海陵三山陸憩五嶽乘龍上三天飛目瞻兩角授以神藥金丹滿握蟪蛄蒙恩深愧短促思填東海強銜一木道重天地軒師廣成蟬翼九五以求長生下士大笑如蒼蠅聲塞上曲大漢無中䇿胸奴犯渭橋五原秋草緑胡馬一何驕命將征西極橫行隂山側燕支落漢家婦女無花色轉戰渡黃河休兵樂事多蕭條清萬里瀚海寂無波玉階怨玉階生白露夜久侵羅襪却下水精簾玲瓏望秋月襄陽曲四首襄陽行樂處歌舞白銅鞮江城回渌水花月使人迷山公醉酒時酩酊襄一作髙陽下頭上白接籬倒著還騎馬峴山臨漢江水渌沙如雪一作水色如霜雪上有墮淚碑青苔久磨滅且醉習家池莫看墮淚碑山公欲上馬笑殺襄陽兒大堤曲漢水臨一作橫襄陽花開大堤暖佳期大堤下淚向南雲滿春風復無情吹我夢魂散不見眼中人天長音信斷宫中行樂詞八首奉詔作五言小小生金屋盈盈在紫微山花插寶髻石竹繡羅衣每出深宫裏常隨步輦歸只愁歌舞散一作罷化作綵雲飛栁色黃金嫩梨花白雪香玉樓巢一作關翡翠珠一作金殿鎖鴛鴦選妓隨雕一作朝輦徵歌出洞房宫中誰第一飛燕在昭陽盧橘為秦樹蒲桃出一作是漢宫煙花宜落日絲管醉春風笛奏龍鳴一作吟水簫吟一作鳴鳯下空君王多樂事何必向一作在回中一作還與萬方同玉樹一作殿春歸日一作好金宫樂事多後庭朝未入輕輦夜相過笑出花間語嬌來燭下歌莫教明月去留著醉姮娥繡户香風暖紗窗曙色新宫花爭笑日池草暗生春緑樹聞歌鳥青樓見舞人昭陽桃李月羅綺自一作坐相親今日明光裏還須結伴遊春風開紫殿天樂下珠樓豔舞全知巧嬌歌半欲羞更憐花月夜宫女笑藏鉤寒雪梅中盡春風栁上歸宫鶯嬌欲醉簷燕語還飛遲日明歌席新花豔舞衣晚來移綵仗行樂好光輝水渌南薰殿花紅北闕樓鶯歌聞太液鳯吹繞瀛洲素女鳴珠佩天人弄綵毬今朝風日好宜入未央遊清平調詞三首雲想衣裳花想容春風拂檻露華濃若非羣玉山頭見會向瑶臺月下逢一枝紅豔露凝香雲雨巫山枉斷腸借問漢宫誰得似可憐飛燕倚新粧名花傾國兩相歡長得君王帶笑看解釋春風無限恨沉香亭北倚闌干鼓吹入朝曲金陵控海浦渌水帶吳京鐃歌列騎吹颯沓引公卿捶鐘速嚴粧伐鼓啓重城天子憑玉案劍履若雲行日出照萬户簮裾爛明星朝罷沐浴間遨遊閬風亭濟濟雙闕下歡娛樂恩榮秦女休行古詞魏朝協律都尉左延年所作今擬之西門秦氏女秀色如瓊花手揮白楊刀清晝殺讎家羅袖灑赤血英聲凌紫霞直上西山去關吏相邀遮壻為燕國王身被詔獄加犯刑若履虎不畏落爪牙素頸未及斷摧眉伏泥沙金雞忽放赦大辟得寬賖何慙聶政姊萬古共驚嗟秦女卷衣天子居未央妾來卷衣裳顧無紫宫寵敢拂黃金牀水至亦不去熊來尚可當微身捧日月飄若螢之光願君採葑菲無以下體妨東武吟一作出金門後書懷留别翰林諸公好古笑流俗素聞賢達風方希佐明主長揖辭成功白日在髙天回光燭微躬恭承鳯凰詔歘起雲蘿中清切紫霄迥優遊丹禁通君王賜顔色聲價凌煙虹乘輿擁翠蓋扈從金城東寶馬麗絶景錦衣入新豐倚巖望松雪對酒鳴絲桐因學揚子雲獻賦甘泉宫天書美片善清芬播無窮歸來入咸陽談笑皆王公一朝去金馬飄落成飛蓬賔友日疏散玉樽亦巳空才力猶可倚一作恃不慙世上雄間作東武吟曲盡情未終書此謝知巳吾尋黃綺翁一作扁舟尋釣翁邯鄲才人嫁為厮養卒婦妾本叢臺女揚蛾入丹闕自倚顔如花寧知有凋歇一辭玉階下去若朝雲沒每憶邯鄲城深宫夢秋月君王不可見惆悵至明發出自薊北門行虜陳橫北荒胡星曜精芒羽書速驚電烽火晝連光虎竹救邊急戎車森已行明主不安席按劍心飛揚推轂出猛將連旗登戰場兵威衝絶漠殺氣凌穹蒼列卒一作陳赤山下開營紫塞傍孟冬風沙緊旌旗一作斾颯凋傷畫角悲海月征衣卷天霜揮刃斬樓蘭彎弓射賢王單于一平蕩種落自奔亡收功報天子行歌一作歌舞歸咸陽洛陽陌白玉誰家郎回車渡天津看花東陌上驚動洛陽人北上行北上何所苦北上緣太行磴道盤且峻巉巖凌穹蒼馬足蹶側石車輪摧髙岡沙塵接幽州烽火連朔方殺氣毒劍戟嚴風裂衣裳奔鯨夾黃河鑿齒屯洛陽前行無歸日返顧思舊鄉慘戚冰雪裏悲號絶中腸尺布不掩體皮膚劇枯桑汲水澗谷阻採薪壠坂長猛虎又掉尾磨牙皓秋霜草木不可餐飢飲零露漿歎此北上苦停驂為之傷何日王道平開顔覩天光短歌行白日何短短百年苦易滿蒼穹浩茫茫萬劫太極長麻姑垂兩鬢一半已成霜天公見玉女大笑億千場吾欲攬六龍回車挂扶桑北斗酌美酒勸龍各一觴富貴非所願為一作與人駐頽一作顔又作流光空城雀嗷嗷空城雀身計何戚促本與鷦鷯羣不隨鳯凰族提擕四黃口飲乳未嘗足食君粳粃餘常恐烏鳶逐耻涉太行險羞營覆車粟天命有定端守分絶所欲發白馬將軍發白馬旌節渡黃河簫鼓聒川嶽滄溟湧濤一作洪波武安有震瓦易水無寒歌鐵騎若雪山飲流涸滹沱揚兵獵月窟轉戰略朝那倚劍登燕然邊烽列嵯峨蕭條萬里外耕作五原多一掃清大漠包虎戢金戈陌上桑美女渭橋東一作美女緗綺衣又作遊女春還一作還來事蠶作五馬飛如花一作如花飛又作如飛龍青絲結金絡不知誰家子調笑來相謔妾本秦羅敷玉顔豔名都緑條映素手採桑向城隅使君且不顧况復論秋胡寒螀愛碧草鳴鳯棲青梧託心自有處但怪旁人愚徒令白日暮髙駕空踟蹰枯魚過河泣白龍改常服偶被豫且制誰使爾為魚徒為訴天帝作書報鯨鯢勿恃風濤勢濤落歸泥沙翻遭螻蟻噬萬乘慎出入柏人以為誡一作識丁都護一作督護歌雲陽上征去兩岸饒商賈吳牛喘月時拖船一何苦水濁不可飲壺漿半成土一唱都護歌心摧淚如雨萬人繫盤石無由達江滸君看石芒碭掩淚悲千古相逢行一云有贈朝騎五花馬謁帝出銀臺秀色誰家子雲車一作中珠箔開金鞭遙指點玉勒近遲回夾轂相借問疑一作知從天上來一本更添憐腸愁欲斷斜日復相催下車何輕盈飄然似落梅邀入青綺門當歌共銜杯一作嬌羞初解珮語笑共銜杯銜杯映歌扇似月雲中見相見不得一作相親不如不相見相見情已深未語可知心胡為守空閨孤眠愁錦衾錦衾與羅帷纒綿會有時春風正淡蕩暮雨來何遲一作春風正糾結青烏來何遲願因三青鳥更報長相思光景不待人須臾髮成絲當年失行樂老去徒傷悲持此道密意無令曠佳期千里思一作千里曲李陵沒胡沙蘇武還漢家迢迢五原關朔雪亂邊花一作愁見雪如花一去隔絶國思歸但長嗟鴻鴈向西北因一作飛書報天涯樹中草鳥銜野田草誤入枯桑裏客土植危根逢春猶不死草木雖無情因依尚可生如何同枝葉各自有枯榮君馬黃君馬黃我馬白馬色雖不同人心本無隔共作遊冶盤雙行洛陽陌長劍既照曜髙冠何赩赫各有千金裘俱為五侯客猛虎落陷穽壯夫時屈厄相知在急難獨好亦一作知何益擬古融融白玉輝映我青蛾眉寶鏡似空水落花如風吹出門望同子蕩漾不可期安得黃鶴羽一報佳人知折楊栁垂楊一作楊栁拂渌水搖豔一作豔裔東風年花明玉關雪葉暖金窗煙美人結長想對此心悽然攀條折春色逺寄龍庭前一作龍沙邊鳯凰曲嬴女吹玉簫吟弄天上春青鸞不獨去更有擕手人影滅綵雲斷遺聲落西秦少年子青雲少年子挾彈章臺左鞍馬四邊開突如流星過金丸落飛鳥夜入瓊樓卧夷齊是何人獨守西山餓紫騮馬紫騮行一作驕且嘶雙翻碧玉蹄臨流不肯渡似惜錦障泥白雪關山一作城逺黃雲海戍迷揮鞭萬里去安一作何得念一作戀春閨少年行二首後一首亦作小放歌行擊築飲美酒劍歌易水湄經過燕太子結託并州兒少年負壯氣奮烈自有時因聲魯勾踐爭情一作博勿相欺五陵年少金市東銀鞍白馬度春風落花踏盡遊何處笑入胡姬酒肆中白鼻騧銀一作金鞍白鼻騧渌地障泥錦細雨春風花落時一作春風細雨落花時揮鞭直就胡姬飲豫章行胡風吹代馬一作燕人攢赤羽北擁魯陽關吳兵照海雪西討何時還半渡上遼津黃雲慘無顔老母與子别呼天野草間白馬一作百鳥繞旌旗悲鳴相追攀白楊秋月苦早落豫章山本為休明人斬虜素不間豈惜戰鬬死為君掃凶頑精感石沒羽豈云憚險艱樓船若鯨飛波蕩落星灣此曲不可奏三軍鬢成班沐浴子沐芳莫彈冠浴蘭莫振衣處世忌太潔志一作至人貴藏暉滄浪有釣叟吾與爾同歸李太白文集卷四
