body:
  text: 李太白文集卷二十四唐李白撰古賦明堂賦并序大獵賦并序大鵬賦并序劒閣賦擬恨賦惜餘春賦愁陽春賦悲清秋賦明堂賦并序昔在天皇告成岱宗改元乾封經始明堂年紀總章時締構之未輯痛威靈之遐邁天后繼作中宗成之因兆人之子來崇萬祀之丕業蓋天皇先天中宗奉天纍聖纂就鴻勳克宣臣白美頌恭惟述焉其辭曰伊皇唐之革天創元也我髙祖乃仗大順赫然雷發以首之於是橫八荒漂九陽掃叛換開混茫景星耀而泰階平虹霓滅而日月張欽若太宗繼明重光廓區宇以立極綴蒼昊之頽綱淳風沕穆鴻恩滂洋武義烜赫於有截仁聲馺􅤥乎無疆若乃髙宗紹興祐統錫羡神休傍臻瑞物咸薦元符剖兮地珍見既應天以順人遂登封而降禪將欲考有洛崇明堂惟厥功之未輯兮乘白雲於帝鄉天后勤勞輔政兮中宗以欽明克昌遵先軌以繼作兮揚列聖之耿光則使軒轅草圖羲和練日經之營之不彩不質因子來於四方豈殫稅於萬室乃准水臬攢雲梁罄玉石於隴坂空壞材於瀟湘巧奪神鬼髙窮昊蒼聽天語之察察擬帝居之鏘鏘雖暫勞而永固兮貽聖謨於我皇觀夫明堂之宏壯也則突兀曈曨乍明乍䝉太古元氣之結空巃嵸頽沓若嵬若嶪似天閫地門之開闔爾乃劃岝峉以嶽立郁穹崇而鴻紛冠百王而垂勳燭萬象而騰文窙愡恍以洞啓呼嵌嵓而傍分又比乎昆山之天柱矗九霄而垂雲於是結構乎黃道岧嶤乎紫微絡勾陳以繚垣闢閶闔而啓扉峥嶸􅡳嶷粲宇宙兮光輝崔嵬赫奕張天地之神威夫其背泓黃河垠漱清洛太行却立通谷前廓逺則標熊耳以作揭豁龍門以開關㸃翠彩於洪荒洞清隂乎羣山及乎烟雲卷舒忽出乍沒岌嵩噴伊倚日薄月雷霆之所鼓蕩星斗之所伾扢拿金龍之蟠蜿挂天珠之硉矹勢拔五嶽形張四維軋地軸以盤根摩天倪而創規樓臺崛岉以奔赴城闕崟岑而蔽虧珍樹翠草含華揚㽔目瑶井之熒熒拖玉繩之離離㨖華蓋以儻漭仰太微之參差擁以禁扄橫以武庫獻房心以開鑿瞻少陽而舉措採殷制酌夏步雜以代室重屋之名括以辰次火木之數壯不及奢麗不及素層簷屹其霞矯廣厦鬱以雲布掩日道遏風路陽烏轉影而翻飛大鵬橫霄而側度近則萬木森下千宫對出熠乎光碧之堂炅乎瓊華之室錦爛霞駮星錯波沏颯蕭寥以颼飀窅隂鬱以櫛密含佳氣之青䓤吐祥烟之鬱律九室窈窕五闈聨綿飛楹磊砢走栱夤緣雲楣立岌以橫綺綵桷攢欒而仰天皓壁晝朗朱甍晴鮮赬欄各落偃蹇霄漢翠楹回合蟬聨汗漫沓蒼穹之絶垠跨皇居之太半逺而望之赫煌煌以輝輝忽天旋而雲昏迫而察之粲炳煥以照爛倐山訛而晷換蔑蓬壺之海樓吞岱宗之日觀猛虎失道潛虬蟠梯徑通天而直上俯長河而下低玉女攀星於網户金娥納月於璇題藻井綵錯以舒蓬天窗赩翼而銜霓扶標川而罔足擬跟絓而罷躋要離欻矐而外喪精視氷背而中迷亘以復道通乎掖垣坌入西樓實為昆崘前丞後疑正儀躅以出入九夷五狄順方面而來奔其左右也則丹陛崿崿彤庭煌煌列寶鼎歊金光流辟雍之滔滔像環海之湯湯闢青陽而啓總章廓明臺而布𤣥堂儼以太廟處乎中央發號施令采時順方其閫閾也三十六户七十二牖度筵列位西八東九白虎列序而躨跜青龍承隅而蚴蟉其深沉奧密也則赤熛掌火招拒司金靈威制陽叶光摧隂坤斗主土據乎其心若乃熠耀五色張皇萬殊人物禽獸竒形異模勢若飛動瞪眄睢盱明君暗主忠臣烈夫威政興滅表賢示愚於是王正孟月朝陽登曦天子乃施蒼玉轡蒼螭臨乎青陽左個方御瑶瑟而彈鳴絲展乎國容輝乎皇儀傍瞻神臺順觀雲之軌俯對清廟崇配天之規欽若肸蠁惟清緝熙崇牙樹羽熒煌葳蕤納六服之貢受萬邦之籍張龍旗與虹旌攢金㦸與玉戚延五更進百辟奉圭瓉獻賝帛顒昻俯僂儼容疊跡乃潔菹醢修粢盛奠三犧薦五牲享于神靈太祝正辭庶官精誠鼓大武之隱轔張鈞天之鏗訇孤竹合奏空桑和鳴盡六變齊九成羣神來兮降明庭蓋聖主之所以孝治天下而享祀窅冥也然後臨辟雍宴羣后隂陽為庖造化為宰餐元氣灑太和千里鼓舞百寮賡歌于斯之時雲油雨霈恩鴻溶兮澤汪濊四海歸兮八荒㑹哤聒乎區㝢駢闐乎闕外羣臣醉德揖讓而退而聖主猶夕惕若厲懼人未安乃目極于天耳下于泉飛聰馳明無逺不察考鬼神之奧推隂陽之荒下明詔班舊章振窮乏散敖倉毁玉沉珠卑宫頽牆使山澤無間往來相望帝躬乎天田后親於郊桑棄未反本人和時康建翠華兮萋萋鳴玉鑾之鉠鉠遊乎升平之圃憩乎穆清之堂天欣欣兮瑞穰穰巡陵於鶉首之野講武於驪山之旁封岱宗兮祀后土掩栗陸而苞陶唐遨遊乎崆峒之上汾水之陽吸沆瀣之精英黜滋味而馨香貴理國其若夢幾華胥之故鄉於是元元淡然不知所在若羣雲從龍衆水奔海此真所謂我大君登明堂之政化也豈比夫秦趙吳楚爭髙競奢結阿房與叢臺建姑蘇及章華非享祀與嚴配徒掩月而凌霞由此觀之不足稱也况瑶臺之巨麗復安可以語哉敢揚國美遂作辭曰穹崇明堂倚天開兮巃嵸鴻濛構瓌材兮偃蹇坱莽邈崔嵬兮周流辟雍岌靈臺兮赫日星噴風雷宗祀肸蠁王化𢎞恢鎮八荒通九垓四門啓兮萬國來考休徴兮進賢才儼若皇居而作固窮千祀兮悠哉大獵賦并序白以為賦者古詩之流辭欲壯麗義歸博逺不然何以光贊盛美感天動神而相如子雲競誇辭賦厯代以為文雄莫敢詆訐臣謂語其略竊或褊其用心子虛所言楚國不過千里夢澤居其大半而齊徒吞若八九三農及禽獸無息肩之地非諸侯禁淫述職之義也上林云左蒼梧右西極考其實地周袤才經數百長楊誇胡設網為周阹放麋鹿其中以搏攫充樂羽獵於靈臺之囿圍經百里而開殿門當時以為窮壯極麗逮今觀之何齷齪之甚也但王者以四海為家萬姓為子則天下之山林禽獸豈與衆庶異之而臣以為不能以大道匡君示物周博平文論苑之小竊為微臣之不取也今聖朝園池遐荒殫窮六合以孟冬十月大獵於秦亦將曜威講武掃天蕩野豈淫荒侈靡非三驅之意耶臣白作頌折中厥美其辭曰粵若皇唐之契天地而襲氣母兮粲五葉之葳蕤惟開元廓海㝢而運斗極兮揔六聖之光熙誕金德之淳精兮潄玉露之華滋文章森乎七曜兮制作參乎兩儀括衆妙而為師明無幽而不燭兮澤無逺而不施慕往昔之三驅兮順生殺於四時若乃嚴冬慘切寒氣凜冽不周來風𤣥冥掌雪木脫葉草解節土囊烟隂火井氷閉是月也天子處乎𤣥堂之中餐八水兮休百工考王制兮遵國風樂農人之間隙兮因校獵而講戎乃使神兵出於九闕天仗羅於四野徵水衡與林虞辨土物之衆寡千騎飈掃萬乘雷奔梢扶桑而拂火雲兮括月窟而搜寒門赫壯觀於今古嶪搖蕩於乾坤此其大略也而內以中華為天心外以窮髮為海口豁咽喉以洞開吞荒裔以盡取大章按步以來往夸父振䇿而奔走足跡乎日月之所通囊括乎隂陽之未有君王於是撞鴻鐘發鑾音出鳳闕開宸襟駕玉輅之飛龍厯神州之層岑逰五柞兮瞰三危挾細栁兮過上林攢髙牙以總總兮駐華蓋之森森於是擢倚天之劒彎落月之弓昆崘叱兮可倒宇宙噫兮增雄河漢為之却流川嶽為之生風羽旄揚兮九天絳獵火燃兮千山紅乃召蚩尤之徒聚長㦸羅廣澤呵雨師走風伯稜威曜乎雷霆烜赫震於蠻貊陋梁都之體制鄙靈囿之規格而南以衡霍作襟北以岱常作袪夾東海而為塹兮拖西溟而流渠麾九州之珍禽兮回千羣以坌入聨八荒之竒獸兮屯萬族而來居雲羅髙張天網密布罝罘綿原峭格掩路蠛蠓過而猶礙蟭螟飛而不度彼層霄與殊榛罕翔鳥與伏兔從營合技彌巒被岡金戈森行洗晴野之寒霜虹旗電掣卷長空之飛雪吳驂走練宛馬蹀血縈衆山之聨綿隔逺水之明滅使五丁摧峰一夫拔木下整髙頽深平險谷擺椿栝開林叢喤喤呷呷盡奔突於場中而田强古冶之儔烏獲中黃之黨越峥嶸獵莽蒼喑呼哮口闞風旋電往脫文豹之皮抵𤣥熊之掌批狻手猱挾三挈兩既徒搏以角力又揮鋒而爭先行甝號以鶚睨兮氣赫火而敵烟拳封猯引巨狿梟羊應叱以斃踣䝟貐亡精而墜巔或碎腦以折脊或噴髓以飛涎窮遐荒蕩林藪扼土狛殪天狗脫角犀頂探牙象口掃封狐於千里捩雄虺之九首咋騰蛇而仰吞拖奔兕以却走君王於是峩通天靡星旃奔雷車揮電鞭觀壯士之效獲顧三軍而欣然曰夫何神挾鬼摽之駭人也又命建夔鼓勵武卒雖躪躒之已多猶拗怒而未歇集赤羽兮照日張烏號兮滿月戎車轞轞以陸離彀騎煌煌而奮發鷹犬之所騰捷飛走之所蹉蹶攫麏麚之咆哮蹂豺貉以挂格膏鋒染鍔填巖掩窟觀殊材與逸羣尚揮霍以出沒别有白􅀈飛駿窮竒貙䝡牙若錯劒鬛如叢竿口吞殳鋋目極槍櫓碎琅弧攫玉弩射猛彘透奔虎金鏃一發旁疊四五雖鑿齒磨牙而致伉誰謂南山白額之足覩揔八校搜四隅馳專諸走都盧趫喬林撇絶壁抄獑猢攬貊􅀈囚鼬鼯於峻崕頓豰貜於穹石養由發箭竒肱飛車巧聒更贏妙兼蒱且墜鸀鳿於青雲落鴻雁於紫虛捎鶬鴰漂鸕􅖥殫地廬空神居斬飛鵬於日域摧大鳳於天墟龍伯釣其靈鼇任公獲其巨魚窮造化之譎詭何神怪之有餘所以噴血流川飛毛灑雪狀若乎髙天雨獸上墜於大荒又似乎積禽為山下崩於林穴陽烏沮色於朝日隂兔喪精於明月思騰裝上獵於太清所恨穹昊於路絶而忽也莫不海晏天空萬方來同雖秦皇與漢武兮復何足以爭雄俄而君王茫然改容愀然有失居安思危防險戒逸斯馳騁以狂發非至理之𢎞術且夫人君以端拱為尊𤣥妙為寶暴殄天物是謂不道乃命去三面之網示六合之仁已殺者皆其犯命未傷者全其天真雖剪毛而不獻豈割鮮以淬輪解鳳皇與鸑鷟兮旋騶虞與麒麟獲天寶於陳倉載非熊於渭濱於是享獵徒封勞苦軒行庖騎酌酤韜兵戈火網罟然後登九霄之臺宴八紘之圃開日月之扄闢生靈之户聖人作而萬物覩覽搜敖與狩歧何宣成之足數哂穆王之荒誕歌白雲之西母曷若飽人以淡泊之味醉時以淳和之觴鼓之以雷霆舞之以隂陽虞乎神明狃於道德張無外以為罝㙇大朴以為杙頓天網以掩之獵賢俊以御極若此之狩罔有不克使天人宴安草木蕃植六宫斥其珠玉百姓樂於耕織寢鄭衛之聲却靡曼之色天老掌圖風后侍側是三階砥平而皇猷允塞豈比夫子虛上林長楊羽獵計麋鹿之多少誇苑囿之大小哉方將延榮光於後昆軼𤣥風於邃古擁嘉瑞臻元符登封於太山篆德於社首豈與乎七十二帝同條而共貫哉君王於是回霓旌反鑾輿訪廣成於至道問大隗之幽居使罔象掇𤣥珠於赤水天下不知其所如也大鵬賦并序余昔於江陵見天台司馬子微謂余有仙風道骨可與神遊八極之表因著大鵬遇希有鳥賦以自廣此賦已傳于世往往人間見之悔其少作未窮宏達之㫖中年棄之及讀晉書覩阮宣子大鵬讃鄙心陋之遂更記憶多將舊本不同今復存于集豈敢傳諸作者庶可示之子弟而已其辭曰南華老仙一作仙老發天機於漆園吐峥嶸之髙論䦕浩蕩之竒言徴至一作志怪于齊諧談北溟之有魚吾不知幾千里其名曰鯤化成大鵬質凝胚渾脫鬐鬛於海島張羽毛於天門刷渤澥之春流晞扶桑之朝暾烜爀于宇宙慿凌乎昆崘一鼓一舞煙朦沙昏五嶽為之震落百川為之崩奔乃蹶厚地揭太清亘層霄突重溟激三千以崛起向九萬而迅征背嶪大山一作虛之崔嵬翼舉長雲之縱橫左回右旋倐隂忽明厯汗漫以夭矯羾閶闔之峥嶸簸鴻濛扇雷霆斗轉而天動山搖而海傾怒無所搏雄無所爭固可想像其勢髣佛其形若乃足縈虹霓目耀日月連軒沓拖揮霍翕忽噴氣則六合生雲灑毛則千里飛雪邈彼北荒將窮南隅運逸翰以傍擊鼓奔飈而長驅燭龍銜光以照物列缺施鞭而啓途塊視三山杯觀一作看五湖其動也神應其行也道俱任公見之而罷釣有窮不敢以彎弧莫不投竿失鏃仰之長吁爾其雄姿壯觀坱圠河漢上摩蒼蒼下覆漫漫盤古開天而直視羲和倚日而傍歎繽紛乎八荒之間掩映乎四海之半當胸臆之掩晝若混茫之未判忽騰覆以回轉則霞廓而霧散然後六月一息至于海湄歘翳景以橫翥逆髙天而下垂憩乎泱漭之野入乎汪湟之池猛勢所射餘風所吹溟漲沸渭巖巒紛披天吳為之祑㤕海若為之躨跜巨鼇冠山而却走長鯨騰海而下馳縮殼挫鬛莫之敢窺吾亦不測其神怪之若此蓋乃造化之所為豈比夫蓬萊之黃鵠誇金衣與菊裳恥蒼梧之𤣥鳳耀綵質與錦章既服御于靈仙久馴擾於池隍精衛勤苦於銜木鶢鶋悲愁乎薦觴天雞警曙于蟠桃踆烏晰耀於太陽不曠蕩而縱適何拘攣而守常未若兹鵬之逍遙無厥類乎比方不矜大而暴猛每順時而行藏參𤣥根以比夀飲元氣以充腸戲暘谷而徘徊馮炎洲而抑揚俄而希有鳥見謂之曰偉哉鵬乎若此之樂也吾右翼掩乎西極左翼蔽乎東荒跨躡地絡周旋天綱以恍惚為巢以虛無為場我呼爾逰爾同我翔于是乎大鵬許之欣然相隨此二禽已登於寥廓而斥鷃之輩空見笑於藩籬劒閣賦送友人王炎入蜀咸陽之南直望五千里見雲峰之崔嵬前有劒閣橫斷倚青天而中開上則松風蕭颯瑟䫻有巴猿兮相哀旁則飛湍走壑灑石噴閣洶湧而驚雷送佳人兮此去復何時兮歸來望夫君兮安極我沉吟兮歎息視滄波之東注悲白日之西匿鴻别燕兮秋聲雲愁秦而暝色若明月出於劒閣兮與君兩鄉對酒而相憶擬恨賦晨登太山一望蒿里松楸骨寒草宿墳毁浮生可嗟大運同此於是僕本壯夫慷慨不歇仰思前賢飲恨而歿昔如漢祖龍躍羣雄競奔提劒叱咤指麾中原東馳渤澥西漂崑崘斷蛇奮怒掃清國步握瑶圖而倐升登紫壇而雄顧一朝長辭天下縞素若乃項王虎鬬白日爭輝拔山力盡蓋世心微聞楚歌之四合知漢卒之重圍帳中劒舞泣挫雄威騅兮不逝喑嗚何歸至如荆卿入秦直度易水長虹貫日寒風颯起逺讐始皇擬報太子竒謀不成憤惋而死若夫陳后失寵長門掩扉日冷金殿霜凄錦衣春草罷緑秋螢亂飛恨桃李之委絶思君王之有違昔者屈原既放遷於湘流心死舊楚魂飛長楸聽江楓之嫋嫋聞嶺狖之啾啾永埋骨於渌水怨懷王之不收及夫李斯受戮神氣黯然左右垂泣精魂動天執愛子以長别歎黃犬之無緣或有從軍永决去國長違天涯遷客海外思歸此人忽見愁雲蔽日目斷心飛莫不攢眉痛骨抆血霑衣若乃錯繡轂填金門烟塵曉沓歌鐘晝喧亦復星沉電滅閉影潛魂已矣哉桂華滿兮明月輝扶桑曉兮白日飛玉顔滅兮螻蟻聚碧臺空兮歌舞稀與天道兮共盡莫不委骨而同歸惜餘春賦天之何為令北斗而知春兮回指於東方水蕩漾兮碧色蘭葳蕤兮紅芳試登髙而望逺極雲海之微茫魂一去兮欲斷淚流頰兮成行吟清楓而詠滄浪懷洞庭兮悲瀟湘何余心之縹眇兮與春風而飄揚飄揚兮思無限念佳期兮莫展平原萋兮綺色愛芳草兮如剪惜餘春之將闌每為恨兮不淺漢之曲兮江之潭把瑶草兮思何堪想遊女於峴北愁帝子於湘南恨無極兮心氲氲目眇眇兮憂紛紛披衛情於淇水結楚夢於陽雲春每歸兮花開花已䦨兮春改歎長河之流春送馳波於東海春不留兮時已失老衰颯兮逾疾恨不得挂長繩於青天繫此西飛之白日若有人兮情相親去南國兮往西秦見遊絲之橫路網春輝以留人沉吟兮哀歌躑躅兮傷别送行子之將逺看征鴻之稍滅醉愁心於垂楊隨柔條以糾結望夫君兮咨嗟橫涕淚兮怨春華遙寄影於明月送夫君於天涯愁陽春賦東風歸來見碧草而知春蕩漾惚恍何垂楊旖旎之愁人天光青而妍和海氣緑而芳新野綵翠兮芊綿雲飄颻而相鮮演漾兮夤緣窺青一作新苔之生泉縹眇兮翩綿見遊絲之縈烟魂與此兮俱斷醉一作對風光兮悽然若乃隴水秦聲江猿巴吟明妃玉塞楚客楓林試登髙而望逺痛切骨一作咸痛骨而傷心春心蕩兮如波春愁亂兮如雪兼萬情之悲歡茲一感於芳節若有一人一作我所思兮湘水濱隔雲霓而見無因灑别淚於尺波寄東流於情親若使春光可攬而不滅兮吾欲贈天涯之佳人悲清秋賦登九疑兮望清川見三湘之潺湲水流寒以歸海雲橫秋而蔽天余以鳥道計於故鄉兮不知去荆吳之幾千于時西陽半規映島欲沒澄湖練明遙海上月念佳期之浩蕩渺懷燕而望越荷花落兮江色秋風嫋嫋兮夜悠悠臨窮溟以有羡思釣鼇於滄洲無修竿以一舉撫洪波而增憂歸去來兮人間不可以託些吾將採藥於蓬丘李太白文集卷二十四
